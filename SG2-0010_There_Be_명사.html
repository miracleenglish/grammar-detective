<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SG2-0010 | There + Be + Noun</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FEF0E6;
    --accent: #F5A623;
    --accent-dark: #D4891A;
    --correct: #4CAF93;
    --wrong: #E8604C;
    --card: #ffffff;
    --text: #333333;
    --light-text: #777777;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }
  .header {
    background: var(--accent-dark);
    color: white;
    padding: 14px 20px 10px;
    text-align: center;
  }
  .header .series { font-size: 11px; opacity: 0.85; letter-spacing: 1px; margin-bottom: 2px; }
  .header h1 { font-size: 18px; font-weight: 900; }
  .header .sub { font-size: 12px; opacity: 0.85; margin-top: 2px; }
  .badge {
    display: inline-block;
    background: #4A90D9;
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 20px;
    margin-top: 6px;
  }
  .progress-wrap { background: #f0d9c8; height: 8px; width: 100%; }
  .progress-bar { height: 8px; background: var(--accent); transition: width 0.4s ease; border-radius: 0 4px 4px 0; }
  .progress-info { text-align: center; font-size: 12px; color: var(--light-text); padding: 5px; }
  .quiz-wrap { max-width: 540px; margin: 0 auto; padding: 16px 16px 0; }
  .instruction {
    background: var(--accent);
    color: white;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 14px;
    text-align: center;
  }
  .question-card {
    background: var(--card);
    border-radius: 16px;
    padding: 20px 18px 16px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.09);
    margin-bottom: 14px;
  }
  .q-num { font-size: 11px; font-weight: 700; color: var(--accent-dark); margin-bottom: 8px; }
  .q-sentence {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.8;
    margin-bottom: 6px;
  }
  .q-sentence .arrow-line {
    display: block;
    color: var(--accent-dark);
    font-size: 18px;
    font-weight: 800;
  }
  /* 빈칸 밑줄: 베이스라인 맞춤, 진한 검정 */
  .q-sentence .blank {
    display: inline-block;
    min-width: 52px;
    border-bottom: 2.5px solid #444;
    margin-bottom: -2px;
    text-align: center;
  }
  .q-sentence .arrow-line .blank {
    border-bottom: 2.5px solid var(--accent-dark);
  }
  .q-translation {
    font-size: 15px;
    color: var(--light-text);
    margin-bottom: 14px;
    line-height: 1.7;
  }
  .hl { color: var(--accent-dark); border-bottom: 2.5px solid var(--accent-dark); font-weight: 800; padding-bottom: 1px; }

  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 9px;
  }
  .opt-btn {
    border: 2.5px solid #e0cabb;
    background: #fff9f5;
    border-radius: 12px;
    padding: 11px 8px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    color: var(--text);
    line-height: 1.4;
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--accent); background: #fff0e0; transform: translateY(-1px); }
  .opt-btn.correct { background: #e8f8f3; border-color: var(--correct); color: var(--correct); }
  .opt-btn.wrong { background: #fdecea; border-color: var(--wrong); color: var(--wrong); }
  .opt-btn:disabled { cursor: default; }

  .feedback {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.6;
    display: none;
  }
  .feedback.correct { background: #e8f8f3; border-left: 4px solid var(--correct); display: block; }
  .feedback.wrong { background: #fdecea; border-left: 4px solid var(--wrong); display: block; }
  .feedback .fb-title { font-weight: 800; margin-bottom: 4px; word-break: keep-all; line-height: 1.5; }
  .feedback .fb-reason { color: #555; margin-top: 4px; font-size: 12px; word-break: keep-all; }

  .next-btn {
    display: none;
    width: 100%;
    margin-top: 14px;
    padding: 14px;
    background: var(--accent-dark);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
  }
  .next-btn:hover { background: #b87516; }

  .result-screen {
    max-width: 540px;
    margin: 20px auto;
    padding: 0 16px;
    display: none;
    text-align: center;
  }
  .result-card {
    background: white;
    border-radius: 20px;
    padding: 30px 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }
  .star-display { font-size: 40px; margin-bottom: 10px; }
  .result-score { font-size: 36px; font-weight: 900; color: var(--accent-dark); }
  .result-msg { font-size: 15px; color: var(--light-text); margin: 8px 0 20px; }
  .wrong-list {
    text-align: left;
    background: #fff9f5;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .wrong-list h3 { font-size: 13px; color: var(--wrong); margin-bottom: 10px; font-weight: 800; }
  .wrong-item { font-size: 13px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #f0e0d0; }
  .wrong-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .wrong-item .wi-wrong { color: var(--wrong); font-weight: 700; }
  .wrong-item .wi-right { color: var(--correct); font-weight: 700; }
  .wrong-item .wi-reason { color: #666; font-size: 12px; margin-top: 2px; word-break: keep-all; }

  .action-btns { display: flex; gap: 10px; }
  .retry-wrong-btn, .retry-all-btn {
    flex: 1; padding: 12px; border: none; border-radius: 12px;
    font-size: 14px; font-weight: 800; font-family: 'Nunito', sans-serif; cursor: pointer;
  }
  .retry-wrong-btn { background: var(--wrong); color: white; }
  .retry-all-btn { background: var(--accent-dark); color: white; }
  .retry-wrong-btn:hover { background: #c94030; }
  .retry-all-btn:hover { background: #b87516; }
</style>
</head>
<body>

<div class="header">
  <div class="series">🔍 영문법 탐정단 · 스타트 영문법 2권</div>
  <h1>There + Be + Noun</h1>
  <div class="sub">Lesson 8 — There is / There are</div>
  <span class="badge">A형</span>
</div>
<div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
<div class="progress-info" id="progressInfo">1 / 12</div>

<div class="quiz-wrap" id="quizWrap">
  <div class="instruction" id="instruction">📌 알맞은 말을 골라요!</div>
  <div class="question-card" id="questionCard"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">다음 문제 →</button>
</div>

<div class="result-screen" id="resultScreen">
  <div class="result-card">
    <div class="star-display" id="starDisplay"></div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="wrong-list" id="wrongList" style="display:none">
      <h3>❌ 틀린 문제 복습</h3>
      <div id="wrongItems"></div>
    </div>
    <div class="action-btns">
      <button class="retry-wrong-btn" id="retryWrongBtn" onclick="retryWrong()" style="display:none">오답만 다시 풀기</button>
      <button class="retry-all-btn" onclick="retryAll()">전체 다시 풀기 🔄</button>
    </div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [

  // ── There is / There are 고르기 ──
  {
    instruction: "📌 There is / There are 중 알맞은 것을 골라요!",
    display: '<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> a sandwich.',
    translation: "샌드위치 한 개가 있어요.",
    options: ["There is", "There are", "There am", "There be"],
    answer: "There is",
    sentence_start: true,
    feedback_correct: "✅ 정답! 단수 명사(a sandwich) → There is.",
    feedback_wrong: "❌ 단수 명사 앞에는 There is를 써요!",
    reason: "단수 명사 → There is / 복수 명사 → There are"
  },
  {
    instruction: "📌 There is / There are 중 알맞은 것을 골라요!",
    display: '<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> four apples.',
    translation: "사과 네 개가 있어요.",
    options: ["There is", "There are", "There am", "There be"],
    answer: "There are",
    sentence_start: true,
    feedback_correct: "✅ 정답! 복수 명사(apples) → There are.",
    feedback_wrong: "❌ 복수 명사 앞에는 There are를 써요!",
    reason: "단수 명사 → There is / 복수 명사 → There are"
  },
  {
    instruction: "📌 There is / There are 중 알맞은 것을 골라요!",
    display: '<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> some milk.',
    translation: "우유가 있어요.",
    options: ["There is", "There are", "There am", "There be"],
    answer: "There is",
    sentence_start: true,
    feedback_correct: "✅ 정답! 셀 수 없는 명사(milk) → There is.",
    feedback_wrong: "❌ 셀 수 없는 명사 앞에는 There is를 써요!",
    reason: "셀 수 없는 명사(milk, water, bread...) → There is some ~"
  },

  // ── 부정문: There isn't / There aren't ──
  {
    instruction: "📌 부정문을 완성해요!",
    display: 'There <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> a watermelon.',
    translation: "수박이 없어요.",
    options: ["isn't", "aren't", "is", "are"],
    answer: "isn't",
    feedback_correct: "✅ 정답! 단수 명사(a watermelon)의 부정 → There isn't.",
    feedback_wrong: "❌ 단수 명사의 부정문은 There isn't예요!",
    reason: "There is → 부정: There isn't / There are → 부정: There aren't"
  },
  {
    instruction: "📌 부정문을 완성해요!",
    display: 'There <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> any lemons.',
    translation: "레몬이 하나도 없어요.",
    options: ["isn't", "aren't", "is", "are"],
    answer: "aren't",
    feedback_correct: "✅ 정답! 복수 명사(lemons)의 부정 → There aren't.",
    feedback_wrong: "❌ 복수 명사의 부정문은 There aren't예요!",
    reason: "There are → 부정: There aren't any ~"
  },
  {
    instruction: "📌 부정문을 완성해요!",
    display: 'There <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> any coffee.',
    translation: "커피가 없어요.",
    options: ["isn't", "aren't", "is", "are"],
    answer: "isn't",
    feedback_correct: "✅ 정답! 셀 수 없는 명사(coffee)의 부정 → There isn't.",
    feedback_wrong: "❌ 셀 수 없는 명사의 부정문은 There isn't any ~예요!",
    reason: "셀 수 없는 명사 부정 → There isn't any ~ (coffee, milk, water...)"
  },

  // ── some / any 고르기 ──
  {
    instruction: "📌 some / any 중 알맞은 것을 골라요!",
    display: 'There are <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> <span class="hl">cookies</span>.',
    translation: "쿠키가 있어요. (긍정문)",
    options: ["some", "any", "a", "an"],
    answer: "some",
    feedback_correct: "✅ 정답! 긍정문에는 some을 써요.",
    feedback_wrong: "❌ 긍정문에는 some을 써요!",
    reason: "긍정문 → some / 부정문·의문문 → any"
  },
  {
    instruction: "📌 some / any 중 알맞은 것을 골라요!",
    display: 'There aren\'t <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> <span class="hl">balloons</span>.',
    translation: "풍선이 하나도 없어요. (부정문)",
    options: ["some", "any", "a", "an"],
    answer: "any",
    feedback_correct: "✅ 정답! 부정문에는 any를 써요.",
    feedback_wrong: "❌ 부정문에는 any를 써요!",
    reason: "긍정문 → some / 부정문·의문문 → any"
  },

  // ── 의문문: Is there / Are there ──
  {
    instruction: "📌 의문문을 완성해요!",
    display: '<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> there any water?<br><span class="arrow-line">→ Yes, there is.</span>',
    translation: "물이 있나요?<br>→ 네, 있어요.",
    options: ["Is", "Are", "Am", "Be"],
    answer: "Is",
    sentence_start: true,
    feedback_correct: "✅ 정답! 셀 수 없는 명사(water) → Is there any ~?",
    feedback_wrong: "❌ 셀 수 없는 명사의 의문문은 Is there any ~?예요!",
    reason: "단수/셀 수 없는 명사 → Is there ~? / 복수 명사 → Are there ~?"
  },
  {
    instruction: "📌 의문문을 완성해요!",
    display: '<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> there any sandwiches?<br><span class="arrow-line">→ No, there aren\'t.</span>',
    translation: "샌드위치가 있나요?<br>→ 아니요, 없어요.",
    options: ["Is", "Are", "Am", "Be"],
    answer: "Are",
    sentence_start: true,
    feedback_correct: "✅ 정답! 복수 명사(sandwiches) → Are there any ~?",
    feedback_wrong: "❌ 복수 명사의 의문문은 Are there any ~?예요!",
    reason: "복수 명사 → Are there any ~? / 단수 → Is there a ~?"
  },

  // ── Yes/No 답변 고르기 (이중 정답 방지: 문맥으로 답 유도) ──
  {
    instruction: "📌 질문에 맞는 답변을 골라요!",
    display: 'Is there a sandwich?<br><span class="arrow-line">→ Yes, _____</span>',
    translation: "샌드위치가 하나 있나요?<br>→ 네, _____",
    options: ["there is.", "there are.", "there isn't.", "there aren't."],
    answer: "there is.",
    feedback_correct: "✅ 정답! Is there ~?의 긍정 답변은 Yes, there is.예요.",
    feedback_wrong: "❌ Is there ~?의 긍정 답변은 Yes, there is.예요!",
    reason: "Is there ~? → Yes, there is. / No, there isn't."
  },
  {
    instruction: "📌 질문에 맞는 답변을 골라요!",
    display: 'Are there any balloons?<br><span class="arrow-line">→ No, _____</span>',
    translation: "풍선이 있나요?<br>→ 아니요, _____",
    options: ["there is.", "there are.", "there isn't.", "there aren't."],
    answer: "there aren't.",
    feedback_correct: "✅ 정답! Are there ~?의 부정 답변은 No, there aren't.예요.",
    feedback_wrong: "❌ Are there ~?의 부정 답변은 No, there aren't.예요!",
    reason: "Are there ~? → Yes, there are. / No, there aren't."
  },
];

let questions = [];
let currentIndex = 0;
let score = 0;
let wrongQuestions = [];
let answered = false;

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function startQuiz(qList) {
  questions = shuffle(qList);
  currentIndex = 0;
  score = 0;
  wrongQuestions = [];
  answered = false;
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizWrap').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[currentIndex];
  const total = questions.length;
  const pct = (currentIndex / total) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressInfo').textContent = (currentIndex + 1) + ' / ' + total;
  document.getElementById('instruction').innerHTML = q.instruction;

  const isLast = (currentIndex === total - 1);
  document.getElementById('nextBtn').textContent = isLast ? '결과 보기 🏁' : '다음 문제 →';
  document.getElementById('nextBtn').style.display = 'none';

  const shuffledOpts = shuffle(q.options);
  const displayOpts = (q.sentence_start)
    ? shuffledOpts.map(o => o.charAt(0).toUpperCase() + o.slice(1))
    : shuffledOpts;

  let html = `<div class="q-num">문제 ${currentIndex + 1} / ${total}</div>`;
  html += `<div class="q-sentence">${q.display}</div>`;
  html += `<div class="q-translation">${q.translation}</div>`;
  html += `<div class="options" id="optionsDiv">`;
  displayOpts.forEach(opt => {
    html += `<button class="opt-btn" onclick="selectAnswer(this, '${opt.replace(/'/g, "\\'")}')">${opt}</button>`;
  });
  html += `</div>`;
  html += `<div class="feedback" id="feedback"></div>`;

  document.getElementById('questionCard').innerHTML = html;
}

function selectAnswer(btn, selected) {
  if (answered) return;
  answered = true;

  const q = questions[currentIndex];
  const allBtns = document.querySelectorAll('.opt-btn');
  allBtns.forEach(b => b.disabled = true);

  const isCorrect = selected.toLowerCase() === q.answer.toLowerCase();
  const fb = document.getElementById('feedback');

  if (isCorrect) {
    btn.classList.add('correct');
    score++;
    fb.className = 'feedback correct';
    fb.innerHTML = `<div class="fb-title">${q.feedback_correct}</div>
      <div class="fb-reason">💡 ${q.reason}</div>`;
  } else {
    btn.classList.add('wrong');
    allBtns.forEach(b => {
      if (b.textContent.toLowerCase() === q.answer.toLowerCase()) b.classList.add('correct');
    });
    fb.className = 'feedback wrong';
    fb.innerHTML = `<div class="fb-title">${q.feedback_wrong}</div>
      <div class="fb-reason">✅ 정답: <strong>${q.answer}</strong><br>💡 ${q.reason}</div>`;
    wrongQuestions.push(q);
  }
  document.getElementById('nextBtn').style.display = 'block';
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= questions.length) showResult();
  else renderQuestion();
}

function showResult() {
  document.getElementById('quizWrap').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';

  const total = questions.length;
  const pct = Math.round((score / total) * 100);

  let stars = '⭐';
  let msg = '조금 더 연습해 봐요! 💪';
  if (pct >= 90) { stars = '⭐⭐⭐'; msg = '완벽해요! There is/are 마스터! 🎉'; }
  else if (pct >= 70) { stars = '⭐⭐'; msg = '잘했어요! 조금만 더 연습해요! 😊'; }

  document.getElementById('starDisplay').textContent = stars;
  document.getElementById('resultScore').textContent = score + ' / ' + total + ' (' + pct + '%)';
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('progressInfo').textContent = total + ' / ' + total;

  if (wrongQuestions.length > 0) {
    document.getElementById('wrongList').style.display = 'block';
    document.getElementById('retryWrongBtn').style.display = 'block';
    let wHtml = '';
    wrongQuestions.forEach(q => {
      const plain = q.display.replace(/<[^>]+>/g, '');
      wHtml += `<div class="wrong-item">
        <div class="wi-wrong">❌ ${plain}</div>
        <div class="wi-right">✅ 정답: ${q.answer}</div>
        <div class="wi-reason">💡 ${q.reason}</div>
      </div>`;
    });
    document.getElementById('wrongItems').innerHTML = wHtml;
  } else {
    document.getElementById('wrongList').style.display = 'none';
    document.getElementById('retryWrongBtn').style.display = 'none';
  }
}

function retryWrong() { startQuiz(wrongQuestions); }
function retryAll() { startQuiz(ALL_QUESTIONS); }

startQuiz(ALL_QUESTIONS);
</script>
</body>
</html>
