<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>영문법 탐정단 - SG3-0022 대명사·명사·관사 문장점검</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FEF0E6;
    --accent:#F5A623;
    --accent-dark:#D4891A;
    --type-c:#9B6DD1;
    --correct:#4CAF93;
    --wrong:#E8604C;
    --card-bg:#FFFFFF;
    --text:#3A3A3A;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Noto Sans KR','Nunito',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
  }
  .app{width:100%;max-width:480px;padding:16px;padding-bottom:40px;}
  header{text-align:center;margin-bottom:14px;}
  .badge{
    display:inline-block;background:var(--type-c);color:#fff;
    font-weight:800;font-size:13px;padding:4px 12px;
    border-radius:999px;margin-bottom:6px;letter-spacing:.5px;
  }
  h1{font-size:18px;font-weight:800;color:var(--accent-dark);margin:4px 0 0;line-height:1.4;}
  .progress-wrap{
    background:#fff;border-radius:999px;height:12px;overflow:hidden;
    margin:14px 0 18px;box-shadow:inset 0 0 0 2px #F5D9BA;
  }
  .progress-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent-dark));transition:width .3s ease;}
  .instruction-box{
    background:var(--accent);color:#fff;font-weight:700;font-size:14px;
    padding:12px 14px;border-radius:14px;margin-bottom:14px;line-height:1.55;text-align:center;
  }
  .card{background:var(--card-bg);border-radius:20px;padding:22px 18px;box-shadow:0 4px 16px rgba(212,137,26,0.12);}
  .card-instruction{
    font-size:12.5px;color:var(--type-c);font-weight:700;text-align:center;
    margin-bottom:14px;background:#F5EEFF;border-radius:10px;padding:6px 8px;
  }
  .qnum{font-size:12.5px;color:#999;font-weight:700;margin-bottom:10px;text-align:center;}
  .wrong-sentence-label{font-size:12px;color:var(--wrong);font-weight:700;text-align:center;margin-bottom:4px;}
  .sentence-box{
    background:#FFF5F3;border:2px solid #F5C6BE;border-radius:12px;
    padding:14px 12px;font-size:18px;font-weight:600;text-align:center;
    line-height:1.6;margin-bottom:18px;color:var(--text);word-break:keep-all;
  }
  .ask-label{font-size:13px;color:#666;font-weight:700;text-align:center;margin-bottom:10px;}
  .options{display:flex;flex-direction:column;gap:9px;margin-bottom:8px;}
  .opt-btn{
    font-family:inherit;font-size:16px;font-weight:700;padding:13px 14px;
    border:2.5px solid #E8D8F0;background:#FAF5FF;border-radius:14px;
    cursor:pointer;transition:.15s;color:var(--text);text-align:left;
  }
  .opt-btn:hover{border-color:var(--type-c);}
  .opt-btn.correct{background:var(--correct);border-color:var(--correct);color:#fff;}
  .opt-btn.wrong{background:var(--wrong);border-color:var(--wrong);color:#fff;}
  .opt-btn:disabled{cursor:default;}
  .feedback{
    display:none;margin-top:14px;padding:14px;border-radius:14px;
    font-size:14px;line-height:1.6;font-weight:500;
  }
  .feedback.correct{background:#E7F7F0;color:#2E8064;}
  .feedback.wrong{background:#FDEAE6;color:#B84534;}
  .fb-title{font-size:15px;font-weight:800;margin-bottom:8px;display:block;}
  .fb-row{margin-bottom:4px;}
  .fb-wrong-word{color:var(--wrong);text-decoration:line-through;font-weight:700;}
  .fb-right-word{color:#2A7D55;font-weight:800;}
  .fb-sentence{font-size:14.5px;font-weight:600;margin:4px 0 2px;line-height:1.55;display:block;}
  .fb-reason{font-size:13.5px;color:#555;line-height:1.5;margin-top:6px;display:block;}
  .next-btn{
    display:none;width:100%;margin-top:16px;padding:14px;font-size:16px;
    font-weight:800;color:#fff;background:var(--accent-dark);border:none;
    border-radius:14px;cursor:pointer;font-family:inherit;
  }
  .result-screen{display:none;text-align:center;}
  .result-screen .stars{font-size:44px;margin:18px 0 6px;}
  .result-screen .score{font-size:18px;font-weight:800;color:var(--accent-dark);margin-bottom:4px;}
  .result-screen .score-sub{font-size:13.5px;color:#888;margin-bottom:22px;}
  .result-btns{display:flex;flex-direction:column;gap:10px;}
  .result-btn{padding:14px;font-size:15.5px;font-weight:800;border-radius:14px;border:none;cursor:pointer;font-family:inherit;}
  .btn-retry-wrong{background:var(--wrong);color:#fff;}
  .btn-retry-all{background:var(--accent-dark);color:#fff;}
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="badge">C형</span>
    <h1>🔎 영문법 탐정단<br>대명사·명사·관사 문장점검</h1>
  </header>

  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>

  <div class="instruction-box">
    밑줄 친 부분 중 <strong>틀린 단어</strong>를 찾아 고르세요!<br>
    (대명사 / 명사·관사 / some·any 오류)
  </div>

  <div id="quizScreen" class="card">
    <div class="card-instruction">🔍 세 개 중 문법적으로 <strong>틀린 단어</strong>를 고르세요</div>
    <div class="qnum" id="qnum">문제 1 / 12</div>
    <div class="wrong-sentence-label">❌ 틀린 문장을 찾아라!</div>
    <div class="sentence-box" id="sentence"></div>
    <div class="ask-label">어느 단어가 틀렸을까요?</div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn">다음 문제 →</button>
  </div>

  <div id="resultScreen" class="card result-screen">
    <div class="stars" id="stars"></div>
    <div class="score" id="scoreText"></div>
    <div class="score-sub" id="scoreSub"></div>
    <div class="result-btns">
      <button class="result-btn btn-retry-wrong" id="retryWrongBtn">❌ 오답만 다시 풀기</button>
      <button class="result-btn btn-retry-all" id="retryAllBtn">🔄 전체 다시 풀기</button>
    </div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [

  /* ── L15 대명사 오류 (4문제) ── */
  {
    id:1,
    sentence:"I miss her. I want to call she tonight.",
    options:["miss","call","she"],
    answer:"she",
    wrongSentence:'I miss her. I want to call <span class="fb-wrong-word">she</span> tonight.',
    rightSentence:'I miss her. I want to call <span class="fb-right-word">her</span> tonight.',
    reason:"동사 call의 목적어 자리에는 목적격 <strong>her</strong>를 써야 해요. she는 주격이에요."
  },
  {
    id:2,
    sentence:"Look at the bird! Can you see he?",
    options:["Look","see","he"],
    answer:"he",
    wrongSentence:'Look at the bird! Can you see <span class="fb-wrong-word">he</span>?',
    rightSentence:'Look at the bird! Can you see <span class="fb-right-word">him</span>?',
    reason:"동사 see의 목적어 자리에는 목적격 <strong>him</strong>을 써야 해요. he는 주격이에요."
  },
  {
    id:3,
    sentence:"The children are noisy. I can hear they.",
    options:["noisy","hear","they"],
    answer:"they",
    wrongSentence:'The children are noisy. I can hear <span class="fb-wrong-word">they</span>.',
    rightSentence:'The children are noisy. I can hear <span class="fb-right-word">them</span>.',
    reason:"동사 hear의 목적어 자리에는 목적격 <strong>them</strong>을 써야 해요. they는 주격이에요."
  },
  {
    id:4,
    sentence:"I know that girl. She name is Lily.",
    options:["know","She","name"],
    answer:"She",
    wrongSentence:'I know that girl. <span class="fb-wrong-word">She</span> name is Lily.',
    rightSentence:'I know that girl. <span class="fb-right-word">Her</span> name is Lily.',
    reason:"명사 name 앞에서 소유를 나타낼 때는 소유격 <strong>Her</strong>를 써야 해요. She는 주격이에요."
  },

  /* ── L16 명사·관사 오류 (4문제) ── */
  {
    id:5,
    sentence:"There is a orange on the table.",
    options:["a","on","table"],
    answer:"a",
    wrongSentence:'There is <span class="fb-wrong-word">a</span> orange on the table.',
    rightSentence:'There is <span class="fb-right-word">an</span> orange on the table.',
    reason:"orange는 모음 소리(o)로 시작하므로 <strong>an</strong>을 써야 해요."
  },
  {
    id:6,
    sentence:"I have two tooths, but they hurt.",
    options:["two","tooths","hurt"],
    answer:"tooths",
    wrongSentence:'I have two <span class="fb-wrong-word">tooths</span>, but they hurt.',
    rightSentence:'I have two <span class="fb-right-word">teeth</span>, but they hurt.',
    reason:"tooth의 불규칙 복수형은 <strong>teeth</strong>예요. tooths는 틀린 형태예요."
  },
  {
    id:7,
    sentence:"There are three mouses in the house.",
    options:["three","mouses","house"],
    answer:"mouses",
    wrongSentence:'There are three <span class="fb-wrong-word">mouses</span> in the house.',
    rightSentence:'There are three <span class="fb-right-word">mice</span> in the house.',
    reason:"mouse의 불규칙 복수형은 <strong>mice</strong>예요. mouses는 틀린 형태예요."
  },
  {
    id:8,
    sentence:"I want to go to an library after school.",
    options:["want","an","after"],
    answer:"an",
    wrongSentence:'I want to go to <span class="fb-wrong-word">an</span> library after school.',
    rightSentence:'I want to go to <span class="fb-right-word">the</span> library after school.',
    reason:"특정한 장소(서로 알고 있는 도서관)를 가리킬 때는 정관사 <strong>the</strong>를 써야 해요."
  },

  /* ── L17 some / any 오류 (4문제) ── */
  {
    id:9,
    sentence:"Would you like any juice?",
    options:["like","any","juice"],
    answer:"any",
    wrongSentence:'Would you like <span class="fb-wrong-word">any</span> juice?',
    rightSentence:'Would you like <span class="fb-right-word">some</span> juice?',
    reason:"권유하는 질문(Would you like~?)에서는 <strong>some</strong>을 써야 해요."
  },
  {
    id:10,
    sentence:"I don\'t have some pencils in my bag.",
    options:["don\'t","some","pencils"],
    answer:"some",
    wrongSentence:'I don\'t have <span class="fb-wrong-word">some</span> pencils in my bag.',
    rightSentence:'I don\'t have <span class="fb-right-word">any</span> pencils in my bag.',
    reason:"부정문(don\'t)에서는 <strong>any</strong>를 써야 해요. some은 긍정문에 써요."
  },
  {
    id:11,
    sentence:"Are there some cookies left?",
    options:["Are","some","left"],
    answer:"some",
    wrongSentence:'Are there <span class="fb-wrong-word">some</span> cookies left?',
    rightSentence:'Are there <span class="fb-right-word">any</span> cookies left?',
    reason:"일반 질문문(Are there~?)에서는 <strong>any</strong>를 써야 해요."
  },
  {
    id:12,
    sentence:"We don\'t need some help right now.",
    options:["need","some","right"],
    answer:"some",
    wrongSentence:'We don\'t need <span class="fb-wrong-word">some</span> help right now.',
    rightSentence:'We don\'t need <span class="fb-right-word">any</span> help right now.',
    reason:"부정문(don\'t)에서는 <strong>any</strong>를 써야 해요."
  }

];

let queue=[], currentIndex=0, currentQ=null, wrongList=[], score=0, answered=false;

function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function shuffleNoFirstAnswer(arr,answer){
  let result,tries=0;
  do{result=shuffle(arr);tries++;}
  while(result[0].toLowerCase()===answer.toLowerCase()&&tries<20);
  return result;
}

function startQuiz(list){
  queue=list;currentIndex=0;score=0;wrongList=[];
  document.getElementById("quizScreen").style.display="block";
  document.getElementById("resultScreen").style.display="none";
  showQuestion();
}

function showQuestion(){
  answered=false;
  currentQ=queue[currentIndex];
  document.getElementById("qnum").textContent="문제 "+(currentIndex+1)+" / "+queue.length;
  document.getElementById("progressBar").style.width=Math.round((currentIndex/queue.length)*100)+"%";
  document.getElementById("sentence").textContent=currentQ.sentence;

  const optWrap=document.getElementById("options");
  optWrap.innerHTML="";
  const shuffled=shuffleNoFirstAnswer(currentQ.options,currentQ.answer);
  shuffled.forEach(function(opt){
    const btn=document.createElement("button");
    btn.className="opt-btn";
    btn.textContent=opt;
    btn.onclick=function(){selectAnswer(opt,btn);};
    optWrap.appendChild(btn);
  });

  document.getElementById("feedback").style.display="none";
  document.getElementById("feedback").innerHTML="";
  document.getElementById("nextBtn").style.display="none";
}

function selectAnswer(selected,btnEl){
  if(answered)return;
  answered=true;
  const isCorrect=selected.toLowerCase()===currentQ.answer.toLowerCase();
  document.querySelectorAll(".opt-btn").forEach(function(b){
    b.disabled=true;
    if(b.textContent.toLowerCase()===currentQ.answer.toLowerCase())b.classList.add("correct");
    else if(b===btnEl&&!isCorrect)b.classList.add("wrong");
  });

  if(isCorrect)score++;else wrongList.push(currentQ);

  const fb=document.getElementById("feedback");
  fb.style.display="block";
  fb.className="feedback "+(isCorrect?"correct":"wrong");
  fb.innerHTML=
    '<span class="fb-title">'+(isCorrect?"🎉 정답이에요!":"❌ 다시 확인해봐요!")+'</span>'+
    '<div class="fb-row">❌ 틀린 문장: <span class="fb-sentence">'+currentQ.wrongSentence+'</span></div>'+
    '<div class="fb-row">✅ 올바른 문장: <span class="fb-sentence">'+currentQ.rightSentence+'</span></div>'+
    '<span class="fb-reason">'+currentQ.reason+'</span>';

  const nb=document.getElementById("nextBtn");
  nb.style.display="block";
  nb.textContent=(currentIndex===queue.length-1)?"결과 보기 🏁":"다음 문제 →";
}

document.getElementById("nextBtn").addEventListener("click",function(){
  if(currentIndex<queue.length-1){currentIndex++;showQuestion();}
  else showResult();
});

function showResult(){
  document.getElementById("progressBar").style.width="100%";
  document.getElementById("quizScreen").style.display="none";
  document.getElementById("resultScreen").style.display="block";
  const total=queue.length,pct=Math.round((score/total)*100);
  document.getElementById("stars").textContent=pct===100?"⭐⭐⭐":pct>=80?"⭐⭐":"⭐";
  document.getElementById("scoreText").textContent=score+" / "+total+"개 정답!";
  document.getElementById("scoreSub").textContent=pct+"점이에요.";
  document.getElementById("retryWrongBtn").style.display=wrongList.length>0?"block":"none";
}

document.getElementById("retryWrongBtn").addEventListener("click",function(){startQuiz(shuffle(wrongList));});
document.getElementById("retryAllBtn").addEventListener("click",function(){startQuiz(shuffle(ALL_QUESTIONS));});

startQuiz(shuffle(ALL_QUESTIONS));
</script>
</body>
</html>
