<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>영문법 탐정단 - SG3-0024 조동사</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FEF0E6;
    --accent:#F5A623;
    --accent-dark:#D4891A;
    --type-a:#4A90D9;
    --correct:#4CAF93;
    --wrong:#E8604C;
    --card-bg:#FFFFFF;
    --text:#3A3A3A;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Noto Sans KR','Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;}
  .app{width:100%;max-width:480px;padding:16px;padding-bottom:40px;}
  header{text-align:center;margin-bottom:14px;}
  .badge{display:inline-block;background:var(--type-a);color:#fff;font-weight:800;font-size:13px;padding:4px 12px;border-radius:999px;margin-bottom:6px;letter-spacing:.5px;}
  h1{font-size:19px;font-weight:800;color:var(--accent-dark);margin:4px 0 0;}
  .progress-wrap{background:#fff;border-radius:999px;height:12px;overflow:hidden;margin:14px 0 18px;box-shadow:inset 0 0 0 2px #F5D9BA;}
  .progress-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent-dark));transition:width .3s ease;}
  .instruction-box{background:var(--accent);color:#fff;font-weight:700;font-size:14px;padding:12px 14px;border-radius:14px;margin-bottom:14px;line-height:1.55;text-align:center;}
  .card{background:var(--card-bg);border-radius:20px;padding:22px 18px;box-shadow:0 4px 16px rgba(212,137,26,0.12);}
  .card-instruction{font-size:12.5px;color:var(--accent-dark);font-weight:700;text-align:center;margin-bottom:14px;background:#FFF3E4;border-radius:10px;padding:6px 8px;}
  .qnum{font-size:12.5px;color:#999;font-weight:700;margin-bottom:6px;text-align:center;}
  .sentence{font-size:19px;font-weight:600;text-align:center;line-height:1.65;margin:10px 0 6px;color:var(--text);}
  .sentence .hl{color:var(--accent-dark);border-bottom:2.5px solid var(--accent-dark);font-weight:800;}
  .blank{display:inline-block;min-width:52px;border-bottom:2.5px solid #444;margin:0 4px;}
  .hint{font-size:13px;color:#888;text-align:center;margin-bottom:18px;font-weight:500;}
  .options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;}
  .opt-btn{font-family:inherit;font-size:16px;font-weight:700;padding:14px 8px;border:2.5px solid #C9DFFB;background:#F0F7FF;border-radius:14px;cursor:pointer;transition:.15s;color:var(--text);}
  .opt-btn:hover{border-color:var(--type-a);}
  .opt-btn.correct{background:var(--correct);border-color:var(--correct);color:#fff;}
  .opt-btn.wrong{background:var(--wrong);border-color:var(--wrong);color:#fff;}
  .opt-btn:disabled{cursor:default;}
  .feedback{display:none;margin-top:14px;padding:14px;border-radius:14px;font-size:14px;line-height:1.6;font-weight:500;}
  .feedback.correct{background:#E7F7F0;color:#2E8064;}
  .feedback.wrong{background:#FDEAE6;color:#B84534;}
  .fb-title{font-size:15px;font-weight:800;margin-bottom:6px;display:block;}
  .next-btn{display:none;width:100%;margin-top:16px;padding:14px;font-size:16px;font-weight:800;color:#fff;background:var(--accent-dark);border:none;border-radius:14px;cursor:pointer;font-family:inherit;}
  .result-screen{display:none;text-align:center;}
  .result-screen .stars{font-size:44px;margin:18px 0 6px;}
  .result-screen .score{font-size:18px;font-weight:800;color:var(--accent-dark);margin-bottom:4px;}
  .result-screen .score-sub{font-size:13.5px;color:#888;margin-bottom:22px;}
  .result-btns{display:flex;flex-direction:column;gap:10px;}
  .result-btn{padding:14px;font-size:15.5px;font-weight:800;border-radius:14px;border:none;cursor:pointer;font-family:inherit;}
  .btn-retry-wrong{background:var(--wrong);color:#fff;}
  .btn-retry-all{background:var(--accent-dark);color:#fff;}
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="badge">A형</span>
    <h1>🔎 영문법 탐정단 : 조동사</h1>
  </header>

  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>

  <div class="instruction-box">
    빈칸에 들어갈 알맞은 <strong>조동사</strong>를 고르세요!<br>
    (can / can't / should / shouldn't / must / may)
  </div>

  <div id="quizScreen" class="card">
    <div class="card-instruction">✅ 빈칸에 알맞은 조동사를 골라보세요</div>
    <div class="qnum" id="qnum">문제 1 / 12</div>
    <div class="sentence" id="sentence"></div>
    <div class="hint" id="hint"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn">다음 문제 →</button>
  </div>

  <div id="resultScreen" class="card result-screen">
    <div class="stars" id="stars"></div>
    <div class="score" id="scoreText"></div>
    <div class="score-sub" id="scoreSub"></div>
    <div class="result-btns">
      <button class="result-btn btn-retry-wrong" id="retryWrongBtn">❌ 오답만 다시 풀기</button>
      <button class="result-btn btn-retry-all" id="retryAllBtn">🔄 전체 다시 풀기</button>
    </div>
  </div>
</div>

<script>
/*
  선택지 설계 원칙 (이번 버전):
  - 부정형(can't / shouldn't)이 항상 선택지에 2개 이상 포함
  - 긍정형(can / should / must / may)도 2개 포함
  - 힌트는 상황 맥락만 제공, 긍정/부정 여부는 명시하지 않음
  → 아이가 조동사 의미를 직접 판단해야 정답 선택 가능
*/
const ALL_QUESTIONS = [

  /* ── can / can't (3문제) ── */
  {
    id:1,
    sentence:'My little brother <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> <span class="hl">swim</span> very well.',
    options:["can","can\'t","should","shouldn\'t"],
    answer:"can",
    hint:"내 남동생은 수영을 아주 잘할 수 있어요.",
    reason:"<strong>can</strong>은 '~할 수 있다'는 능력을 나타내요. 실력이 뛰어나다고 했으니 can이 맞아요."
  },
  {
    id:2,
    sentence:'Mrs. Park <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> <span class="hl">drive</span> a car. She never learned it.',
    options:["can","can\'t","must","may"],
    answer:"can\'t",
    hint:"박 선생님은 차를 운전할 수 없어요. 배운 적이 없거든요.",
    reason:"<strong>can\'t</strong>은 '~할 수 없다'는 능력 부정이에요. 배운 적이 없으면 할 수 없겠죠."
  },
  {
    id:3,
    sentence:'Wow! She <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> <span class="hl">speak</span> three languages.',
    options:["can\'t","can","shouldn\'t","must"],
    answer:"can",
    hint:"와! 그녀는 세 가지 언어를 말할 수 있어요!",
    reason:"<strong>can</strong>은 '~할 수 있다'는 능력이에요. 감탄하는 상황이니 '할 수 있다'가 맞아요."
  },

  /* ── should / shouldn't (3문제) ── */
  {
    id:4,
    sentence:'You <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> <span class="hl">eat</span> more vegetables. They are good for you.',
    options:["should","shouldn\'t","can\'t","may"],
    answer:"should",
    hint:"너는 채소를 더 먹어야 해요. 몸에 좋거든요.",
    reason:"<strong>should</strong>는 '~하는 게 좋다'는 충고예요. 몸에 좋다고 했으니 먹으라는 충고가 맞아요."
  },
  {
    id:5,
    sentence:'You <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> <span class="hl">run</span> in the hallway. It is dangerous.',
    options:["should","shouldn\'t","can","must"],
    answer:"shouldn\'t",
    hint:"너는 복도에서 뛰면 안 돼요. 위험하거든요.",
    reason:"<strong>shouldn\'t</strong>는 '~하면 안 된다'는 충고예요. 위험하다고 했으니 뛰지 말라는 충고가 맞아요."
  },
  {
    id:6,
    sentence:'You look really tired. You <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> <span class="hl">rest</span> today.',
    options:["shouldn\'t","should","can\'t","may"],
    answer:"should",
    hint:"너 정말 피곤해 보여. 오늘 쉬어야 해.",
    reason:"<strong>should</strong>는 '~하는 게 좋다'는 충고예요. 피곤해 보이니 쉬라는 충고가 맞아요."
  },

  /* ── must (2문제) ── */
  {
    id:7,
    sentence:'You <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> <span class="hl">wear</span> a helmet when you ride a bike.',
    options:["must","may","can","shouldn\'t"],
    answer:"must",
    hint:"자전거를 탈 때는 반드시 헬멧을 써야만 해요.",
    reason:"<strong>must</strong>는 '반드시 ~해야 한다'는 강한 의무예요. 규칙이라면 반드시 해야 하죠."
  },
  {
    id:8,
    sentence:'Students <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> <span class="hl">bring</span> their ID cards to enter.',
    options:["can\'t","must","shouldn\'t","may"],
    answer:"must",
    hint:"학생들은 반드시 학생증을 가지고 와야만 해요.",
    reason:"<strong>must</strong>는 '반드시 ~해야 한다'는 강한 의무예요. 필수 조건이니 must가 맞아요."
  },

  /* ── may (2문제) ── */
  {
    id:9,
    sentence:'You <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> <span class="hl">use</span> my pencil if you need one.',
    options:["may","must","shouldn\'t","can\'t"],
    answer:"may",
    hint:"필요하면 제 연필을 써도 돼요.",
    reason:"<strong>may</strong>는 '~해도 된다'는 허가예요. 써도 괜찮다고 허락하는 상황이에요."
  },
  {
    id:10,
    sentence:'It <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> <span class="hl">rain</span> later. The sky looks dark.',
    options:["must","may","should","can\'t"],
    answer:"may",
    hint:"나중에 비가 올지도 몰라요. 하늘이 어두워요.",
    reason:"<strong>may</strong>는 '~일지도 모른다'는 불확실한 추측이에요. 확실하지 않을 때 써요."
  },

  /* ── 혼합 (2문제) ── */
  {
    id:11,
    sentence:'You <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> <span class="hl">talk</span> loudly. Others are studying.',
    options:["should","shouldn\'t","can","must"],
    answer:"shouldn\'t",
    hint:"너는 크게 말하면 안 돼요. 다른 사람들이 공부하고 있어요.",
    reason:"<strong>shouldn\'t</strong>는 '~하면 안 된다'는 충고예요. 조용한 곳에서 크게 말하면 안 되죠."
  },
  {
    id:12,
    sentence:'He <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> <span class="hl">cook</span> at all. He always burns everything.',
    options:["can","can\'t","should","may"],
    answer:"can\'t",
    hint:"그는 요리를 전혀 할 수 없어요. 할 때마다 다 태우거든요.",
    reason:"<strong>can\'t</strong>은 '~할 수 없다'는 능력 부정이에요. 항상 태운다면 요리를 못하는 거죠."
  }

];

let queue=[], currentIndex=0, currentQ=null, wrongList=[], score=0, answered=false;

function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function shuffleNoFirstAnswer(arr,answer){
  let result,tries=0;
  do{result=shuffle(arr);tries++;}
  while(result[0].toLowerCase()===answer.toLowerCase()&&tries<20);
  return result;
}

function startQuiz(list){
  queue=list;currentIndex=0;score=0;wrongList=[];
  document.getElementById("quizScreen").style.display="block";
  document.getElementById("resultScreen").style.display="none";
  showQuestion();
}

function showQuestion(){
  answered=false;
  currentQ=queue[currentIndex];
  document.getElementById("qnum").textContent="문제 "+(currentIndex+1)+" / "+queue.length;
  document.getElementById("progressBar").style.width=Math.round((currentIndex/queue.length)*100)+"%";
  document.getElementById("sentence").innerHTML=currentQ.sentence;
  document.getElementById("hint").textContent="💡 "+currentQ.hint;

  const optWrap=document.getElementById("options");
  optWrap.innerHTML="";
  const shuffled=shuffleNoFirstAnswer(currentQ.options,currentQ.answer);
  shuffled.forEach(function(opt){
    const btn=document.createElement("button");
    btn.className="opt-btn";
    btn.textContent=opt;
    btn.onclick=function(){selectAnswer(opt,btn);};
    optWrap.appendChild(btn);
  });

  document.getElementById("feedback").style.display="none";
  document.getElementById("feedback").innerHTML="";
  document.getElementById("nextBtn").style.display="none";
}

function selectAnswer(selected,btnEl){
  if(answered)return;
  answered=true;
  const isCorrect=selected.toLowerCase()===currentQ.answer.toLowerCase();
  document.querySelectorAll(".opt-btn").forEach(function(b){
    b.disabled=true;
    if(b.textContent.toLowerCase()===currentQ.answer.toLowerCase())b.classList.add("correct");
    else if(b===btnEl&&!isCorrect)b.classList.add("wrong");
  });

  if(isCorrect)score++;else wrongList.push(currentQ);

  const fb=document.getElementById("feedback");
  fb.style.display="block";
  fb.className="feedback "+(isCorrect?"correct":"wrong");
  fb.innerHTML=
    '<span class="fb-title">'+(isCorrect?"🎉 정답이에요!":"❌ 다시 확인해봐요!")+'</span>'+
    '정답: <strong>'+currentQ.answer+'</strong><br>'+currentQ.reason;

  const nb=document.getElementById("nextBtn");
  nb.style.display="block";
  nb.textContent=(currentIndex===queue.length-1)?"결과 보기 🏁":"다음 문제 →";
}

document.getElementById("nextBtn").addEventListener("click",function(){
  if(currentIndex<queue.length-1){currentIndex++;showQuestion();}
  else showResult();
});

function showResult(){
  document.getElementById("progressBar").style.width="100%";
  document.getElementById("quizScreen").style.display="none";
  document.getElementById("resultScreen").style.display="block";
  const total=queue.length,pct=Math.round((score/total)*100);
  document.getElementById("stars").textContent=pct===100?"⭐⭐⭐":pct>=80?"⭐⭐":"⭐";
  document.getElementById("scoreText").textContent=score+" / "+total+"개 정답!";
  document.getElementById("scoreSub").textContent=pct+"점이에요.";
  document.getElementById("retryWrongBtn").style.display=wrongList.length>0?"block":"none";
}

document.getElementById("retryWrongBtn").addEventListener("click",function(){startQuiz(shuffle(wrongList));});
document.getElementById("retryAllBtn").addEventListener("click",function(){startQuiz(shuffle(ALL_QUESTIONS));});

startQuiz(shuffle(ALL_QUESTIONS));
</script>
</body>
</html>
