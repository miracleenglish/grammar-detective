<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>영문법 탐정단 - UG1-0012 will 미래</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#E8F5EC;
    --accent:#3A9D6E;
    --accent-dark:#2D7A57;
    --type-a:#4A90D9;
    --correct:#4CAF93;
    --wrong:#E8604C;
    --card-bg:#FFFFFF;
    --text:#2A2A2A;
    --hl:#D4891A;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Noto Sans KR','Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;}
  .app{width:100%;max-width:480px;padding:16px;padding-bottom:40px;}

  header{text-align:center;margin-bottom:14px;}
  .badge{display:inline-block;background:var(--type-a);color:#fff;font-weight:800;font-size:13px;padding:4px 12px;border-radius:999px;margin-bottom:6px;letter-spacing:.5px;}
  h1{font-size:18px;font-weight:800;color:var(--accent-dark);margin:4px 0 0;line-height:1.4;}

  .progress-wrap{background:#fff;border-radius:999px;height:12px;overflow:hidden;margin:14px 0 18px;box-shadow:inset 0 0 0 2px #B8DEC8;}
  .progress-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent-dark));transition:width .3s ease;}

  .instruction-box{background:var(--accent);color:#fff;font-weight:700;font-size:14px;padding:12px 14px;border-radius:14px;margin-bottom:14px;line-height:1.6;text-align:center;}

  .card{background:var(--card-bg);border-radius:20px;padding:22px 18px;box-shadow:0 4px 16px rgba(45,122,87,0.13);}
  .card-instruction{font-size:15px;color:var(--accent-dark);font-weight:800;text-align:center;margin-bottom:14px;background:#EAF7F0;border-radius:10px;padding:8px 10px;}
  .qnum{font-size:12.5px;color:#999;font-weight:700;margin-bottom:8px;text-align:center;}

  .context-sentence{font-size:15px;color:#777;text-align:center;line-height:1.6;margin:0 0 6px;font-weight:600;background:#F5F5F5;border-radius:8px;padding:7px 10px;}
  .sentence{font-size:19px;font-weight:700;text-align:center;line-height:1.75;margin:8px 0 20px;color:var(--text);}
  .blank{display:inline-block;min-width:100px;border-bottom:2.5px solid var(--accent-dark);margin:0 4px;vertical-align:bottom;height:1.3em;}
  .hl{color:var(--hl);border-bottom:2px solid var(--hl);font-weight:800;}

  .options{display:flex;flex-direction:column;gap:10px;margin-bottom:8px;}
  .opt-btn{font-family:'Nunito','Noto Sans KR',sans-serif;font-size:18px;font-weight:700;padding:14px 10px;border:2.5px solid #B8DEC8;background:#F0FAF4;border-radius:14px;cursor:pointer;transition:.15s;color:var(--text);text-align:center;}
  .opt-btn:hover:not(:disabled){border-color:var(--accent);background:#DFF5E8;}
  .opt-btn.correct{background:var(--correct);border-color:var(--correct);color:#fff;}
  .opt-btn.wrong{background:var(--wrong);border-color:var(--wrong);color:#fff;}
  .opt-btn:disabled{cursor:default;}

  .feedback{display:none;margin-top:14px;padding:14px;border-radius:14px;font-size:14px;line-height:1.65;font-weight:500;}
  .feedback.correct-fb{background:#E7F7F0;color:#2D7A57;border-left:4px solid var(--correct);}
  .feedback.wrong-fb{background:#FDEAE6;color:#B84534;border-left:4px solid var(--wrong);}
  .fb-title{font-size:15px;font-weight:800;margin-bottom:6px;display:block;}
  .fb-hint{font-size:13px;color:#555;margin-top:7px;padding-top:7px;border-top:1px solid rgba(0,0,0,.08);font-style:italic;}

  .next-btn{display:none;width:100%;margin-top:14px;padding:14px;font-size:16px;font-weight:800;color:#fff;background:var(--accent-dark);border:none;border-radius:14px;cursor:pointer;font-family:inherit;}
  .next-btn:hover{background:#22604A;}

  .result-screen{display:none;text-align:center;}
  .result-screen .stars{font-size:44px;margin:18px 0 6px;}
  .result-screen .score{font-size:22px;font-weight:800;color:var(--accent-dark);margin-bottom:4px;}
  .result-screen .score-sub{font-size:14px;color:#888;margin-bottom:24px;}
  .result-btns{display:flex;flex-direction:column;gap:10px;}
  .result-btn{padding:14px;font-size:15.5px;font-weight:800;border-radius:14px;border:none;cursor:pointer;font-family:inherit;}
  .btn-retry-wrong{background:var(--wrong);color:#fff;}
  .btn-retry-all{background:var(--accent-dark);color:#fff;}
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="badge">A형</span>
    <h1>🔎 영문법 탐정단<br>will 미래</h1>
  </header>

  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>

  <div class="instruction-box">
    빈칸에 알맞은 형태를 고르세요!<br>
    📌 긍정: will + 동사원형 &nbsp;·&nbsp; 부정: won't + 동사원형<br>
    📌 의문: Will + 주어 + 동사원형? &nbsp;·&nbsp; 단답: Yes, will / No, won't
  </div>

  <div id="quizScreen" class="card">
    <div class="card-instruction">빈칸에 알맞은 표현은?</div>
    <div class="qnum" id="qnum">문제 1 / 12</div>
    <div class="context-sentence" id="contextSentence"></div>
    <div class="sentence" id="sentence"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn">다음 문제 →</button>
  </div>

  <div id="resultScreen" class="card result-screen">
    <div class="stars" id="stars"></div>
    <div class="score" id="scoreText"></div>
    <div class="score-sub" id="scoreSub"></div>
    <div class="result-btns">
      <button class="result-btn btn-retry-wrong" id="retryWrongBtn">❌ 오답만 다시 풀기</button>
      <button class="result-btn btn-retry-all" id="retryAllBtn">🔄 전체 다시 풀기</button>
    </div>
  </div>
</div>

<script>
/*
  UG1-0012  will 미래  A형  L11
  긍정(4): will + 동사원형 (시간 신호어 .hl 강조)
  부정(4): won't + 동사원형
  의문(2): Will 문두 선택
  단답형(2): Yes, will / No, won't
  12문제 / shuffleNoFirstAnswer() 적용
*/
const ALL_QUESTIONS = [

  /* ── 긍정문: will + 동사원형 (4문제) ── */
  {
    context:'',
    sentence:'I <span class="blank"></span> you with your homework <span class="hl">tomorrow</span>.',
    options:['will help','helps','helped'],
    answer:'will help',
    hint:'내일 숙제를 도와줄게요.',
    reason:'<span style="color:#D4891A"><strong>tomorrow</strong></span>는 미래 신호어예요. 미래는 <strong>will + 동사원형</strong>을 써요. → <strong>will help</strong>'
  },
  {
    context:'',
    sentence:'She <span class="blank"></span> at the game <span class="hl">next Saturday</span>.',
    options:['will be','is','was'],
    answer:'will be',
    hint:'그녀는 다음 주 토요일 경기에 있을 거예요.',
    reason:'<span style="color:#D4891A"><strong>next Saturday</strong></span>는 미래 신호어예요. → <strong>will be</strong>'
  },
  {
    context:'',
    sentence:'It <span class="blank"></span> this afternoon.',
    options:['will rain','rains','rained'],
    answer:'will rain',
    hint:'오늘 오후에 비가 올 거예요.',
    reason:'오늘 오후의 예측·예보는 미래 시제 <strong>will + 동사원형</strong>으로 표현해요. → <strong>will rain</strong>'
  },
  {
    context:'',
    sentence:'They <span class="blank"></span> to Japan <span class="hl">next month</span>.',
    options:['will travel','travels','are traveling'],
    answer:'will travel',
    hint:'그들은 다음 달에 일본으로 여행할 거예요.',
    reason:'<span style="color:#D4891A"><strong>next month</strong></span>는 미래 신호어예요. → <strong>will travel</strong>'
  },

  /* ── 부정문: won't + 동사원형 (4문제) ── */
  {
    context:'',
    sentence:'I <span class="blank"></span> late for school <span class="hl">tomorrow</span>.',
    options:["won't be","am not","don't be"],
    answer:"won't be",
    hint:'나는 내일 학교에 늦지 않을 거예요.',
    reason:'미래 부정문은 <strong>won\'t (= will not) + 동사원형</strong>이에요. → <strong>won\'t be</strong>'
  },
  {
    context:'',
    sentence:'I <span class="blank"></span> be home until 9 PM <span class="hl">tonight</span>.',
    options:["won't be","am not being","don't be"],
    answer:"won't be",
    hint:'나는 오늘 밤 9시까지 집에 없을 거예요.',
    reason:'<span style="color:#D4891A"><strong>tonight</strong></span>은 미래 신호어예요. 미래 부정은 <strong>won\'t + 동사원형</strong>이에요. → <strong>won\'t be</strong>'
  },
  {
    context:'',
    sentence:'He <span class="blank"></span> your birthday. He promised!',
    options:["won't forget","doesn't forget","isn't forgetting"],
    answer:"won't forget",
    hint:'그는 네 생일을 잊지 않을 거예요. 그가 약속했어요.',
    reason:'미래 부정 의지를 나타낼 때는 <strong>won\'t + 동사원형</strong>이에요. → <strong>won\'t forget</strong>'
  },
  {
    context:'',
    sentence:'We <span class="blank"></span> them again until summer.',
    options:["won't see","don't see","aren't seeing"],
    answer:"won't see",
    hint:'우리는 여름까지 그들을 다시 못 볼 거예요.',
    reason:'미래의 상황을 부정할 때는 <strong>won\'t + 동사원형</strong>이에요. → <strong>won\'t see</strong>'
  },

  /* ── 의문문: Will (2문제) ── */
  {
    context:'',
    sentence:'<span class="blank"></span> you come to my party <span class="hl">on Saturday</span>?',
    options:['Will','Do','Are'],
    answer:'Will',
    hint:'토요일 내 파티에 올 거예요?',
    reason:'미래 의문문은 <strong>Will</strong>로 시작해요. → <strong>Will</strong> you come...?'
  },
  {
    context:'',
    sentence:'<span class="blank"></span> it be cold <span class="hl">tomorrow</span>?',
    options:['Will','Does','Is'],
    answer:'Will',
    hint:'내일 날씨가 추울까요?',
    reason:'미래를 묻는 의문문은 <strong>Will</strong>로 시작해요. → <strong>Will</strong> it be...?'
  },

  /* ── 단답형: will / won't (2문제) ── */
  {
    context:'Will you be home tonight?',
    sentence:'"Yes, I ___."',
    options:['will','do','am'],
    answer:'will',
    hint:'"오늘 밤 집에 있을 거예요?" "네, 있을 거예요."',
    reason:'Will 의문문의 긍정 단답: <strong>Yes, 주어 + will.</strong> → Yes, I <strong>will</strong>.'
  },
  {
    context:'Will she call you back?',
    sentence:'"No, she ___."',
    options:["won't","doesn't","isn't"],
    answer:"won't",
    hint:'"그녀가 다시 전화할까요?" "아니요, 안 할 거예요."',
    reason:'Will 의문문의 부정 단답: <strong>No, 주어 + won\'t.</strong> → No, she <strong>won\'t</strong>.'
  }

];

let queue=[], currentIndex=0, currentQ=null, wrongList=[], score=0, answered=false;

function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function shuffleNoFirstAnswer(arr,answer){
  let result,tries=0;
  do{result=shuffle(arr);tries++;}
  while(result[0].toLowerCase()===answer.toLowerCase()&&tries<20);
  return result;
}

function startQuiz(list){
  queue=list;currentIndex=0;score=0;wrongList=[];
  document.getElementById('quizScreen').style.display='block';
  document.getElementById('resultScreen').style.display='none';
  showQuestion();
}

function showQuestion(){
  answered=false;
  currentQ=queue[currentIndex];
  document.getElementById('qnum').textContent='문제 '+(currentIndex+1)+' / '+queue.length;
  document.getElementById('progressBar').style.width=Math.round((currentIndex/queue.length)*100)+'%';

  const ctxEl=document.getElementById('contextSentence');
  if(currentQ.context){
    ctxEl.textContent='📌 '+currentQ.context;
    ctxEl.style.display='block';
  } else {
    ctxEl.style.display='none';
  }
  document.getElementById('sentence').innerHTML=currentQ.sentence;

  const optWrap=document.getElementById('options');
  optWrap.innerHTML='';
  const shuffled=shuffleNoFirstAnswer(currentQ.options,currentQ.answer);
  shuffled.forEach(function(opt){
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.textContent=opt;
    btn.onclick=function(){selectAnswer(opt,btn);};
    optWrap.appendChild(btn);
  });

  const fb=document.getElementById('feedback');
  fb.style.display='none';
  fb.innerHTML='';
  fb.className='feedback';
  document.getElementById('nextBtn').style.display='none';
}

function selectAnswer(selected,btnEl){
  if(answered)return;
  answered=true;
  const isCorrect=selected.toLowerCase()===currentQ.answer.toLowerCase();

  document.querySelectorAll('.opt-btn').forEach(function(b){
    b.disabled=true;
    if(b.textContent.toLowerCase()===currentQ.answer.toLowerCase()) b.classList.add('correct');
    else if(b===btnEl&&!isCorrect) b.classList.add('wrong');
  });

  if(isCorrect) score++;
  else wrongList.push(currentQ);

  const fb=document.getElementById('feedback');
  fb.style.display='block';
  if(isCorrect){
    fb.className='feedback correct-fb';
    fb.innerHTML=
      '<span class="fb-title">🎉 정답이에요!</span>'+
      currentQ.reason+
      '<div class="fb-hint">💡 '+currentQ.hint+'</div>';
  } else {
    fb.className='feedback wrong-fb';
    fb.innerHTML=
      '<span class="fb-title">❌ 틀렸어요!</span>'+
      currentQ.reason+
      '<div class="fb-hint">💡 '+currentQ.hint+'</div>';
  }

  const nb=document.getElementById('nextBtn');
  nb.style.display='block';
  nb.textContent=(currentIndex===queue.length-1)?'결과 보기 🏁':'다음 문제 →';
}

document.getElementById('nextBtn').addEventListener('click',function(){
  if(currentIndex<queue.length-1){currentIndex++;showQuestion();}
  else showResult();
});

function showResult(){
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('quizScreen').style.display='none';
  document.getElementById('resultScreen').style.display='block';
  const total=queue.length, pct=Math.round((score/total)*100);
  document.getElementById('stars').textContent=pct===100?'⭐⭐⭐':pct>=80?'⭐⭐':'⭐';
  document.getElementById('scoreText').textContent=score+' / '+total+'개 정답!';
  document.getElementById('scoreSub').textContent=pct+'점이에요.';
  document.getElementById('retryWrongBtn').style.display=wrongList.length>0?'block':'none';
}

document.getElementById('retryWrongBtn').addEventListener('click',function(){startQuiz(shuffle(wrongList));});
document.getElementById('retryAllBtn').addEventListener('click',function(){startQuiz(shuffle(ALL_QUESTIONS));});

startQuiz(shuffle(ALL_QUESTIONS));
</script>
</body>
</html>
