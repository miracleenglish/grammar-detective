<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SG2-0003 | be동사 의문문</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FEF0E6;
    --accent: #F5A623;
    --accent-dark: #D4891A;
    --correct: #4CAF93;
    --wrong: #E8604C;
    --card: #ffffff;
    --text: #333333;
    --light-text: #777777;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  .header {
    background: var(--accent-dark);
    color: white;
    padding: 14px 20px 10px;
    text-align: center;
  }
  .header .series { font-size: 11px; opacity: 0.85; letter-spacing: 1px; margin-bottom: 2px; }
  .header h1 { font-size: 18px; font-weight: 900; }
  .header .sub { font-size: 12px; opacity: 0.85; margin-top: 2px; }
  .badge {
    display: inline-block;
    background: #4A90D9;
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 20px;
    margin-top: 6px;
  }

  .progress-wrap { background: #f0d9c8; height: 8px; width: 100%; }
  .progress-bar { height: 8px; background: var(--accent); transition: width 0.4s ease; border-radius: 0 4px 4px 0; }
  .progress-info { text-align: center; font-size: 12px; color: var(--light-text); padding: 5px; }

  .quiz-wrap { max-width: 540px; margin: 0 auto; padding: 16px 16px 0; }

  .instruction {
    background: var(--accent);
    color: white;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 14px;
    text-align: center;
  }

  .question-card {
    background: var(--card);
    border-radius: 16px;
    padding: 20px 18px 16px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.09);
    margin-bottom: 14px;
  }
  .q-num { font-size: 11px; font-weight: 700; color: var(--accent-dark); margin-bottom: 8px; }
  .q-sentence {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 6px;
  }
  .q-hint {
    font-size: 13px;
    color: #999;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .q-translation { font-size: 12px; color: var(--light-text); margin-bottom: 14px; }
  .hl { color: var(--accent-dark); border-bottom: 2.5px solid var(--accent-dark); font-weight: 800; padding-bottom: 1px; }

  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 9px;
  }
  .opt-btn {
    border: 2.5px solid #e0cabb;
    background: #fff9f5;
    border-radius: 12px;
    padding: 11px 8px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    color: var(--text);
    line-height: 1.4;
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--accent); background: #fff0e0; transform: translateY(-1px); }
  .opt-btn.correct { background: #e8f8f3; border-color: var(--correct); color: var(--correct); }
  .opt-btn.wrong { background: #fdecea; border-color: var(--wrong); color: var(--wrong); }
  .opt-btn:disabled { cursor: default; }

  .feedback {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.6;
    display: none;
  }
  .feedback.correct { background: #e8f8f3; border-left: 4px solid var(--correct); display: block; }
  .feedback.wrong { background: #fdecea; border-left: 4px solid var(--wrong); display: block; }
  .feedback .fb-title { font-weight: 800; margin-bottom: 4px; word-break: keep-all; line-height: 1.5; }
  .feedback .fb-reason { color: #555; margin-top: 4px; font-size: 12px; }

  .next-btn {
    display: none;
    width: 100%;
    margin-top: 14px;
    padding: 14px;
    background: var(--accent-dark);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
  }
  .next-btn:hover { background: #b87516; }

  .result-screen {
    max-width: 540px;
    margin: 20px auto;
    padding: 0 16px;
    display: none;
    text-align: center;
  }
  .result-card {
    background: white;
    border-radius: 20px;
    padding: 30px 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }
  .star-display { font-size: 40px; margin-bottom: 10px; }
  .result-score { font-size: 36px; font-weight: 900; color: var(--accent-dark); }
  .result-msg { font-size: 15px; color: var(--light-text); margin: 8px 0 20px; }
  .wrong-list {
    text-align: left;
    background: #fff9f5;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .wrong-list h3 { font-size: 13px; color: var(--wrong); margin-bottom: 10px; font-weight: 800; }
  .wrong-item { font-size: 13px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #f0e0d0; }
  .wrong-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .wrong-item .wrong-sent { color: var(--wrong); font-weight: 700; }
  .wrong-item .right-sent { color: var(--correct); font-weight: 700; }
  .wrong-item .reason { color: #666; font-size: 12px; margin-top: 2px; }

  .action-btns { display: flex; gap: 10px; }
  .retry-wrong-btn, .retry-all-btn {
    flex: 1; padding: 12px; border: none; border-radius: 12px;
    font-size: 14px; font-weight: 800; font-family: 'Nunito', sans-serif; cursor: pointer;
  }
  .retry-wrong-btn { background: var(--wrong); color: white; }
  .retry-all-btn { background: var(--accent-dark); color: white; }
  .retry-wrong-btn:hover { background: #c94030; }
  .retry-all-btn:hover { background: #b87516; }
</style>
</head>
<body>

<div class="header">
  <div class="series">🔍 영문법 탐정단 · 스타트 영문법 2권</div>
  <h1>be동사 의문문</h1>
  <div class="sub">Lesson 2 — Be-Verbs: Yes/No Questions</div>
  <span class="badge">A형</span>
</div>
<div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
<div class="progress-info" id="progressInfo">1 / 12</div>

<div class="quiz-wrap" id="quizWrap">
  <div class="instruction" id="instruction">📌 알맞은 be동사 의문문을 완성해요!</div>
  <div class="question-card" id="questionCard"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">다음 문제 →</button>
</div>

<div class="result-screen" id="resultScreen">
  <div class="result-card">
    <div class="star-display" id="starDisplay"></div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="wrong-list" id="wrongList" style="display:none">
      <h3>❌ 틀린 문제 복습</h3>
      <div id="wrongItems"></div>
    </div>
    <div class="action-btns">
      <button class="retry-wrong-btn" id="retryWrongBtn" onclick="retryWrong()" style="display:none">오답만 다시 풀기</button>
      <button class="retry-all-btn" onclick="retryAll()">전체 다시 풀기 🔄</button>
    </div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [

  // ── 의문문 완성: Am / Is / Are 고르기 ──
  {
    instruction: "📌 주어에 맞는 의문사를 골라요!",
    display: '_____ <span class="hl">she</span> a dancer?',
    translation: "그녀는 댄서인가요?",
    options: ["Am", "Is", "Are", "Be"],
    answer: "Is",
    feedback_correct: "✅ 정답! She → Is she ~? 예요.",
    feedback_wrong: "❌ She/He/It이 주어면 Is ~? 로 시작해요!",
    reason: "She/He/It → Is ~? / I → Am I ~? / 나머지 → Are ~?"
  },
  {
    instruction: "📌 주어에 맞는 의문사를 골라요!",
    display: '_____ <span class="hl">they</span> nurses?',
    translation: "그들은 간호사인가요?",
    options: ["Am", "Is", "Are", "Be"],
    answer: "Are",
    feedback_correct: "✅ 정답! They → Are they ~? 예요.",
    feedback_wrong: "❌ They/We/You가 주어면 Are ~? 로 시작해요!",
    reason: "We/You/They → Are ~?"
  },
  {
    instruction: "📌 주어에 맞는 의문사를 골라요!",
    display: '_____ <span class="hl">I</span> a student?',
    translation: "나는 학생인가요?",
    options: ["Am", "Is", "Are", "Be"],
    answer: "Am",
    feedback_correct: "✅ 정답! I → Am I ~? 예요.",
    feedback_wrong: "❌ I가 주어면 Am I ~? 로 시작해요!",
    reason: "I → Am I ~?"
  },
  {
    instruction: "📌 주어에 맞는 의문사를 골라요!",
    display: '_____ <span class="hl">it</span> a camera?',
    translation: "그것은 카메라인가요?",
    options: ["Am", "Is", "Are", "Be"],
    answer: "Is",
    feedback_correct: "✅ 정답! It → Is it ~? 예요.",
    feedback_wrong: "❌ It은 Is ~? 로 시작해요!",
    reason: "She/He/It → Is ~?"
  },
  {
    instruction: "📌 주어에 맞는 의문사를 골라요!",
    display: '_____ <span class="hl">you</span> a soccer player?',
    translation: "너는 축구 선수인가요?",
    options: ["Am", "Is", "Are", "Be"],
    answer: "Are",
    feedback_correct: "✅ 정답! You → Are you ~? 예요.",
    feedback_wrong: "❌ You는 Are ~? 로 시작해요!",
    reason: "We/You/They → Are ~?"
  },
  {
    instruction: "📌 주어에 맞는 의문사를 골라요!",
    display: '_____ <span class="hl">he</span> a teacher?',
    translation: "그는 선생님인가요?",
    options: ["Am", "Is", "Are", "Be"],
    answer: "Is",
    feedback_correct: "✅ 정답! He → Is he ~? 예요.",
    feedback_wrong: "❌ He는 Is ~? 로 시작해요!",
    reason: "She/He/It → Is ~?"
  },

  // ── Yes / No 답변 고르기 ──
  {
    instruction: "📌 질문에 맞는 답변을 골라요!",
    display: 'Is she a doctor?<br><span class="q-hint" style="font-size:13px;color:#999">→ Yes, _____</span>',
    translation: "그녀는 의사인가요? → 네, ___",
    options: ["Yes, she is.", "Yes, she are.", "Yes, she am.", "Yes, it is."],
    answer: "Yes, she is.",
    feedback_correct: "✅ 정답! Is she ~? → Yes, she is. 예요.",
    feedback_wrong: "❌ Is she ~?의 긍정 답변은 Yes, she is. 예요!",
    reason: "Is she ~? → Yes, she is. / No, she isn't."
  },
  {
    instruction: "📌 질문에 맞는 답변을 골라요!",
    display: 'Are they socks?<br><span style="font-size:13px;color:#999">→ No, _____</span>',
    translation: "그것들은 양말인가요? → 아니요, ___",
    options: ["No, they aren't.", "No, they isn't.", "No, they don't.", "No, we aren't."],
    answer: "No, they aren't.",
    feedback_correct: "✅ 정답! Are they ~? → No, they aren't. 예요.",
    feedback_wrong: "❌ Are they ~?의 부정 답변은 No, they aren't. 예요!",
    reason: "Are they ~? → Yes, they are. / No, they aren't."
  },
  {
    instruction: "📌 질문에 맞는 답변을 골라요!",
    display: 'Are you doctors?<br><span style="font-size:13px;color:#999">→ Yes, _____</span>',
    translation: "너희들은 의사인가요? → 네, ___",
    options: ["Yes, we are.", "Yes, you are.", "Yes, they are.", "Yes, I am."],
    answer: "Yes, we are.",
    feedback_correct: "✅ 정답! Are you ~? (복수) → Yes, we are. 예요.",
    feedback_wrong: "❌ Are you ~? (여러 명)의 답변은 Yes, we are. 예요!",
    reason: "Are you ~? (복수) → Yes, we are. / No, we aren't."
  },
  {
    instruction: "📌 질문에 맞는 답변을 골라요!",
    display: 'Are you a student?<br><span style="font-size:13px;color:#999">→ Yes, _____</span>',
    translation: "너는 학생인가요? → 네, ___",
    options: ["Yes, I am.", "Yes, you are.", "Yes, we are.", "Yes, I'm."],
    answer: "Yes, I am.",
    feedback_correct: "✅ 정답! Are you ~? → Yes, I am. 예요.<br>⚠️ 참고: 'Yes, I'm.'은 틀린 표현이에요! 긍정 단답형에서는 축약형을 쓰지 않아요.",
    feedback_wrong: "❌ Are you ~?의 답변은 Yes, I am. 이에요!<br>⚠️ 중요: 'Yes, I'm.'은 틀린 표현이에요! 긍정 답변에서는 반드시 축약하지 않은 형태를 써요.",
    reason: "긍정 단답형: Yes, I am. ✅ / Yes, I'm. ❌ (축약형은 긍정 단답에 못 써요!)"
  },

  // ── 의문문 ↔ 답변 짝 맞추기 ──
  {
    instruction: "📌 답변에 맞는 의문문을 골라요!",
    display: '_____ ? <br><span style="font-size:13px;color:#999">→ No, he isn\'t. He\'s a student.</span>',
    translation: "→ 아니요, 그는 아니에요. 그는 학생이에요.",
    options: ["Is he a teacher?", "Are he a teacher?", "Am he a teacher?", "Is they a teacher?"],
    answer: "Is he a teacher?",
    feedback_correct: "✅ 정답! He가 주어니까 Is he ~? 예요.",
    feedback_wrong: "❌ He가 주어면 Is he ~? 로 물어봐요!",
    reason: "He → Is he ~? / No, he isn't."
  },
  {
    instruction: "📌 다음 중 올바른 의문문과 답변 짝을 골라요!",
    display: 'Is it a phone?',
    translation: "그것은 전화기인가요?",
    options: ["Yes, it is.", "Yes, it are.", "Yes, they is.", "Yes, he is."],
    answer: "Yes, it is.",
    feedback_correct: "✅ 정답! Is it ~? → Yes, it is. / No, it isn't. 예요.",
    feedback_wrong: "❌ Is it ~?의 답변은 Yes, it is. 예요!",
    reason: "Is it ~? → Yes, it is. / No, it isn't."
  },
];

let questions = [];
let currentIndex = 0;
let score = 0;
let wrongQuestions = [];
let answered = false;

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function startQuiz(qList) {
  questions = shuffle(qList);
  currentIndex = 0;
  score = 0;
  wrongQuestions = [];
  answered = false;
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizWrap').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[currentIndex];
  const total = questions.length;
  const pct = (currentIndex / total) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressInfo').textContent = (currentIndex + 1) + ' / ' + total;
  document.getElementById('instruction').innerHTML = q.instruction;

  const isLast = (currentIndex === total - 1);
  document.getElementById('nextBtn').textContent = isLast ? '결과 보기 🏁' : '다음 문제 →';
  document.getElementById('nextBtn').style.display = 'none';

  const shuffledOpts = shuffle(q.options);

  let html = `<div class="q-num">문제 ${currentIndex + 1} / ${total}</div>`;
  html += `<div class="q-sentence">${q.display}</div>`;
  html += `<div class="q-translation">${q.translation}</div>`;
  html += `<div class="options" id="optionsDiv">`;
  shuffledOpts.forEach(opt => {
    html += `<button class="opt-btn" onclick="selectAnswer(this, '${opt.replace(/'/g, "\\'")}')">${opt}</button>`;
  });
  html += `</div>`;
  html += `<div class="feedback" id="feedback"></div>`;

  document.getElementById('questionCard').innerHTML = html;
}

function selectAnswer(btn, selected) {
  if (answered) return;
  answered = true;

  const q = questions[currentIndex];
  const allBtns = document.querySelectorAll('.opt-btn');
  allBtns.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');
  if (selected === q.answer) {
    btn.classList.add('correct');
    score++;
    fb.className = 'feedback correct';
    fb.innerHTML = `<div class="fb-title">${q.feedback_correct}</div>
      <div class="fb-reason">💡 ${q.reason}</div>`;
  } else {
    btn.classList.add('wrong');
    allBtns.forEach(b => { if (b.textContent === q.answer) b.classList.add('correct'); });
    fb.className = 'feedback wrong';
    fb.innerHTML = `<div class="fb-title">${q.feedback_wrong}</div>
      <div class="fb-reason">✅ 정답: <strong>${q.answer}</strong><br>💡 ${q.reason}</div>`;
    wrongQuestions.push(q);
  }
  document.getElementById('nextBtn').style.display = 'block';
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= questions.length) showResult();
  else renderQuestion();
}

function showResult() {
  document.getElementById('quizWrap').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';

  const total = questions.length;
  const pct = Math.round((score / total) * 100);

  let stars = '⭐';
  let msg = '조금 더 연습해 봐요! 💪';
  if (pct >= 90) { stars = '⭐⭐⭐'; msg = '완벽해요! 의문문 마스터! 🎉'; }
  else if (pct >= 70) { stars = '⭐⭐'; msg = '잘했어요! 조금만 더 연습해요! 😊'; }

  document.getElementById('starDisplay').textContent = stars;
  document.getElementById('resultScore').textContent = score + ' / ' + total + ' (' + pct + '%)';
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('progressInfo').textContent = total + ' / ' + total;

  if (wrongQuestions.length > 0) {
    document.getElementById('wrongList').style.display = 'block';
    document.getElementById('retryWrongBtn').style.display = 'block';
    let wHtml = '';
    wrongQuestions.forEach(q => {
      const plain = q.display.replace(/<[^>]+>/g, '');
      wHtml += `<div class="wrong-item">
        <div class="wrong-sent">❌ ${plain}</div>
        <div class="right-sent">✅ 정답: ${q.answer}</div>
        <div class="reason">💡 ${q.reason}</div>
      </div>`;
    });
    document.getElementById('wrongItems').innerHTML = wHtml;
  } else {
    document.getElementById('wrongList').style.display = 'none';
    document.getElementById('retryWrongBtn').style.display = 'none';
  }
}

function retryWrong() { startQuiz(wrongQuestions); }
function retryAll() { startQuiz(ALL_QUESTIONS); }

startQuiz(ALL_QUESTIONS);
</script>
</body>
</html>
