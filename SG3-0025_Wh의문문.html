<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>영문법 탐정단 - SG3-0025 Wh 의문문</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FEF0E6;
    --accent:#F5A623;
    --accent-dark:#D4891A;
    --type-b:#5BAD6F;
    --correct:#4CAF93;
    --wrong:#E8604C;
    --card-bg:#FFFFFF;
    --text:#3A3A3A;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Noto Sans KR','Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;}
  .app{width:100%;max-width:480px;padding:16px;padding-bottom:40px;}
  header{text-align:center;margin-bottom:14px;}
  .badge{display:inline-block;background:var(--type-b);color:#fff;font-weight:800;font-size:13px;padding:4px 12px;border-radius:999px;margin-bottom:6px;letter-spacing:.5px;}
  h1{font-size:19px;font-weight:800;color:var(--accent-dark);margin:4px 0 0;}
  .progress-wrap{background:#fff;border-radius:999px;height:12px;overflow:hidden;margin:14px 0 18px;box-shadow:inset 0 0 0 2px #F5D9BA;}
  .progress-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent-dark));transition:width .3s ease;}
  .instruction-box{background:var(--accent);color:#fff;font-weight:700;font-size:14px;padding:12px 14px;border-radius:14px;margin-bottom:14px;line-height:1.55;text-align:center;}
  .card{background:var(--card-bg);border-radius:20px;padding:22px 18px;box-shadow:0 4px 16px rgba(212,137,26,0.12);}
  .card-instruction{font-size:12.5px;color:var(--type-b);font-weight:700;text-align:center;margin-bottom:14px;background:#EEF8F1;border-radius:10px;padding:6px 8px;}
  .qnum{font-size:12.5px;color:#999;font-weight:700;margin-bottom:6px;text-align:center;}
  .sentence{font-size:18px;font-weight:600;text-align:center;line-height:1.65;margin:10px 0 6px;color:var(--text);}
  .sentence .hl{color:var(--accent-dark);border-bottom:2.5px solid var(--accent-dark);font-weight:800;}
  .blank{display:inline-block;min-width:52px;border-bottom:2.5px solid #444;margin:0 4px;}
  .hint{font-size:13px;color:#888;text-align:center;margin-bottom:18px;font-weight:500;line-height:1.5;}
  .options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;}
  .opt-btn{font-family:inherit;font-size:15.5px;font-weight:700;padding:13px 8px;border:2.5px solid #B8DFC4;background:#F0FAF3;border-radius:14px;cursor:pointer;transition:.15s;color:var(--text);}
  .opt-btn:hover{border-color:var(--type-b);}
  .opt-btn.correct{background:var(--correct);border-color:var(--correct);color:#fff;}
  .opt-btn.wrong{background:var(--wrong);border-color:var(--wrong);color:#fff;}
  .opt-btn:disabled{cursor:default;}
  .feedback{display:none;margin-top:14px;padding:14px;border-radius:14px;font-size:14px;line-height:1.6;font-weight:500;}
  .feedback.correct{background:#E7F7F0;color:#2E8064;}
  .feedback.wrong{background:#FDEAE6;color:#B84534;}
  .fb-title{font-size:15px;font-weight:800;margin-bottom:6px;display:block;}
  .next-btn{display:none;width:100%;margin-top:16px;padding:14px;font-size:16px;font-weight:800;color:#fff;background:var(--accent-dark);border:none;border-radius:14px;cursor:pointer;font-family:inherit;}
  .result-screen{display:none;text-align:center;}
  .result-screen .stars{font-size:44px;margin:18px 0 6px;}
  .result-screen .score{font-size:18px;font-weight:800;color:var(--accent-dark);margin-bottom:4px;}
  .result-screen .score-sub{font-size:13.5px;color:#888;margin-bottom:22px;}
  .result-btns{display:flex;flex-direction:column;gap:10px;}
  .result-btn{padding:14px;font-size:15.5px;font-weight:800;border-radius:14px;border:none;cursor:pointer;font-family:inherit;}
  .btn-retry-wrong{background:var(--wrong);color:#fff;}
  .btn-retry-all{background:var(--accent-dark);color:#fff;}
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="badge">B형</span>
    <h1>🔎 영문법 탐정단 : Wh 의문문</h1>
  </header>

  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>

  <div class="instruction-box">
    한글 뜻을 보고 빈칸에 알맞은 <strong>의문사</strong>를 고르세요!<br>
    (What / Where / When / Who / Why / How)
  </div>

  <div id="quizScreen" class="card">
    <div class="card-instruction">✅ 한글 해석을 보고 알맞은 의문사를 골라보세요</div>
    <div class="qnum" id="qnum">문제 1 / 12</div>
    <div class="sentence" id="sentence"></div>
    <div class="hint" id="hint"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn">다음 문제 →</button>
  </div>

  <div id="resultScreen" class="card result-screen">
    <div class="stars" id="stars"></div>
    <div class="score" id="scoreText"></div>
    <div class="score-sub" id="scoreSub"></div>
    <div class="result-btns">
      <button class="result-btn btn-retry-wrong" id="retryWrongBtn">❌ 오답만 다시 풀기</button>
      <button class="result-btn btn-retry-all" id="retryAllBtn">🔄 전체 다시 풀기</button>
    </div>
  </div>
</div>

<script>
/*
  SG3-0025  Wh 의문문  B형  L20
  의문사: What(무엇) / Where(어디) / When(언제) / Who(누구) / Why(왜) / How(어떻게)
  B형 힌트: 전체 문장 한글 번역 (의문사 의미 포함)
  선택지: 4지선다, 의문사끼리 헷갈리기 쉬운 조합으로 구성
  각 의문사 2문제씩 = 12문제
*/
const ALL_QUESTIONS = [

  /* ── What (2문제) ── */
  {
    id:1,
    sentence:'<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> is your favorite <span class="hl">subject</span>?',
    options:["What","Who","Where","How"],
    answer:"What",
    hint:"네가 가장 좋아하는 과목이 무엇이에요?",
    reason:"<strong>What</strong>은 '무엇'을 물을 때 써요. 과목(사물)을 묻고 있어요."
  },
  {
    id:2,
    sentence:'<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> time does the <span class="hl">movie</span> start?',
    options:["What","When","Why","Who"],
    answer:"What",
    hint:"영화가 몇 시에 시작해요?",
    reason:"<strong>What time</strong>은 '몇 시에'를 물을 때 써요. What + time 조합이에요."
  },

  /* ── Where (2문제) ── */
  {
    id:3,
    sentence:'<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> is your <span class="hl">backpack</span>?',
    options:["Where","What","When","Who"],
    answer:"Where",
    hint:"네 가방이 어디 있어요?",
    reason:"<strong>Where</strong>는 '어디에'를 물을 때 써요. 장소를 묻고 있어요."
  },
  {
    id:4,
    sentence:'<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> do you want to <span class="hl">go</span> this weekend?',
    options:["Where","Why","How","What"],
    answer:"Where",
    hint:"이번 주말에 어디에 가고 싶어요?",
    reason:"<strong>Where</strong>는 '어디에'를 물을 때 써요. 가고 싶은 장소를 묻고 있어요."
  },

  /* ── When (2문제) ── */
  {
    id:5,
    sentence:'<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> is your <span class="hl">birthday</span>?',
    options:["When","Where","Who","Why"],
    answer:"When",
    hint:"네 생일이 언제예요?",
    reason:"<strong>When</strong>은 '언제'를 물을 때 써요. 날짜·시기를 묻고 있어요."
  },
  {
    id:6,
    sentence:'<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> does the <span class="hl">library</span> open?',
    options:["When","What","How","Where"],
    answer:"When",
    hint:"도서관이 언제 열어요?",
    reason:"<strong>When</strong>은 '언제'를 물을 때 써요. 여는 시기를 묻고 있어요."
  },

  /* ── Who (2문제) ── */
  {
    id:7,
    sentence:'<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> is your favorite <span class="hl">teacher</span>?',
    options:["Who","What","Where","When"],
    answer:"Who",
    hint:"네가 가장 좋아하는 선생님이 누구예요?",
    reason:"<strong>Who</strong>는 '누구'를 물을 때 써요. 사람을 묻고 있어요."
  },
  {
    id:8,
    sentence:'<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> called you this <span class="hl">morning</span>?',
    options:["Who","Why","How","What"],
    answer:"Who",
    hint:"오늘 아침에 누가 너한테 전화했어요?",
    reason:"<strong>Who</strong>는 '누가'를 물을 때 써요. 전화한 사람을 묻고 있어요."
  },

  /* ── Why (2문제) ── */
  {
    id:9,
    sentence:'<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> are you so <span class="hl">late</span> today?',
    options:["Why","When","Who","Where"],
    answer:"Why",
    hint:"오늘 왜 이렇게 늦었어요?",
    reason:"<strong>Why</strong>는 '왜'를 물을 때 써요. 이유를 묻고 있어요."
  },
  {
    id:10,
    sentence:'<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> do you like <span class="hl">winter</span>?',
    options:["Why","How","What","When"],
    answer:"Why",
    hint:"왜 겨울을 좋아해요?",
    reason:"<strong>Why</strong>는 '왜'를 물을 때 써요. 좋아하는 이유를 묻고 있어요."
  },

  /* ── How (2문제) ── */
  {
    id:11,
    sentence:'<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> do you go to <span class="hl">school</span>?',
    options:["How","Where","Why","Who"],
    answer:"How",
    hint:"학교에 어떻게 가요? (이동 방법)",
    reason:"<strong>How</strong>는 '어떻게'를 물을 때 써요. 이동 방법을 묻고 있어요."
  },
  {
    id:12,
    sentence:'<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> was your <span class="hl">weekend</span>?',
    options:["How","What","When","Why"],
    answer:"How",
    hint:"주말이 어땠어요?",
    reason:"<strong>How</strong>는 '어떠했는지' 상태나 느낌을 물을 때도 써요."
  }

];

let queue=[], currentIndex=0, currentQ=null, wrongList=[], score=0, answered=false;

function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function shuffleNoFirstAnswer(arr,answer){
  let result,tries=0;
  do{result=shuffle(arr);tries++;}
  while(result[0].toLowerCase()===answer.toLowerCase()&&tries<20);
  return result;
}

function startQuiz(list){
  queue=list;currentIndex=0;score=0;wrongList=[];
  document.getElementById("quizScreen").style.display="block";
  document.getElementById("resultScreen").style.display="none";
  showQuestion();
}

function showQuestion(){
  answered=false;
  currentQ=queue[currentIndex];
  document.getElementById("qnum").textContent="문제 "+(currentIndex+1)+" / "+queue.length;
  document.getElementById("progressBar").style.width=Math.round((currentIndex/queue.length)*100)+"%";
  document.getElementById("sentence").innerHTML=currentQ.sentence;
  document.getElementById("hint").textContent="💡 "+currentQ.hint;

  const optWrap=document.getElementById("options");
  optWrap.innerHTML="";
  const shuffled=shuffleNoFirstAnswer(currentQ.options,currentQ.answer);
  shuffled.forEach(function(opt){
    const btn=document.createElement("button");
    btn.className="opt-btn";
    btn.textContent=opt;
    btn.onclick=function(){selectAnswer(opt,btn);};
    optWrap.appendChild(btn);
  });

  document.getElementById("feedback").style.display="none";
  document.getElementById("feedback").innerHTML="";
  document.getElementById("nextBtn").style.display="none";
}

function selectAnswer(selected,btnEl){
  if(answered)return;
  answered=true;
  const isCorrect=selected.toLowerCase()===currentQ.answer.toLowerCase();
  document.querySelectorAll(".opt-btn").forEach(function(b){
    b.disabled=true;
    if(b.textContent.toLowerCase()===currentQ.answer.toLowerCase())b.classList.add("correct");
    else if(b===btnEl&&!isCorrect)b.classList.add("wrong");
  });

  if(isCorrect)score++;else wrongList.push(currentQ);

  const fb=document.getElementById("feedback");
  fb.style.display="block";
  fb.className="feedback "+(isCorrect?"correct":"wrong");
  fb.innerHTML=
    '<span class="fb-title">'+(isCorrect?"🎉 정답이에요!":"❌ 다시 확인해봐요!")+'</span>'+
    '정답: <strong>'+currentQ.answer+'</strong><br>'+currentQ.reason;

  const nb=document.getElementById("nextBtn");
  nb.style.display="block";
  nb.textContent=(currentIndex===queue.length-1)?"결과 보기 🏁":"다음 문제 →";
}

document.getElementById("nextBtn").addEventListener("click",function(){
  if(currentIndex<queue.length-1){currentIndex++;showQuestion();}
  else showResult();
});

function showResult(){
  document.getElementById("progressBar").style.width="100%";
  document.getElementById("quizScreen").style.display="none";
  document.getElementById("resultScreen").style.display="block";
  const total=queue.length,pct=Math.round((score/total)*100);
  document.getElementById("stars").textContent=pct===100?"⭐⭐⭐":pct>=80?"⭐⭐":"⭐";
  document.getElementById("scoreText").textContent=score+" / "+total+"개 정답!";
  document.getElementById("scoreSub").textContent=pct+"점이에요.";
  document.getElementById("retryWrongBtn").style.display=wrongList.length>0?"block":"none";
}

document.getElementById("retryWrongBtn").addEventListener("click",function(){startQuiz(shuffle(wrongList));});
document.getElementById("retryAllBtn").addEventListener("click",function(){startQuiz(shuffle(ALL_QUESTIONS));});

startQuiz(shuffle(ALL_QUESTIONS));
</script>
</body>
</html>
