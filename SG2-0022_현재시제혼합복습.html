<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SG2-0022 | 현재시제 혼합 복습</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FEF0E6;
    --accent: #F5A623;
    --accent-dark: #D4891A;
    --correct: #4CAF93;
    --wrong: #E8604C;
    --card: #ffffff;
    --text: #333333;
    --light-text: #777777;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }
  .header {
    background: var(--accent-dark);
    color: white;
    padding: 14px 20px 10px;
    text-align: center;
  }
  .header .series { font-size: 11px; opacity: 0.85; letter-spacing: 1px; margin-bottom: 2px; }
  .header h1 { font-size: 18px; font-weight: 900; }
  .header .sub { font-size: 12px; opacity: 0.85; margin-top: 2px; }
  .badge {
    display: inline-block;
    background: #9B6DD1;
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 20px;
    margin-top: 6px;
  }
  .progress-wrap { background: #f0d9c8; height: 8px; width: 100%; }
  .progress-bar { height: 8px; background: var(--accent); transition: width 0.4s ease; border-radius: 0 4px 4px 0; }
  .progress-info { text-align: center; font-size: 12px; color: var(--light-text); padding: 5px; }
  .quiz-wrap { max-width: 540px; margin: 0 auto; padding: 16px 16px 0; }
  .instruction {
    background: var(--accent);
    color: white;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 14px;
    text-align: center;
  }
  .question-card {
    background: var(--card);
    border-radius: 16px;
    padding: 20px 18px 16px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.09);
    margin-bottom: 14px;
  }
  .q-num { font-size: 11px; font-weight: 700; color: var(--accent-dark); margin-bottom: 8px; }
  .q-sentence {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.8;
    margin-bottom: 6px;
  }
  .q-sentence .arrow-line {
    display: block;
    color: var(--accent-dark);
    font-size: 18px;
    font-weight: 800;
  }
  .q-sentence .blank {
    display: inline-block;
    min-width: 60px;
    border-bottom: 2.5px solid #444;
    margin-bottom: -2px;
    text-align: center;
  }
  .q-sentence .arrow-line .blank {
    border-bottom: 2.5px solid var(--accent-dark);
  }
  .q-translation {
    font-size: 15px;
    color: var(--light-text);
    margin-bottom: 14px;
    line-height: 1.7;
  }
  .hl { color: var(--accent-dark); border-bottom: 2.5px solid var(--accent-dark); font-weight: 800; padding-bottom: 1px; }

  .q-label { font-size: 12px; font-weight: 700; color: var(--wrong); margin-bottom: 6px; }
  .error-box {
    background: #fff3f0;
    border: 2px solid #E8604C;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
  }
  .error-sentence {
    font-size: 19px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.6;
  }

  .options { display: grid; gap: 9px; }
  .options.col2 { grid-template-columns: 1fr 1fr; }
  .options.col3 { grid-template-columns: 1fr 1fr 1fr; }
  .opt-btn {
    border: 2.5px solid #e0cabb;
    background: #fff9f5;
    border-radius: 12px;
    padding: 11px 8px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    color: var(--text);
    line-height: 1.4;
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--accent); background: #fff0e0; transform: translateY(-1px); }
  .opt-btn.correct { background: #e8f8f3; border-color: var(--correct); color: var(--correct); }
  .opt-btn.wrong { background: #fdecea; border-color: var(--wrong); color: var(--wrong); }
  .opt-btn:disabled { cursor: default; }

  .feedback-simple {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.6;
    display: none;
  }
  .feedback-simple.correct { background: #e8f8f3; border-left: 4px solid var(--correct); display: block; }
  .feedback-simple.wrong { background: #fdecea; border-left: 4px solid var(--wrong); display: block; }
  .feedback-simple .fb-title { font-weight: 800; margin-bottom: 4px; word-break: keep-all; line-height: 1.5; }
  .feedback-simple .fb-reason { color: #555; margin-top: 4px; font-size: 12px; word-break: keep-all; }

  .feedback { margin-top: 12px; border-radius: 10px; font-size: 13px; line-height: 1.6; display: none; overflow: hidden; }
  .feedback.show { display: block; }
  .fb-correct-header { background: var(--correct); color: white; padding: 8px 14px; font-weight: 800; }
  .fb-wrong-header { background: var(--wrong); color: white; padding: 8px 14px; font-weight: 800; }
  .fb-body { background: #f9f9f9; padding: 12px 14px; border: 1px solid #e8e8e8; border-top: none; border-radius: 0 0 10px 10px; }
  .fb-row { margin-bottom: 6px; font-size: 13px; line-height: 1.6; word-break: keep-all; }
  .fb-row:last-child { margin-bottom: 0; }
  .fb-wrong-sent { color: var(--wrong); font-weight: 700; }
  .fb-right-sent { color: var(--correct); font-weight: 700; }
  .fb-reason { color: #555; }

  .next-btn {
    display: none;
    width: 100%;
    margin-top: 14px;
    padding: 14px;
    background: var(--accent-dark);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
  }
  .next-btn:hover { background: #b87516; }

  .result-screen {
    max-width: 540px;
    margin: 20px auto;
    padding: 0 16px;
    display: none;
    text-align: center;
  }
  .result-card {
    background: white;
    border-radius: 20px;
    padding: 30px 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }
  .star-display { font-size: 40px; margin-bottom: 10px; }
  .result-score { font-size: 36px; font-weight: 900; color: var(--accent-dark); }
  .result-msg { font-size: 15px; color: var(--light-text); margin: 8px 0 20px; }
  .wrong-list {
    text-align: left;
    background: #fff9f5;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .wrong-list h3 { font-size: 13px; color: var(--wrong); margin-bottom: 10px; font-weight: 800; }
  .wrong-item { font-size: 13px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f0e0d0; }
  .wrong-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .wi-wrong { color: var(--wrong); font-weight: 700; margin-bottom: 2px; }
  .wi-right { color: var(--correct); font-weight: 700; margin-bottom: 2px; }
  .wi-reason { color: #666; font-size: 12px; word-break: keep-all; }

  .action-btns { display: flex; gap: 10px; }
  .retry-wrong-btn, .retry-all-btn {
    flex: 1; padding: 12px; border: none; border-radius: 12px;
    font-size: 14px; font-weight: 800; font-family: 'Nunito', sans-serif; cursor: pointer;
  }
  .retry-wrong-btn { background: var(--wrong); color: white; }
  .retry-all-btn { background: var(--accent-dark); color: white; }
  .retry-wrong-btn:hover { background: #c94030; }
  .retry-all-btn:hover { background: #b87516; }
</style>
</head>
<body>

<div class="header">
  <div class="series">🔍 영문법 탐정단 · 스타트 영문법 2권</div>
  <h1>현재시제 혼합 복습</h1>
  <div class="sub">Lesson 11~17 — 일반동사 vs 현재진행형</div>
  <span class="badge">C형</span>
</div>
<div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
<div class="progress-info" id="progressInfo">1 / 15</div>

<div class="quiz-wrap" id="quizWrap">
  <div class="instruction" id="instruction">📌 알맞은 말을 골라요!</div>
  <div class="question-card" id="questionCard"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">다음 문제 →</button>
</div>

<div class="result-screen" id="resultScreen">
  <div class="result-card">
    <div class="star-display" id="starDisplay"></div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="wrong-list" id="wrongList" style="display:none">
      <h3>❌ 틀린 문제 복습</h3>
      <div id="wrongItems"></div>
    </div>
    <div class="action-btns">
      <button class="retry-wrong-btn" id="retryWrongBtn" onclick="retryWrong()" style="display:none">오답만 다시 풀기</button>
      <button class="retry-all-btn" onclick="retryAll()">전체 다시 풀기 🔄</button>
    </div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [

  // ── 현재단순 vs 현재진행형 구분 (핵심!) ──
  {
    type: "choice",
    instruction: "📌 현재단순 vs 현재진행형 중 알맞은 것을 골라요!",
    display: '<span class="hl">Every day</span>, my brother <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> the piano.',
    translation: "매일, 우리 오빠는 피아노를 연주해요. (반복되는 습관)",
    options: ["plays", "is playing", "play", "playing"],
    answer: "plays",
    feedback_correct: "✅ 정답! every day(매일)는 반복되는 습관 → 현재단순(plays)!",
    feedback_wrong: "❌ every day는 반복되는 습관이니 현재단순(plays)을 써요!",
    reason: "every day, every morning 등 반복 표현 → 현재단순 / now, right now → 현재진행형"
  },
  {
    type: "choice",
    instruction: "📌 현재단순 vs 현재진행형 중 알맞은 것을 골라요!",
    display: '<span class="hl">Right now</span>, my brother <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> the piano.',
    translation: "지금, 우리 오빠는 피아노를 연주하고 있어요. (지금 하는 중)",
    options: ["plays", "is playing", "play", "played"],
    answer: "is playing",
    feedback_correct: "✅ 정답! right now(지금)는 지금 하는 중 → 현재진행형(is playing)!",
    feedback_wrong: "❌ right now는 지금 하는 중이니 현재진행형(is playing)을 써요!",
    reason: "now, right now 등 → 현재진행형 / every day → 현재단순"
  },
  {
    type: "choice",
    instruction: "📌 현재단순 vs 현재진행형 중 알맞은 것을 골라요!",
    display: '<span class="hl">Look!</span> The cat <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> <span class="hl">right now</span>.',
    translation: "봐요! 고양이가 지금 자고 있어요.",
    options: ["sleeps", "is sleeping", "sleep", "slept"],
    answer: "is sleeping",
    feedback_correct: "✅ 정답! Look!(봐요!) + right now → 지금 하는 중, 현재진행형!",
    feedback_wrong: "❌ Look!과 right now는 지금 일어나는 일! 현재진행형(is sleeping)을 써요!",
    reason: "Look!, right now → 현재진행형 신호"
  },

  // ── L11~13: 일반동사 종합 ──
  {
    type: "choice",
    instruction: "📌 주어에 맞는 동사 형태를 골라요!",
    display: '<span class="hl">My uncle</span> <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> to the gym every day.',
    translation: "우리 삼촌은 매일 헬스장에 가세요.",
    options: ["go", "goes", "going", "gose"],
    answer: "goes",
    feedback_correct: "✅ 정답! My uncle(He) → go → goes (불규칙!)",
    feedback_wrong: "❌ He + go → goes 예요! 불규칙 변화라 외워야 해요.",
    reason: "go의 3인칭 단수형은 goes (go→goes 불규칙!)"
  },
  {
    type: "choice",
    instruction: "📌 don't / doesn't 중 알맞은 것을 골라요!",
    display: '<span class="hl">The kids</span> <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> like spicy food.',
    translation: "아이들은 매운 음식을 좋아하지 않아요.",
    options: ["don't", "doesn't", "isn't", "aren't"],
    answer: "don't",
    feedback_correct: "✅ 정답! The kids(They) → don't를 써요.",
    feedback_wrong: "❌ The kids = They → don't를 써요!",
    reason: "I/You/We/They → don't + 동사원형"
  },
  {
    type: "choice",
    instruction: "📌 Do/Does 중 알맞은 것을 골라요!",
    display: '<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> <span class="hl">your teacher</span> live near here?',
    translation: "너의 선생님은 이 근처에 사시나요?",
    options: ["Do", "Does", "Is", "Are"],
    answer: "Does",
    sentence_start: true,
    feedback_correct: "✅ 정답! your teacher(She/He) → Does ~?",
    feedback_wrong: "❌ your teacher = She/He → Does를 써요!",
    reason: "She/He/It → Does ~?"
  },

  // ── L14~16: 현재진행형 종합 ──
  {
    type: "choice",
    instruction: "📌 -ing 형태를 골라요!",
    display: '<span class="hl">swim</span>의 -ing 형태는?',
    translation: "swim(수영하다)의 -ing형은 무엇인가요?",
    options: ["swiming", "swimming", "swimeing", "swimng"],
    answer: "swimming",
    feedback_correct: "✅ 정답! swim → swimming (자음+모음+자음 → 마지막 자음 한 번 더!)",
    feedback_wrong: "❌ swim은 마지막 자음 m을 한 번 더 쓰고 -ing! swimming!",
    reason: "자음+모음+자음으로 끝나는 동사 → 마지막 자음 한 번 더 + ing"
  },
  {
    type: "choice",
    instruction: "📌 알맞은 부정형을 골라요!",
    display: '<span class="hl">The students</span> <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> studying now.',
    translation: "학생들은 지금 공부하고 있지 않아요.",
    options: ["isn't", "aren't", "am not", "don't"],
    answer: "aren't",
    feedback_correct: "✅ 정답! The students(They) → aren't예요.",
    feedback_wrong: "❌ The students = They → aren't예요!",
    reason: "We/You/They → aren't + 동사ing"
  },
  {
    type: "choice",
    instruction: "📌 Am/Is/Are 중 알맞은 것을 골라요!",
    display: '<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> <span class="hl">your sisters</span> singing?',
    translation: "너의 언니들은 노래하고 있나요?",
    options: ["Am", "Is", "Are", "Be"],
    answer: "Are",
    sentence_start: true,
    feedback_correct: "✅ 정답! your sisters(They) → Are they ~?",
    feedback_wrong: "❌ your sisters = They → Are로 시작해요!",
    reason: "We/You/They → Are ~?"
  },
  {
    type: "choice",
    instruction: "📌 What/Who 중 알맞은 의문사를 골라요!",
    display: '<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> is barking?<br><span class="arrow-line">→ The dog is barking.</span>',
    translation: "누가 짖고 있나요?<br>→ 강아지가 짖고 있어요.",
    options: ["What", "Who", "Whose", "Where"],
    answer: "Who",
    sentence_start: true,
    feedback_correct: "✅ 정답! 누가(어떤 동물이) 짖는지 물어볼 때는 Who를 써요.",
    feedback_wrong: "❌ 누가 짖는지 물어볼 때는 Who를 써요!",
    reason: "Who + is + 동사ing? → 누가 하는지(사람/동물)를 물어봐요"
  },

  // ── 오류 찾기 (혼합) ──
  {
    type: "error",
    instruction: "🔍 문장에서 틀린 단어를 골라요!",
    error_sentence: "She is study now.",
    translation: "그녀는 지금 공부하고 있어요.",
    options: ["is", "study", "now"],
    answer: "study",
    wrong_sent: "She is study now.",
    right_sent: "She is studying now.",
    reason: "be동사 뒤에는 동사ing를 써요! study(X) → studying(O)"
  },
  {
    type: "error",
    instruction: "🔍 문장에서 틀린 단어를 골라요!",
    error_sentence: "He don't like cheese.",
    translation: "그는 치즈를 좋아하지 않아요.",
    options: ["He", "don't", "cheese"],
    answer: "don't",
    wrong_sent: "He don't like cheese.",
    right_sent: "He doesn't like cheese.",
    reason: "He(3인칭 단수)의 부정문은 don't가 아니라 doesn't예요!"
  },
  {
    type: "error",
    instruction: "🔍 문장에서 틀린 단어를 골라요!",
    error_sentence: "What is the boys doing?",
    translation: "그 소년들은 무엇을 하고 있나요?",
    options: ["What", "is", "doing"],
    answer: "is",
    wrong_sent: "What is the boys doing?",
    right_sent: "What are the boys doing?",
    reason: "the boys(They)는 복수니까 is가 아니라 are를 써요!"
  },
  {
    type: "error",
    instruction: "🔍 문장에서 틀린 단어를 골라요!",
    error_sentence: "My cousin watch TV every weekend.",
    translation: "내 사촌은 매주 주말마다 TV를 봐요.",
    options: ["cousin", "watch", "weekend"],
    answer: "watch",
    wrong_sent: "My cousin watch TV every weekend.",
    right_sent: "My cousin watches TV every weekend.",
    reason: "My cousin(She/He)이 주어니 동사에 -es를 붙여요! watch→watches"
  },
];

let questions = [];
let currentIndex = 0;
let score = 0;
let wrongQuestions = [];
let answered = false;

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function startQuiz(qList) {
  questions = shuffle(qList);
  currentIndex = 0;
  score = 0;
  wrongQuestions = [];
  answered = false;
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizWrap').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[currentIndex];
  const total = questions.length;
  const pct = (currentIndex / total) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressInfo').textContent = (currentIndex + 1) + ' / ' + total;
  document.getElementById('instruction').innerHTML = q.instruction;

  const isLast = (currentIndex === total - 1);
  document.getElementById('nextBtn').textContent = isLast ? '결과 보기 🏁' : '다음 문제 →';
  document.getElementById('nextBtn').style.display = 'none';

  let html = `<div class="q-num">문제 ${currentIndex + 1} / ${total}</div>`;

  if (q.type === 'error') {
    const shuffledOpts = shuffle(q.options);
    html += `<div class="q-label">❌ 다음 문장에서 틀린 단어는?</div>`;
    html += `<div class="error-box"><div class="error-sentence">${q.error_sentence}</div></div>`;
    html += `<div class="q-translation">${q.translation}</div>`;
    html += `<div class="options col3" id="optionsDiv">`;
    shuffledOpts.forEach(opt => {
      html += `<button class="opt-btn" onclick="selectAnswer(this, '${opt.replace(/'/g, "\\'")}')">${opt}</button>`;
    });
    html += `</div>`;
    html += `<div class="feedback" id="feedback"></div>`;
  } else {
    const shuffledOpts = shuffle(q.options);
    const displayOpts = (q.sentence_start)
      ? shuffledOpts.map(o => o.charAt(0).toUpperCase() + o.slice(1))
      : shuffledOpts;
    html += `<div class="q-sentence">${q.display}</div>`;
    html += `<div class="q-translation">${q.translation}</div>`;
    html += `<div class="options col2" id="optionsDiv">`;
    displayOpts.forEach(opt => {
      html += `<button class="opt-btn" onclick="selectAnswer(this, '${opt.replace(/'/g, "\\'")}')">${opt}</button>`;
    });
    html += `</div>`;
    html += `<div class="feedback-simple" id="feedback"></div>`;
  }

  document.getElementById('questionCard').innerHTML = html;
}

function selectAnswer(btn, selected) {
  if (answered) return;
  answered = true;

  const q = questions[currentIndex];
  const allBtns = document.querySelectorAll('.opt-btn');
  allBtns.forEach(b => b.disabled = true);

  const isCorrect = selected.toLowerCase() === q.answer.toLowerCase();
  const fb = document.getElementById('feedback');

  if (q.type === 'error') {
    fb.className = 'feedback show';
    if (isCorrect) {
      btn.classList.add('correct');
      score++;
      fb.innerHTML = `
        <div class="fb-correct-header">✅ 정답! 틀린 단어를 찾았어요!</div>
        <div class="fb-body">
          <div class="fb-row fb-wrong-sent">❌ ${q.wrong_sent}</div>
          <div class="fb-row fb-right-sent">✅ ${q.right_sent}</div>
          <div class="fb-row fb-reason">💡 ${q.reason}</div>
        </div>`;
    } else {
      btn.classList.add('wrong');
      allBtns.forEach(b => { if (b.textContent === q.answer) b.classList.add('correct'); });
      fb.innerHTML = `
        <div class="fb-wrong-header">❌ 틀린 단어는 <strong>${q.answer}</strong>예요!</div>
        <div class="fb-body">
          <div class="fb-row fb-wrong-sent">❌ ${q.wrong_sent}</div>
          <div class="fb-row fb-right-sent">✅ ${q.right_sent}</div>
          <div class="fb-row fb-reason">💡 ${q.reason}</div>
        </div>`;
      wrongQuestions.push(q);
    }
  } else {
    fb.className = isCorrect ? 'feedback-simple correct' : 'feedback-simple wrong';
    if (isCorrect) {
      btn.classList.add('correct');
      score++;
      fb.innerHTML = `<div class="fb-title">${q.feedback_correct}</div>
        <div class="fb-reason">💡 ${q.reason}</div>`;
    } else {
      btn.classList.add('wrong');
      allBtns.forEach(b => {
        if (b.textContent.toLowerCase() === q.answer.toLowerCase()) b.classList.add('correct');
      });
      fb.innerHTML = `<div class="fb-title">${q.feedback_wrong}</div>
        <div class="fb-reason">✅ 정답: <strong>${q.answer}</strong><br>💡 ${q.reason}</div>`;
      wrongQuestions.push(q);
    }
  }

  document.getElementById('nextBtn').style.display = 'block';
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= questions.length) showResult();
  else renderQuestion();
}

function showResult() {
  document.getElementById('quizWrap').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';

  const total = questions.length;
  const pct = Math.round((score / total) * 100);

  let stars = '⭐';
  let msg = '조금 더 연습해 봐요! 💪';
  if (pct >= 90) { stars = '⭐⭐⭐'; msg = '완벽해요! 진짜 탐정! 🎉'; }
  else if (pct >= 70) { stars = '⭐⭐'; msg = '잘했어요! 조금만 더 연습해요! 😊'; }

  document.getElementById('starDisplay').textContent = stars;
  document.getElementById('resultScore').textContent = score + ' / ' + total + ' (' + pct + '%)';
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('progressInfo').textContent = total + ' / ' + total;

  if (wrongQuestions.length > 0) {
    document.getElementById('wrongList').style.display = 'block';
    document.getElementById('retryWrongBtn').style.display = 'block';
    let wHtml = '';
    wrongQuestions.forEach(q => {
      const label = q.type === 'error' ? q.wrong_sent : q.display.replace(/<[^>]+>/g, '');
      wHtml += `<div class="wrong-item">
        <div class="wi-wrong">❌ ${label}</div>
        <div class="wi-right">✅ 정답: ${q.answer}</div>
        <div class="wi-reason">💡 ${q.reason}</div>
      </div>`;
    });
    document.getElementById('wrongItems').innerHTML = wHtml;
  } else {
    document.getElementById('wrongList').style.display = 'none';
    document.getElementById('retryWrongBtn').style.display = 'none';
  }
}

function retryWrong() { startQuiz(wrongQuestions); }
function retryAll() { startQuiz(ALL_QUESTIONS); }

startQuiz(ALL_QUESTIONS);
</script>
</body>
</html>
