<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SG2-0014 | 일반동사 긍정문</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FEF0E6;
    --accent: #F5A623;
    --accent-dark: #D4891A;
    --correct: #4CAF93;
    --wrong: #E8604C;
    --card: #ffffff;
    --text: #333333;
    --light-text: #777777;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }
  .header {
    background: var(--accent-dark);
    color: white;
    padding: 14px 20px 10px;
    text-align: center;
  }
  .header .series { font-size: 11px; opacity: 0.85; letter-spacing: 1px; margin-bottom: 2px; }
  .header h1 { font-size: 18px; font-weight: 900; }
  .header .sub { font-size: 12px; opacity: 0.85; margin-top: 2px; }
  .badge {
    display: inline-block;
    background: #4A90D9;
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 20px;
    margin-top: 6px;
  }
  .progress-wrap { background: #f0d9c8; height: 8px; width: 100%; }
  .progress-bar { height: 8px; background: var(--accent); transition: width 0.4s ease; border-radius: 0 4px 4px 0; }
  .progress-info { text-align: center; font-size: 12px; color: var(--light-text); padding: 5px; }
  .quiz-wrap { max-width: 540px; margin: 0 auto; padding: 16px 16px 0; }
  .instruction {
    background: var(--accent);
    color: white;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 14px;
    text-align: center;
  }
  .question-card {
    background: var(--card);
    border-radius: 16px;
    padding: 20px 18px 16px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.09);
    margin-bottom: 14px;
  }
  .q-num { font-size: 11px; font-weight: 700; color: var(--accent-dark); margin-bottom: 8px; }
  .q-sentence {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.8;
    margin-bottom: 6px;
  }
  .q-sentence .arrow-line {
    display: block;
    color: var(--accent-dark);
    font-size: 18px;
    font-weight: 800;
  }
  .q-sentence .blank {
    display: inline-block;
    min-width: 72px;
    border-bottom: 2.5px solid #444;
    margin-bottom: -2px;
    text-align: center;
  }
  .q-sentence .arrow-line .blank {
    border-bottom: 2.5px solid var(--accent-dark);
  }
  .q-translation {
    font-size: 15px;
    color: var(--light-text);
    margin-bottom: 14px;
    line-height: 1.7;
  }
  .hl { color: var(--accent-dark); border-bottom: 2.5px solid var(--accent-dark); font-weight: 800; padding-bottom: 1px; }

  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 9px;
  }
  .opt-btn {
    border: 2.5px solid #e0cabb;
    background: #fff9f5;
    border-radius: 12px;
    padding: 11px 8px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    color: var(--text);
    line-height: 1.4;
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--accent); background: #fff0e0; transform: translateY(-1px); }
  .opt-btn.correct { background: #e8f8f3; border-color: var(--correct); color: var(--correct); }
  .opt-btn.wrong { background: #fdecea; border-color: var(--wrong); color: var(--wrong); }
  .opt-btn:disabled { cursor: default; }

  .feedback {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.6;
    display: none;
  }
  .feedback.correct { background: #e8f8f3; border-left: 4px solid var(--correct); display: block; }
  .feedback.wrong { background: #fdecea; border-left: 4px solid var(--wrong); display: block; }
  .feedback .fb-title { font-weight: 800; margin-bottom: 4px; word-break: keep-all; line-height: 1.5; }
  .feedback .fb-reason { color: #555; margin-top: 4px; font-size: 12px; word-break: keep-all; }

  .next-btn {
    display: none;
    width: 100%;
    margin-top: 14px;
    padding: 14px;
    background: var(--accent-dark);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
  }
  .next-btn:hover { background: #b87516; }

  .result-screen {
    max-width: 540px;
    margin: 20px auto;
    padding: 0 16px;
    display: none;
    text-align: center;
  }
  .result-card {
    background: white;
    border-radius: 20px;
    padding: 30px 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }
  .star-display { font-size: 40px; margin-bottom: 10px; }
  .result-score { font-size: 36px; font-weight: 900; color: var(--accent-dark); }
  .result-msg { font-size: 15px; color: var(--light-text); margin: 8px 0 20px; }
  .wrong-list {
    text-align: left;
    background: #fff9f5;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .wrong-list h3 { font-size: 13px; color: var(--wrong); margin-bottom: 10px; font-weight: 800; }
  .wrong-item { font-size: 13px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #f0e0d0; }
  .wrong-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .wrong-item .wi-wrong { color: var(--wrong); font-weight: 700; }
  .wrong-item .wi-right { color: var(--correct); font-weight: 700; }
  .wrong-item .wi-reason { color: #666; font-size: 12px; margin-top: 2px; word-break: keep-all; }

  .action-btns { display: flex; gap: 10px; }
  .retry-wrong-btn, .retry-all-btn {
    flex: 1; padding: 12px; border: none; border-radius: 12px;
    font-size: 14px; font-weight: 800; font-family: 'Nunito', sans-serif; cursor: pointer;
  }
  .retry-wrong-btn { background: var(--wrong); color: white; }
  .retry-all-btn { background: var(--accent-dark); color: white; }
  .retry-wrong-btn:hover { background: #c94030; }
  .retry-all-btn:hover { background: #b87516; }
</style>
</head>
<body>

<div class="header">
  <div class="series">🔍 영문법 탐정단 · 스타트 영문법 2권</div>
  <h1>일반동사 긍정문</h1>
  <div class="sub">Lesson 11 — Present Simple: Affirmatives</div>
  <span class="badge">A형</span>
</div>
<div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
<div class="progress-info" id="progressInfo">1 / 12</div>

<div class="quiz-wrap" id="quizWrap">
  <div class="instruction" id="instruction">📌 주어에 맞는 동사 형태를 골라요!</div>
  <div class="question-card" id="questionCard"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">다음 문제 →</button>
</div>

<div class="result-screen" id="resultScreen">
  <div class="result-card">
    <div class="star-display" id="starDisplay"></div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="wrong-list" id="wrongList" style="display:none">
      <h3>❌ 틀린 문제 복습</h3>
      <div id="wrongItems"></div>
    </div>
    <div class="action-btns">
      <button class="retry-wrong-btn" id="retryWrongBtn" onclick="retryWrong()" style="display:none">오답만 다시 풀기</button>
      <button class="retry-all-btn" onclick="retryAll()">전체 다시 풀기 🔄</button>
    </div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [

  // ── I/You/We/They + 동사원형 ──
  {
    instruction: "📌 주어에 맞는 동사 형태를 골라요!",
    display: '<span class="hl">I</span> <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> homework every evening.',
    translation: "나는 매일 저녁 숙제를 해요.",
    options: ["do", "does", "doos", "doing"],
    answer: "do",
    feedback_correct: "✅ 정답! I/You/We/They → 동사원형 그대로 써요.",
    feedback_wrong: "❌ I는 동사원형을 그대로 써요. do!",
    reason: "I/You/We/They → 동사원형 (do, eat, play, go)"
  },
  {
    instruction: "📌 주어에 맞는 동사 형태를 골라요!",
    display: '<span class="hl">We</span> <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> on the playground every day.',
    translation: "우리는 매일 운동장에서 놀아요.",
    options: ["play", "plays", "playes", "playing"],
    answer: "play",
    feedback_correct: "✅ 정답! We → 동사원형 그대로 써요.",
    feedback_wrong: "❌ We는 동사원형을 그대로 써요. play!",
    reason: "I/You/We/They → 동사원형 (play, study, eat, sleep)"
  },

  // ── She/He/It + 동사-s ──
  {
    instruction: "📌 주어에 맞는 동사 형태를 골라요! (~s)",
    display: '<span class="hl">He</span> <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> his teeth every morning.',
    translation: "그는 매일 아침 이를 닦아요.",
    options: ["brush", "brushes", "brushs", "brushies"],
    answer: "brushes",
    feedback_correct: "✅ 정답! He → brush + es = brushes (-sh로 끝나니 -es!)",
    feedback_wrong: "❌ He/She/It + brush → brushes (-sh로 끝나면 -es를 붙여요)!",
    reason: "She/He/It + -sh/-ch/-x/-s로 끝나는 동사 → -es (brush→brushes, wash→washes)"
  },
  {
    instruction: "📌 주어에 맞는 동사 형태를 골라요! (~s)",
    display: '<span class="hl">She</span> <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> a book every night.',
    translation: "그녀는 매일 밤 책을 읽어요.",
    options: ["read", "reads", "reades", "readies"],
    answer: "reads",
    feedback_correct: "✅ 정답! She → read + s = reads",
    feedback_wrong: "❌ She/He/It + 대부분의 동사 → -s를 붙여요!",
    reason: "She/He/It + 대부분의 동사 → -s (read→reads, sleep→sleeps, eat→eats)"
  },
  {
    instruction: "📌 주어에 맞는 동사 형태를 골라요! (~s)",
    display: '<span class="hl">My mom</span> <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> dinner every day.',
    translation: "우리 엄마는 매일 저녁을 요리해요.",
    options: ["cook", "cooks", "cookes", "cookies"],
    answer: "cooks",
    feedback_correct: "✅ 정답! My mom(She) → cook + s = cooks",
    feedback_wrong: "❌ My mom은 She와 같아요. cooks!",
    reason: "My mom = She → cooks / My dad = He → cooks"
  },

  // ── She/He/It + 동사-es (~ch/-sh/-x) ──
  {
    instruction: "📌 주어에 맞는 동사 형태를 골라요! (~es)",
    display: '<span class="hl">He</span> <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> TV every evening.',
    translation: "그는 매일 저녁 TV를 봐요.",
    options: ["watch", "watchs", "watches", "watchies"],
    answer: "watches",
    feedback_correct: "✅ 정답! He → watch + es = watches (-ch로 끝나니 -es!)",
    feedback_wrong: "❌ watch는 -ch로 끝나니 -es를 붙여요. watches!",
    reason: "-ch/-sh/-x/-ss로 끝나는 동사 → -es (watch→watches, fix→fixes)"
  },

  // ── She/He/It + 동사-ies ──
  {
    instruction: "📌 주어에 맞는 동사 형태를 골라요! (~ies)",
    display: '<span class="hl">She</span> <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> every day. (울다)',
    translation: "그녀는 매일 울어요.",
    options: ["cry", "crys", "cries", "cryes"],
    answer: "cries",
    feedback_correct: "✅ 정답! She → cry → -y를 없애고 + ies = cries",
    feedback_wrong: "❌ 자음+y로 끝나는 동사는 -y를 없애고 -ies를 붙여요. cries!",
    reason: "자음+y로 끝나는 동사 → -y를 없애고 -ies (cry→cries, try→tries)"
  },
  {
    instruction: "📌 주어에 맞는 동사 형태를 골라요! (~ies)",
    display: '<span class="hl">My sister</span> <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> hard every day. (노력하다)',
    translation: "우리 언니는 매일 열심히 노력해요.",
    options: ["try", "trys", "tries", "tryes"],
    answer: "tries",
    feedback_correct: "✅ 정답! My sister(She) → try → tries (-y → -ies!)",
    feedback_wrong: "❌ try는 자음+y로 끝나니 tries예요!",
    reason: "자음+y로 끝나는 동사 → -ies (try→tries, cry→cries, study→studies)"
  },

  // ── 불규칙: have→has / do→does / go→goes ──
  {
    instruction: "📌 주어에 맞는 동사 형태를 골라요! (불규칙)",
    display: '<span class="hl">Amy</span> <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> lunch at school.',
    translation: "Amy는 학교에서 점심을 먹어요.",
    options: ["have", "has", "haves", "havies"],
    answer: "has",
    feedback_correct: "✅ 정답! She(Amy) → have → has (불규칙!)",
    feedback_wrong: "❌ She/He/It + have → has 예요! 불규칙 변화라 외워야 해요.",
    reason: "have의 3인칭 단수형은 has예요. (have→has 불규칙!)"
  },
  {
    instruction: "📌 주어에 맞는 동사 형태를 골라요! (불규칙)",
    display: '<span class="hl">My dad</span> <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> the dishes every evening.',
    translation: "우리 아빠는 매일 저녁 설거지를 해요.",
    options: ["do", "does", "doos", "dos"],
    answer: "does",
    feedback_correct: "✅ 정답! He(My dad) → do → does (불규칙!)",
    feedback_wrong: "❌ He/She/It + do → does 예요! 불규칙 변화라 외워야 해요.",
    reason: "do의 3인칭 단수형은 does예요. (do→does 불규칙!)"
  },
  {
    instruction: "📌 주어에 맞는 동사 형태를 골라요! (불규칙)",
    display: '<span class="hl">My mom</span> <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> to work every day.',
    translation: "우리 엄마는 매일 출근해요.",
    options: ["go", "goes", "gos", "goies"],
    answer: "goes",
    feedback_correct: "✅ 정답! She(My mom) → go → goes (불규칙!)",
    feedback_wrong: "❌ She/He/It + go → goes 예요! 불규칙 변화라 외워야 해요.",
    reason: "go의 3인칭 단수형은 goes예요. (go→goes 불규칙!)"
  },

  // ── 올바른 동사 형태 문장 고르기 ──
  {
    instruction: "📌 다음 중 올바른 문장을 골라요!",
    display: 'John _____ milk every day. (drink)',
    translation: "John은 매일 우유를 마셔요.",
    options: ["John drink milk every day.", "John drinks milk every day.", "John drinkes milk every day.", "John drinking milk every day."],
    answer: "John drinks milk every day.",
    feedback_correct: "✅ 정답! John(He) → drink + s = drinks",
    feedback_wrong: "❌ John은 He와 같아요. drink에 -s를 붙여서 drinks!",
    reason: "She/He/It + 대부분의 동사 → -s (drink→drinks)"
  },
];

let questions = [];
let currentIndex = 0;
let score = 0;
let wrongQuestions = [];
let answered = false;

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function startQuiz(qList) {
  questions = shuffle(qList);
  currentIndex = 0;
  score = 0;
  wrongQuestions = [];
  answered = false;
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizWrap').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[currentIndex];
  const total = questions.length;
  const pct = (currentIndex / total) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressInfo').textContent = (currentIndex + 1) + ' / ' + total;
  document.getElementById('instruction').innerHTML = q.instruction;

  const isLast = (currentIndex === total - 1);
  document.getElementById('nextBtn').textContent = isLast ? '결과 보기 🏁' : '다음 문제 →';
  document.getElementById('nextBtn').style.display = 'none';

  const shuffledOpts = shuffle(q.options);
  const displayOpts = (q.sentence_start)
    ? shuffledOpts.map(o => o.charAt(0).toUpperCase() + o.slice(1))
    : shuffledOpts;

  let html = `<div class="q-num">문제 ${currentIndex + 1} / ${total}</div>`;
  html += `<div class="q-sentence">${q.display}</div>`;
  html += `<div class="q-translation">${q.translation}</div>`;
  html += `<div class="options" id="optionsDiv">`;
  displayOpts.forEach(opt => {
    html += `<button class="opt-btn" onclick="selectAnswer(this, '${opt.replace(/'/g, "\\'")}')">${opt}</button>`;
  });
  html += `</div>`;
  html += `<div class="feedback" id="feedback"></div>`;

  document.getElementById('questionCard').innerHTML = html;
}

function selectAnswer(btn, selected) {
  if (answered) return;
  answered = true;

  const q = questions[currentIndex];
  const allBtns = document.querySelectorAll('.opt-btn');
  allBtns.forEach(b => b.disabled = true);

  const isCorrect = selected.toLowerCase() === q.answer.toLowerCase();
  const fb = document.getElementById('feedback');

  if (isCorrect) {
    btn.classList.add('correct');
    score++;
    fb.className = 'feedback correct';
    fb.innerHTML = `<div class="fb-title">${q.feedback_correct}</div>
      <div class="fb-reason">💡 ${q.reason}</div>`;
  } else {
    btn.classList.add('wrong');
    allBtns.forEach(b => {
      if (b.textContent.toLowerCase() === q.answer.toLowerCase()) b.classList.add('correct');
    });
    fb.className = 'feedback wrong';
    fb.innerHTML = `<div class="fb-title">${q.feedback_wrong}</div>
      <div class="fb-reason">✅ 정답: <strong>${q.answer}</strong><br>💡 ${q.reason}</div>`;
    wrongQuestions.push(q);
  }
  document.getElementById('nextBtn').style.display = 'block';
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= questions.length) showResult();
  else renderQuestion();
}

function showResult() {
  document.getElementById('quizWrap').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';

  const total = questions.length;
  const pct = Math.round((score / total) * 100);

  let stars = '⭐';
  let msg = '조금 더 연습해 봐요! 💪';
  if (pct >= 90) { stars = '⭐⭐⭐'; msg = '완벽해요! 일반동사 마스터! 🎉'; }
  else if (pct >= 70) { stars = '⭐⭐'; msg = '잘했어요! 조금만 더 연습해요! 😊'; }

  document.getElementById('starDisplay').textContent = stars;
  document.getElementById('resultScore').textContent = score + ' / ' + total + ' (' + pct + '%)';
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('progressInfo').textContent = total + ' / ' + total;

  if (wrongQuestions.length > 0) {
    document.getElementById('wrongList').style.display = 'block';
    document.getElementById('retryWrongBtn').style.display = 'block';
    let wHtml = '';
    wrongQuestions.forEach(q => {
      const plain = q.display.replace(/<[^>]+>/g, '');
      wHtml += `<div class="wrong-item">
        <div class="wi-wrong">❌ ${plain}</div>
        <div class="wi-right">✅ 정답: ${q.answer}</div>
        <div class="wi-reason">💡 ${q.reason}</div>
      </div>`;
    });
    document.getElementById('wrongItems').innerHTML = wHtml;
  } else {
    document.getElementById('wrongList').style.display = 'none';
    document.getElementById('retryWrongBtn').style.display = 'none';
  }
}

function retryWrong() { startQuiz(wrongQuestions); }
function retryAll() { startQuiz(ALL_QUESTIONS); }

startQuiz(ALL_QUESTIONS);
</script>
