<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UG3-0028 전체 문장 점검</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#E8F5EC;--accent:#3A9D6E;--accent-dark:#2D7A57;--correct:#4CAF93;--wrong:#E8604C;--badge-c:#9B6DD1;--card-bg:#ffffff;--text:#2d2d2d;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:'Nunito','Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;}
  h1{font-size:20px;font-weight:800;color:var(--accent-dark);margin:12px 0 4px;text-align:center;}
  .subtitle{font-size:13px;color:#666;margin-bottom:12px;text-align:center;}
  .progress-wrap{width:100%;max-width:480px;background:#d0ebd8;border-radius:8px;height:10px;margin-bottom:14px;}
  .progress-bar{height:10px;background:var(--accent);border-radius:8px;transition:width .4s;}
  .instruction-box{width:100%;max-width:480px;background:#fff8e1;border-left:4px solid #f5a623;border-radius:8px;padding:10px 14px;font-size:14px;color:#7a5800;margin-bottom:14px;font-weight:600;}
  .card{background:var(--card-bg);border-radius:16px;box-shadow:0 4px 16px rgba(0,0,0,.10);padding:22px 20px 18px;width:100%;max-width:480px;}
  .badge{display:inline-block;background:var(--badge-c);color:#fff;font-size:12px;font-weight:700;padding:2px 8px;border-radius:20px;margin-bottom:8px;}
  .card-instruction{font-size:17px;font-weight:700;color:var(--badge-c);margin-bottom:14px;text-align:center;}
  .question-text{font-size:18px;font-weight:700;color:var(--text);text-align:center;margin-bottom:6px;line-height:1.6;}
  .kr-hint{font-size:14px;color:#888;text-align:center;margin-bottom:16px;}
  .options{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
  .opt-btn{background:#f0f9f4;border:2px solid #b2dfc5;border-radius:12px;padding:12px 14px;font-size:18px;font-weight:700;color:var(--text);cursor:pointer;transition:all .18s;text-align:left;font-family:'Nunito','Noto Sans KR',sans-serif;}
  .opt-btn:hover{background:#d8f0e4;border-color:var(--accent);}
  .opt-btn.correct{background:#e0f7ef;border-color:var(--correct);color:var(--correct);}
  .opt-btn.wrong{background:#fdecea;border-color:var(--wrong);color:var(--wrong);}
  .opt-btn:disabled{cursor:default;}
  .feedback{margin-top:14px;padding:12px 14px;border-radius:10px;font-size:14px;line-height:1.6;display:none;}
  .feedback.show{display:block;}
  .feedback.correct{background:#e0f7ef;color:#1a6645;border:1.5px solid var(--correct);}
  .feedback.wrong{background:#fdecea;color:#8b1a0e;border:1.5px solid var(--wrong);}
  .next-btn{margin-top:16px;width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:800;cursor:pointer;display:none;font-family:'Nunito','Noto Sans KR',sans-serif;}
  .next-btn.show{display:block;}
  .result-card{background:var(--card-bg);border-radius:16px;box-shadow:0 4px 16px rgba(0,0,0,.10);padding:28px 20px;width:100%;max-width:480px;text-align:center;display:none;}
  .result-card.show{display:block;}
  .stars{font-size:36px;margin:8px 0;}
  .score-txt{font-size:22px;font-weight:800;color:var(--accent-dark);margin:8px 0;}
  .result-btn{margin-top:10px;width:100%;padding:13px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Nunito','Noto Sans KR',sans-serif;}
  .retry-wrong{background:#fff0ed;color:var(--wrong);border:2px solid var(--wrong);}
  .retry-all{background:var(--bg);color:var(--accent-dark);border:2px solid var(--accent);margin-top:8px;}
  .wrong-list{text-align:left;margin-top:16px;}
  .wrong-item{background:#fff4f4;border-left:3px solid var(--wrong);border-radius:6px;padding:8px 10px;margin-bottom:8px;font-size:13px;line-height:1.6;}
</style>
</head>
<body>
<h1>🔍 전체 문장 점검</h1>
<p class="subtitle">UG3 · L1~22 · C형</p>
<div class="progress-wrap"><div class="progress-bar" id="prog"></div></div>
<div class="instruction-box">📌 아래 문장에서 틀린 단어를 찾아 고르세요!</div>
<div class="card" id="quiz-card">
  <div class="badge">C형</div>
  <div class="card-instruction">아래 문장에서 틀린 단어를 찾아 고르세요!</div>
  <div class="question-text" id="q-text"></div>
  <div class="kr-hint" id="kr-hint"></div>
  <div class="options" id="options"></div>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="next-btn">다음 문제 →</button>
</div>
<div class="result-card" id="result-card">
  <div class="stars" id="stars"></div>
  <div class="score-txt" id="score-txt"></div>
  <div class="wrong-list" id="wrong-list"></div>
  <button class="result-btn retry-wrong" id="retry-wrong-btn" style="display:none">❌ 틀린 문제 다시 풀기</button>
  <button class="result-btn retry-all" id="retry-all-btn">🔄 전체 다시 풀기</button>
</div>
<script>
// C형 설계 원칙
// - 주어/고유명사 선택지 절대 금지
// - 오류 1개만, textContent 사용
// - 각 레슨 골고루 (L1~L22 전 범위)
const ALL_QUESTIONS = [
  // L1~3 명사·대명사
  {
    sentence: 'There are three childs playing in the park.',
    answer: 'childs', correction: 'children',
    options: ['childs', 'playing', 'park'],
    krHint: '공원에서 세 명의 아이들이 놀고 있어요.',
    feedback: 'child의 복수형은 불규칙이에요. childs → children'
  },
  {
    sentence: 'Everyone enjoyed the party, and we took many photo.',
    answer: 'photo', correction: 'photos',
    options: ['enjoyed', 'photo', 'many'],
    krHint: '모두가 파티를 즐겼고 사진을 많이 찍었어요.',
    feedback: '가산명사 photo는 many와 함께 쓸 때 복수형이 필요해요. photo → photos'
  },
  // L4~5 현재시제
  {
    sentence: 'My brother don\'t like vegetables. He always leaves them on his plate.',
    answer: 'don\'t', correction: 'doesn\'t',
    options: ['don\'t', 'always', 'plate'],
    krHint: '내 남동생은 채소를 싫어해요. 항상 접시에 남겨요.',
    feedback: '3인칭 단수(My brother) + 부정은 doesn\'t예요. don\'t → doesn\'t'
  },
  // L6~7 과거시제
  {
    sentence: 'We goed to the zoo last Saturday and saw many animals.',
    answer: 'goed', correction: 'went',
    options: ['goed', 'saw', 'many'],
    krHint: '우리는 지난 토요일에 동물원에 가서 많은 동물들을 봤어요.',
    feedback: 'go의 과거형은 불규칙이에요. goed → went'
  },
  {
    sentence: 'She was cooking dinner when her mom called her.',
    answer: 'correct',
    options: ['cooking', 'called', 'dinner'],
    krHint: '그녀가 저녁을 요리하고 있었는데 엄마가 전화했어요.',
    feedback: '과거진행(was cooking) + when + 과거단순(called) → 올바른 문장이에요.',
    isCorrect: true
  },
  // L8~9 현재완료
  {
    sentence: 'I have never ate sushi before. It looks delicious though.',
    answer: 'ate', correction: 'eaten',
    options: ['never', 'ate', 'looks'],
    krHint: '나는 스시를 한 번도 먹어본 적이 없어요. 맛있어 보이지만요.',
    feedback: '현재완료 have + 과거분사: ate(과거형) → eaten(과거분사)'
  },
  // L10~11 조동사
  {
    sentence: 'You musts wear a helmet when you ride a bike.',
    answer: 'musts', correction: 'must',
    options: ['musts', 'wear', 'ride'],
    krHint: '자전거를 탈 때는 반드시 헬멧을 써야 해요.',
    feedback: '조동사 must에는 -s를 붙이지 않아요. musts → must'
  },
  {
    sentence: 'You should to exercise every day to stay healthy.',
    answer: 'to exercise', correction: 'exercise',
    options: ['should', 'to exercise', 'healthy'],
    krHint: '건강을 유지하려면 매일 운동하는 것이 좋아요.',
    feedback: '조동사 should 뒤에는 동사원형을 써요. to exercise → exercise'
  },
  // L12 감각동사
  {
    sentence: 'This soup smells wonderfully. I want to try it.',
    answer: 'wonderfully', correction: 'wonderful',
    options: ['soup', 'wonderfully', 'try'],
    krHint: '이 수프 냄새가 정말 좋아요. 먹어보고 싶어요.',
    feedback: '감각동사(smell) 뒤에는 형용사를 써요. wonderfully → wonderful'
  },
  // L13 비교급·최상급
  {
    sentence: 'This is the most easiest question on the test.',
    answer: 'most easiest', correction: 'easiest',
    options: ['most easiest', 'question', 'test'],
    krHint: '이것이 시험에서 가장 쉬운 문제예요.',
    feedback: 'easy처럼 짧은 형용사의 최상급은 -est만 써요. most easiest → easiest'
  },
  // L14 접속사
  {
    sentence: 'She studied hard, so she failed the exam.',
    answer: 'so', correction: 'but',
    options: ['studied', 'so', 'failed'],
    krHint: '그녀는 열심히 공부했지만 시험에 떨어졌어요.',
    feedback: '열심히 공부했는데 떨어졌으므로 대조 관계예요. so(결과) → but(대조)'
  },
  // L15 수동태
  {
    sentence: 'The book was wrote by a famous author in 1990.',
    answer: 'wrote', correction: 'written',
    options: ['wrote', 'famous', 'author'],
    krHint: '그 책은 1990년에 유명한 작가에 의해 쓰였어요.',
    feedback: '수동태는 be동사 + 과거분사예요. wrote(과거형) → written(과거분사)'
  },
  // L16 동명사
  {
    sentence: 'She enjoys to read mystery novels on weekends.',
    answer: 'to read', correction: 'reading',
    options: ['enjoys', 'to read', 'weekends'],
    krHint: '그녀는 주말에 미스터리 소설 읽는 것을 즐겨요.',
    feedback: 'enjoy는 동명사만 취해요. to read → reading'
  },
  // L17 to부정사
  {
    sentence: 'He decided buying a new laptop for his work.',
    answer: 'buying', correction: 'to buy',
    options: ['decided', 'buying', 'laptop'],
    krHint: '그는 일을 위해 새 노트북을 사기로 결정했어요.',
    feedback: 'decide는 to부정사만 취해요. buying → to buy'
  },
  // L18 too/enough
  {
    sentence: 'She is enough old to drive a car.',
    answer: 'enough old', correction: 'old enough',
    options: ['enough old', 'drive', 'car'],
    krHint: '그녀는 운전하기에 충분히 나이가 들었어요.',
    feedback: 'enough는 형용사 뒤에 와요. enough old → old enough'
  },
  // L19 사역동사
  {
    sentence: 'My mom made me to wash the dishes after dinner.',
    answer: 'to wash', correction: 'wash',
    options: ['made', 'to wash', 'dinner'],
    krHint: '엄마는 내가 저녁 식사 후 설거지를 하게 했어요.',
    feedback: 'make + 목적어 + 동사원형: to wash → wash'
  },
  // L20 관계절
  {
    sentence: 'The woman which won the award is my neighbor.',
    answer: 'which', correction: 'who',
    options: ['which', 'won', 'neighbor'],
    krHint: '상을 받은 그 여성은 제 이웃이에요.',
    feedback: '사람을 수식할 때는 who를 써요. which → who'
  },
  // L21 부가의문문
  {
    sentence: 'She can speak French, can she?',
    answer: 'can she', correction: "can't she",
    options: ['can speak', 'French', 'can she'],
    krHint: '그녀는 프랑스어를 말할 수 있죠?',
    feedback: '긍정문 뒤에는 부정 tag를 써요. can she → can\'t she'
  },
  // L22 간접화법
  {
    sentence: 'He said that he will visit us next week.',
    answer: 'will', correction: 'would',
    options: ['said', 'will', 'next'],
    krHint: '그는 다음 주에 우리를 방문할 거라고 말했어요.',
    feedback: '간접화법에서 will → would로 바뀌어요. will → would'
  },
  // 추가: 혼합 패턴
  {
    sentence: 'I have three informations about the event.',
    answer: 'informations', correction: 'information',
    options: ['three', 'informations', 'event'],
    krHint: '나는 그 행사에 대한 정보가 세 가지 있어요.',
    feedback: 'information은 불가산명사라 복수형을 쓰지 않아요. informations → information'
  },
  {
    sentence: 'The movie which I watched it last night was amazing.',
    answer: 'it', correction: 'Ø (it 불필요)',
    options: ['watched', 'it', 'amazing'],
    krHint: '내가 어젯밤에 본 영화는 정말 놀라웠어요.',
    feedback: '관계절에서 which가 목적어 역할을 하므로 it을 따로 쓰면 안 돼요. → it 삭제'
  },
];

// 정답 없는 문제(isCorrect) 제거 - 명확한 오류만
const QUESTIONS = ALL_QUESTIONS.filter(function(q){ return !q.isCorrect; });

let queue=[], wrongList=[], current=0, score=0, answered=false;
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function shuffleNoFirstAnswer(arr,answer){let result,tries=0;do{result=shuffle(arr);tries++;}while(result[0].toLowerCase()===answer.toLowerCase()&&tries<20);return result;}
function startQuiz(qs){queue=qs;current=0;score=0;wrongList=[];answered=false;document.getElementById('result-card').classList.remove('show');document.getElementById('quiz-card').style.display='';showQ();}
function showQ(){
  answered=false;
  const q=queue[current];
  document.getElementById('prog').style.width=(current/queue.length*100)+'%';
  document.getElementById('q-text').textContent=q.sentence;
  document.getElementById('kr-hint').textContent=q.krHint;
  document.getElementById('feedback').className='feedback';
  document.getElementById('next-btn').className='next-btn';
  const opts=shuffleNoFirstAnswer(q.options,q.answer);
  const box=document.getElementById('options');
  box.innerHTML='';
  opts.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';btn.textContent=opt;
    btn.addEventListener('click',()=>selectAnswer(opt,q));
    box.appendChild(btn);
  });
  document.getElementById('next-btn').textContent=current===queue.length-1?'결과 보기 🏁':'다음 문제 →';
}
function selectAnswer(selected,q){
  if(answered)return;answered=true;
  const correct=selected.toLowerCase()===q.answer.toLowerCase();
  if(correct)score++;else wrongList.push(q);
  document.querySelectorAll('.opt-btn').forEach(btn=>{
    btn.disabled=true;
    if(btn.textContent.toLowerCase()===q.answer.toLowerCase())btn.classList.add('correct');
    else if(btn.textContent===selected)btn.classList.add('wrong');
  });
  const fb=document.getElementById('feedback');
  fb.className='feedback show '+(correct?'correct':'wrong');
  fb.textContent=(correct?'✅ 정답! ':'❌ 오답. ')+q.feedback
    +(correct?'':` 틀린 단어: "${q.answer}" → 올바른 표현: "${q.correction}"`);
  document.getElementById('next-btn').classList.add('show');
}
document.getElementById('next-btn').addEventListener('click',()=>{current++;if(current<queue.length)showQ();else showResult();});
function showResult(){
  document.getElementById('prog').style.width='100%';
  document.getElementById('quiz-card').style.display='none';
  const rc=document.getElementById('result-card');rc.classList.add('show');
  const pct=score/queue.length;
  document.getElementById('stars').textContent=pct>=.9?'⭐⭐⭐':pct>=.6?'⭐⭐':'⭐';
  document.getElementById('score-txt').textContent=`${score} / ${queue.length} 정답`;
  const wl=document.getElementById('wrong-list');wl.innerHTML='';
  if(wrongList.length){
    const h=document.createElement('p');h.style.cssText='font-weight:700;color:#c0392b;margin-bottom:8px;font-size:14px';h.textContent='틀린 문제:';wl.appendChild(h);
    wrongList.forEach(q=>{
      const d=document.createElement('div');d.className='wrong-item';
      d.textContent=q.sentence;
      const info=document.createElement('div');info.style.marginTop='4px';
      info.innerHTML=`<b>틀린 단어:</b> ${q.answer} → <b>정답:</b> ${q.correction}`;
      d.appendChild(info);wl.appendChild(d);
    });
  }
  const rwb=document.getElementById('retry-wrong-btn');
  if(wrongList.length){rwb.style.display='';rwb.onclick=()=>startQuiz(shuffle(wrongList));}else rwb.style.display='none';
}
document.getElementById('retry-all-btn').addEventListener('click',()=>startQuiz(shuffle([...QUESTIONS])));
startQuiz(shuffle([...QUESTIONS]));
</script>
</body>
</html>
