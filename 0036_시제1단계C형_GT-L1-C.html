<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현재시제 vs 현재진행형 혼합 · GT-L1-C</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F4FF;
    --card: #FFFFFF;
    --primary: #7C5CBF;
    --primary-dark: #5C3EA0;
    --primary-light: #F0EBFD;
    --correct: #3DBFA8;
    --correct-light: #E6F7F4;
    --wrong: #F46B6B;
    --wrong-light: #FFF0F0;
    --text: #1A2A3A;
    --muted: #7A8FA0;
    --border: #D8CFF5;
    --progress-bg: #E8E0F8;
    --shadow: 0 4px 20px rgba(124,92,191,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    padding: 18px 24px 14px;
    text-align: center;
  }
  header .brand { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.8; margin-bottom: 4px; font-family: 'Noto Sans KR', sans-serif; }
  header h1 { font-size: 22px; font-weight: 900; letter-spacing: -0.3px; }
  header .subtitle { font-size: 13px; opacity: 0.85; margin-top: 3px; font-family: 'Noto Sans KR', sans-serif; }

  .progress-wrap { width: 100%; max-width: 640px; padding: 16px 20px 0; }
  .progress-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-family: 'Noto Sans KR', sans-serif; }
  .progress-bar { height: 8px; background: var(--progress-bg); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--correct)); border-radius: 99px; transition: width 0.4s ease; width: 0%; }

  .tip-banner { width: 100%; max-width: 640px; background: var(--primary-light); border-left: 4px solid var(--primary); padding: 11px 20px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; line-height: 1.65; color: var(--text); margin-top: 14px; }
  .tip-banner strong { color: var(--primary); }

  main { width: 100%; max-width: 640px; padding: 16px 20px 40px; flex: 1; }
  .card { background: var(--card); border-radius: 20px; border: 1.5px solid var(--border); padding: 28px 24px 24px; box-shadow: var(--shadow); }

  .q-number { font-size: 11px; font-weight: 800; color: var(--primary); letter-spacing: 0.06em; margin-bottom: 6px; }
  .q-type-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 800;
    padding: 2px 9px;
    border-radius: 20px;
    margin-bottom: 10px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .q-type-badge.two   { background: #EDE7FF; color: var(--primary); }
  .q-type-badge.four  { background: #E6F7F4; color: #1A7A6A; }
  .q-type-badge.trans { background: #FFF3DC; color: #B8860B; }

  .q-instruction { background: var(--primary-light); border-radius: 12px; padding: 12px 16px; margin-bottom: 22px; font-size: 13px; color: var(--primary-dark); font-family: 'Noto Sans KR', sans-serif; line-height: 1.6; }

  .q-sentence { font-size: 22px; font-weight: 800; line-height: 1.6; margin-bottom: 24px; letter-spacing: -0.3px; }
  .q-sentence .highlight  { background: #EDE7FF; color: var(--primary); border-radius: 6px; padding: 2px 7px; font-weight: 900; }
  .q-sentence .time-clue  { background: #FFF8E1; color: #B8860B; border-radius: 6px; padding: 2px 7px; font-weight: 900; }
  .q-sentence .blank {
    display: inline-block;
    min-width: 130px;
    height: 1.2em;
    border-bottom: 3px solid var(--primary);
    color: var(--primary);
    font-weight: 900;
    text-align: center;
    padding: 0 6px;
    vertical-align: middle;
    line-height: 1.2em;
  }

  /* 이지선다 2열 */
  .choices-two  { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  /* 사지선다 1열 */
  .choices-four { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 20px; }

  .choice-btn {
    border: 2px solid var(--border);
    background: #fff;
    border-radius: 14px;
    padding: 16px 12px;
    font-size: 15px;
    font-weight: 800;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Nunito', sans-serif;
    text-align: center;
    line-height: 1.4;
  }
  .choices-four .choice-btn { font-size: 17px; padding: 16px 18px; }
  .choice-btn:not(:disabled):hover { background: var(--primary-light); border-color: var(--primary); transform: translateY(-2px); }
  .choice-btn.selected-correct { background: var(--correct-light); border-color: var(--correct); color: #1A7A6A; }
  .choice-btn.selected-wrong   { background: var(--wrong-light);   border-color: var(--wrong);   color: #C94040; }
  .choice-btn.show-answer      { background: var(--correct-light); border-color: var(--correct); color: #1A7A6A; }
  .choice-btn:disabled { cursor: default; }

  /* 변환 박스 */
  .transform-box { background: var(--primary-light); border-radius: 12px; padding: 12px 16px; margin-bottom: 14px; display: none; border: 1.5px solid var(--border); }
  .transform-box.visible { display: block; animation: fadeIn 0.25s ease; }
  .transform-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
  .transform-row:last-child { margin-bottom: 0; }
  .transform-label { font-size: 10px; font-weight: 800; color: var(--primary); background: #fff; border: 1.5px solid var(--border); border-radius: 6px; padding: 2px 7px; white-space: nowrap; font-family: 'Noto Sans KR', sans-serif; }
  .transform-sentence { font-size: 14px; font-weight: 700; color: var(--text); }
  .transform-sentence.em { color: var(--primary); font-weight: 800; }
  .arrow { color: var(--primary); font-size: 16px; font-weight: 900; }

  .feedback { border-radius: 14px; padding: 14px 18px; margin-bottom: 16px; display: none; font-family: 'Noto Sans KR', sans-serif; line-height: 1.7; font-size: 13px; }
  .feedback.show { display: block; animation: fadeIn 0.25s ease; }
  .feedback.correct { background: var(--correct-light); border: 1.5px solid var(--correct); color: #1A7A6A; }
  .feedback.wrong   { background: var(--wrong-light);   border: 1.5px solid var(--wrong);   color: #C94040; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .btn-next { width: 100%; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; border: none; border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 800; cursor: pointer; display: none; font-family: 'Nunito', sans-serif; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 4px 12px rgba(124,92,191,0.35); }
  .btn-next.show { display: block; animation: fadeIn 0.25s ease; }
  .btn-next:hover { transform: translateY(-2px); }

  #result-screen { display: none; padding: 20px; max-width: 640px; width: 100%; }
  .result-card { background: white; border-radius: 24px; border: 1.5px solid var(--border); padding: 36px 28px; text-align: center; box-shadow: var(--shadow); }
  .result-emoji { font-size: 60px; margin-bottom: 10px; }
  .result-stars { font-size: 34px; letter-spacing: 4px; margin-bottom: 14px; }
  .result-title { font-size: 22px; font-weight: 900; color: var(--primary); margin-bottom: 8px; }
  .result-score { font-size: 15px; color: var(--muted); font-family: 'Noto Sans KR', sans-serif; margin-bottom: 20px; line-height: 1.7; }
  .result-score strong { color: var(--text); font-size: 20px; }
  .result-msg { background: var(--primary-light); border-radius: 14px; padding: 16px 20px; margin-bottom: 24px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; line-height: 1.75; color: var(--text); text-align: left; }
  .btn-group { display: flex; flex-direction: column; gap: 10px; }
  .btn-retry-wrong, .btn-retry-all { border: none; border-radius: 14px; padding: 16px; font-size: 15px; font-weight: 800; cursor: pointer; font-family: 'Nunito', sans-serif; transition: all 0.15s; }
  .btn-retry-wrong { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: #fff; box-shadow: 0 4px 12px rgba(124,92,191,0.3); }
  .btn-retry-all   { background: var(--primary-light); color: var(--primary); border: 2px solid var(--border); }
  .btn-retry-wrong:hover, .btn-retry-all:hover { transform: translateY(-2px); }
  .btn-retry-wrong:disabled { background: #ccc; box-shadow: none; cursor: default; transform: none; }
</style>
</head>
<body>

<header>
  <div class="brand">GT-L1-C · 시제편 1단계 · 문법 함정 탈출</div>
  <h1>🎯 현재시제 vs 현재진행형 혼합</h1>
  <div class="subtitle">두 가지 판단 기준을 모두 적용해요!</div>
</header>

<div class="progress-wrap">
  <div class="progress-info">
    <span id="progressLabel">0 / 12</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>

<div class="tip-banner">
  💡 <strong>판단 기준 ①</strong> be동사(am/is/are) + -ing → 현재진행형<br>
  💡 <strong>판단 기준 ②</strong> now / right now / at the moment → 현재진행형 &nbsp;|&nbsp; every day / always / usually → 현재시제
</div>

<main id="quizMain">
  <div class="card" id="quizCard"></div>
</main>

<div id="result-screen">
  <div class="result-card">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-stars" id="resultStars"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="btn-group">
      <button class="btn-retry-wrong" id="btnRetryWrong" onclick="retryWrong()">오답만 다시 풀기</button>
      <button class="btn-retry-all" onclick="retryAll()">전체 다시 풀기</button>
    </div>
  </div>
</div>

<script>
// type: "two"=이지선다, "four"=사지선다
// transform: 변환 박스 (present/progressive), null이면 숨김
const ALL_QUESTIONS = [
  {

  },
  {

    choices: ["walks", "is walking", "walk", "are walking"],
    answer: "walks",
    transform: null,
    correctFeedback: "잘했어요! every morning(매일 아침) → 반복 습관 → 현재시제 walks! 🐕",

  },
  {
    type: "two",
    instruction: "이 문장의 시제를 고르세요.",
    sentence: "The baby <span class='highlight'>cries</span> <span class='time-clue'>every night</span>.",
    choices: ["현재시제 ✅", "현재진행형 🔄"],
    answer: "현재시제 ✅",
    transform: null,
    correctFeedback: "정확해요! every night(매일 밤) + be동사 없음 → 현재시제! 👶",
    wrongFeedback: "every night은 반복 패턴이에요. be동사도 없으니 현재시제가 맞아요."
  },
  {
    type: "four",

    sentence: "Listen! The choir <span class='blank' id='blank'></span> beautifully.",
    choices: ["is singing", "sings", "sing", "are sing"],
    answer: "is singing",
    transform: { present: "The choir sings beautifully.", progressive: "The choir is singing beautifully." },
    correctFeedback: "맞아요! Listen!(들어봐!) → 지금 일어나는 일 → is singing! 🎶  참고로 choir(합창단)는 여러 명이지만 단수 명사예요. 그래서 are가 아닌 is를 써요.",
    wrongFeedback: "Listen!은 지금 들리는 소리 → 현재진행형이에요. 또 choir(합창단)는 단수 명사라서 is singing이 맞아요."
  },
  {
    type: "two",
    instruction: "이 문장의 시제를 고르세요.",
    sentence: "My parents <span class='highlight'>are watching</span> the news <span class='time-clue'>at the moment</span>.",
    choices: ["현재진행형 🔄", "현재시제 ✅"],
    answer: "현재진행형 🔄",
    transform: { present: "My parents watch the news.", progressive: "My parents are watching the news at the moment." },
    correctFeedback: "완벽해요! are + watching + at the moment → 현재진행형! 📺",
    wrongFeedback: "be동사(are) + watching, at the moment → 현재진행형이에요."
  },
  {
    type: "four",
    instruction: "빈칸에 알맞은 말을 고르세요.",
    sentence: "She <span class='blank' id='blank'></span> coffee <span class='time-clue'>every morning</span>.",
    choices: ["drinks", "is drinking", "drink", "are drinking"],
    answer: "drinks",
    transform: null,
    correctFeedback: "잘했어요! every morning → 반복 습관 → 현재시제 drinks! ☕",
    wrongFeedback: "every morning은 반복 습관이에요. 현재시제 → drinks예요."
  },
  {
    type: "two",
    instruction: "이 문장의 시제를 고르세요.",
    sentence: "Jake <span class='highlight'>plays</span> soccer <span class='time-clue'>after school</span>.",
    choices: ["현재시제 ✅", "현재진행형 🔄"],
    answer: "현재시제 ✅",
    transform: null,
    correctFeedback: "정확해요! after school(방과 후에) + be동사 없음 → 반복 습관 → 현재시제! ⚽",
    wrongFeedback: "after school은 반복 패턴이에요. be동사도 없으니 현재시제가 맞아요."
  },
  {
    type: "four",
    instruction: "빈칸에 알맞은 말을 고르세요.",
    sentence: "Hurry! The bus <span class='blank' id='blank'></span> <span class='time-clue'>right now</span>.",
    choices: ["is leaving", "leaves", "leave", "are leaving"],
    answer: "is leaving",
    transform: { present: "The bus leaves.", progressive: "The bus is leaving right now." },
    correctFeedback: "맞아요! Hurry! + right now → 지금 일어나는 일 → is leaving! 🚌",
    wrongFeedback: "Hurry!와 right now는 현재진행형 신호예요. is leaving이에요."
  },
  {
    type: "two",
    instruction: "이 문장의 시제를 고르세요.",
    sentence: "The earth <span class='highlight'>moves</span> around the sun.",
    choices: ["현재시제 ✅", "현재진행형 🔄"],
    answer: "현재시제 ✅",
    transform: null,
    correctFeedback: "완벽해요! 변하지 않는 사실(과학적 진리) → 현재시제! 🌍",
    wrongFeedback: "항상 변하지 않는 사실은 현재시제로 써요. moves가 맞아요."
  },
  {
    type: "four",
    instruction: "빈칸에 알맞은 말을 고르세요.",
    sentence: "The kids <span class='blank' id='blank'></span> hide-and-seek <span class='time-clue'>now</span>.",
    choices: ["are playing", "play", "plays", "is playing"],
    answer: "are playing",
    transform: { present: "The kids play hide-and-seek.", progressive: "The kids are playing hide-and-seek now." },
    correctFeedback: "잘했어요! now + 복수주어(kids) → are playing! 🙈",
    wrongFeedback: "now(지금) → 현재진행형, 주어가 kids(복수) → are playing이에요."
  },
  {
    type: "two",
    instruction: "이 문장의 시제를 고르세요.",
    sentence: "He <span class='highlight'>is texting</span> his friend <span class='time-clue'>at the moment</span>.",
    choices: ["현재진행형 🔄", "현재시제 ✅"],
    answer: "현재진행형 🔄",
    transform: { present: "He texts his friend.", progressive: "He is texting his friend at the moment." },
    correctFeedback: "맞아요! is + texting + at the moment → 현재진행형! 📱",
    wrongFeedback: "be동사(is) + texting, at the moment → 현재진행형이에요."
  },
  {
    type: "two",
    instruction: "이 문장의 시제를 고르세요.",
    sentence: "My grandma <span class='highlight'>knits</span> a sweater <span class='time-clue'>every winter</span>.",
    choices: ["현재시제 ✅", "현재진행형 🔄"],
    answer: "현재시제 ✅",
    transform: null,
    correctFeedback: "완벽해요! every winter(매 겨울) + be동사 없음 → 반복 습관 → 현재시제! 🧶",
    wrongFeedback: "every winter는 반복 습관이에요. be동사도 없으니 현재시제가 맞아요."
  }
];

let questions = [], current = 0, wrongIndexes = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function init(retryList = null) {
  questions = retryList ? retryList : shuffle(ALL_QUESTIONS);
  current = 0;
  wrongIndexes = [];
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quizMain').style.display = 'block';
  document.querySelector('.tip-banner').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  updateProgress();
  if (current >= questions.length) { showResult(); return; }

  const q = questions[current];
  const isTwo  = q.type === 'two';
  const isFour = q.type === 'four';
  const badgeLabel = isTwo ? '이지선다' : '사지선다';
  const badgeClass = isTwo ? 'two' : 'four';
  const choicesClass = isTwo ? 'choices-two' : 'choices-four';

  const tBox = q.transform ? `
    <div class="transform-box" id="transformBox">
      <div class="transform-row">
        <span class="transform-label">현재시제</span>
        <span class="transform-sentence">${q.transform.present}</span>
      </div>
      <div class="transform-row">
        <span class="arrow">→</span>
        <span class="transform-label">현재진행형</span>
        <span class="transform-sentence em">${q.transform.progressive}</span>
      </div>
    </div>` : '';

  const displayChoices = (q.type === 'two') ? shuffle([...q.choices]) : q.choices;
  const choicesHTML = displayChoices.map(c =>
    `<button class="choice-btn" onclick="selectAnswer(this,'${c.replace(/'/g, "\\'")}')">
      ${c}
    </button>`
  ).join('');

  document.getElementById('quizCard').innerHTML = `
    <div class="q-number">Q${current + 1} / ${questions.length}</div>
    <span class="q-type-badge ${badgeClass}">${badgeLabel}</span>
    <div class="q-instruction">${q.instruction}</div>
    <div class="q-sentence">${q.sentence}</div>
    <div class="${choicesClass}" id="choicesWrap">
      ${choicesHTML}
    </div>
    ${tBox}
    <div class="feedback" id="feedback"></div>
    <button class="btn-next" id="btnNext" onclick="nextQuestion()">
      ${current + 1 < questions.length ? '다음 문제 →' : '결과 보기 🏁'}
    </button>
  `;
}

function selectAnswer(btn, chosen) {
  const q = questions[current];
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);

  const feedback = document.getElementById('feedback');
  const tBox     = document.getElementById('transformBox');
  const btnNext  = document.getElementById('btnNext');
  const blankEl  = document.getElementById('blank');

  if (blankEl) {
    blankEl.textContent = q.answer;
    blankEl.style.color = '#1A7A6A';
    blankEl.style.borderBottomColor = '#3DBFA8';
  }

  if (chosen === q.answer) {
    btn.classList.add('selected-correct');
    feedback.className = 'feedback correct show';
    feedback.textContent = '⭕ ' + q.correctFeedback;
  } else {
    btn.classList.add('selected-wrong');
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.textContent.trim() === q.answer.trim()) b.classList.add('show-answer');
    });
    feedback.className = 'feedback wrong show';
    feedback.textContent = '❌ ' + q.wrongFeedback;
    wrongIndexes.push(current);
  }

  if (tBox) tBox.classList.add('visible');
  btnNext.classList.add('show');
}

function nextQuestion() { current++; renderQuestion(); }

function updateProgress() {
  const total = questions.length;
  const pct = total > 0 ? Math.round((current / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${current} / ${total}`;
  document.getElementById('progressPct').textContent = pct + '%';
}

function showResult() {
  document.getElementById('quizMain').style.display = 'none';
  document.querySelector('.tip-banner').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  const total   = questions.length;
  const correct = total - wrongIndexes.length;
  const pct     = Math.round((correct / total) * 100);

  let emoji, stars, title, msg;
  if (pct === 100) {
    emoji = '🏆'; stars = '⭐⭐⭐'; title = '완벽해요!';
    msg = '두 가지 판단 기준을 모두 완벽하게 적용했어요! be동사+ing, 그리고 시간 표현 단서까지 마스터! 🎉';
  } else if (pct >= 70) {
    emoji = '😊'; stars = '⭐⭐'; title = '잘 했어요!';
    msg = '거의 다 맞혔어요! 틀린 문제를 오답 복습으로 확인해 보세요.';
  } else {
    emoji = '💪'; stars = '⭐'; title = '다시 도전해봐요!';
    msg = '① be동사+ing → 현재진행형  ② now/right now/at the moment → 현재진행형  ③ every day/always/usually → 현재시제';
  }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultStars').textContent = stars;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultScore').innerHTML = `<strong>${correct} / ${total}</strong> 문제 정답<br>정답률 ${pct}%`;
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = `${total} / ${total}`;
  document.getElementById('progressPct').textContent = '100%';

  const retryBtn = document.getElementById('btnRetryWrong');
  retryBtn.disabled = wrongIndexes.length === 0;
  retryBtn.textContent = wrongIndexes.length > 0
    ? `오답만 다시 풀기 (${wrongIndexes.length}문제)` : '오답 없음 🎉';
}

function retryWrong() { init(wrongIndexes.map(i => questions[i])); }
function retryAll()   { init(); }

init();
</script>
</body>
</html>
