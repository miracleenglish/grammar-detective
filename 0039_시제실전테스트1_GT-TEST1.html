<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시제편 실전 테스트 1 · GT-TEST1</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F4FF; --card: #FFFFFF;
    --primary: #7C5CBF; --primary-dark: #5C3EA0; --primary-light: #F0EBFD;
    --correct: #3DBFA8; --correct-light: #E6F7F4;
    --wrong: #F46B6B; --wrong-light: #FFF0F0;
    --text: #1A2A3A; --muted: #7A8FA0; --border: #D8CFF5;
    --progress-bg: #E8E0F8; --shadow: 0 4px 20px rgba(124,92,191,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito','Noto Sans KR',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

  header { width: 100%; background: linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%); color: white; padding: 18px 24px 14px; text-align: center; }
  header .brand { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; opacity: .8; margin-bottom: 4px; font-family: 'Noto Sans KR',sans-serif; }
  header h1 { font-size: 22px; font-weight: 900; }
  header .subtitle { font-size: 13px; opacity: .85; margin-top: 3px; font-family: 'Noto Sans KR',sans-serif; }

  /* 안내 배너 */
  .info-banner { width: 100%; max-width: 640px; background: #FFF8E1; border-left: 4px solid #F5A623; padding: 11px 20px; font-size: 13px; font-family: 'Noto Sans KR',sans-serif; line-height: 1.65; color: var(--text); margin-top: 14px; }
  .info-banner strong { color: #B8860B; }

  .progress-wrap { width: 100%; max-width: 640px; padding: 16px 20px 0; }
  .progress-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-family: 'Noto Sans KR',sans-serif; }
  .progress-bar { height: 8px; background: var(--progress-bg); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg,var(--primary),var(--correct)); border-radius: 99px; transition: width .4s ease; width: 0%; }

  main { width: 100%; max-width: 640px; padding: 16px 20px 40px; flex: 1; }
  .card { background: var(--card); border-radius: 20px; border: 1.5px solid var(--border); padding: 28px 24px 24px; box-shadow: var(--shadow); }

  .q-number { font-size: 11px; font-weight: 800; color: var(--primary); letter-spacing: .06em; margin-bottom: 6px; }
  .q-type-badge { display: inline-block; font-size: 10px; font-weight: 800; padding: 2px 9px; border-radius: 20px; margin-bottom: 10px; font-family: 'Noto Sans KR',sans-serif; }
  .q-type-badge.two  { background: #EDE7FF; color: var(--primary); }
  .q-type-badge.four { background: #E6F7F4; color: #1A7A6A; }
  .q-instruction { background: var(--primary-light); border-radius: 12px; padding: 12px 16px; margin-bottom: 22px; font-size: 13px; color: var(--primary-dark); font-family: 'Noto Sans KR',sans-serif; line-height: 1.6; }

  .q-sentence { font-size: 22px; font-weight: 800; line-height: 1.6; margin-bottom: 24px; letter-spacing: -.3px; }
  .q-sentence .highlight { background: #EDE7FF; color: var(--primary); border-radius: 6px; padding: 2px 7px; font-weight: 900; }
  .q-sentence .time-clue { background: #FFF8E1; color: #B8860B; border-radius: 6px; padding: 2px 7px; font-weight: 900; }
  .q-sentence .blank { display: inline-block; min-width: 130px; height: 1.2em; border-bottom: 3px solid var(--primary); color: var(--primary); font-weight: 900; text-align: center; padding: 0 6px; vertical-align: middle; line-height: 1.2em; }

  .choices-two  { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .choices-four { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 20px; }
  .choice-btn { border: 2px solid var(--border); background: #fff; border-radius: 14px; padding: 16px 12px; font-size: 15px; font-weight: 800; color: var(--text); cursor: pointer; transition: all .15s; font-family: 'Nunito',sans-serif; text-align: center; line-height: 1.4; }
  .choices-four .choice-btn { font-size: 17px; padding: 16px 18px; }
  .choice-btn:not(:disabled):hover { background: var(--primary-light); border-color: var(--primary); transform: translateY(-2px); }
  .choice-btn.selected-correct { background: var(--correct-light); border-color: var(--correct); color: #1A7A6A; }
  .choice-btn.selected-wrong   { background: var(--wrong-light);   border-color: var(--wrong);   color: #C94040; }
  .choice-btn.show-answer      { background: var(--correct-light); border-color: var(--correct); color: #1A7A6A; }
  .choice-btn:disabled { cursor: default; }

  .feedback { border-radius: 14px; padding: 12px 16px; margin-bottom: 16px; display: none; font-family: 'Noto Sans KR',sans-serif; line-height: 1.6; font-size: 13px; }
  .feedback.show    { display: block; animation: fadeIn .25s ease; }
  .feedback.correct { background: var(--correct-light); border: 1.5px solid var(--correct); color: #1A7A6A; }
  .feedback.wrong   { background: var(--wrong-light);   border: 1.5px solid var(--wrong);   color: #C94040; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

  .btn-next { width: 100%; background: linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%); color: white; border: none; border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 800; cursor: pointer; display: none; font-family: 'Nunito',sans-serif; transition: transform .15s,box-shadow .15s; box-shadow: 0 4px 12px rgba(124,92,191,.35); }
  .btn-next.show { display: block; animation: fadeIn .25s ease; }
  .btn-next:hover { transform: translateY(-2px); }

  /* 결과 화면 */
  #result-screen { display: none; padding: 20px; max-width: 640px; width: 100%; }
  .result-card { background: white; border-radius: 24px; border: 1.5px solid var(--border); padding: 36px 28px; text-align: center; box-shadow: var(--shadow); }
  .result-emoji { font-size: 60px; margin-bottom: 10px; }
  .result-stars { font-size: 34px; letter-spacing: 4px; margin-bottom: 14px; }
  .result-title { font-size: 22px; font-weight: 900; color: var(--primary); margin-bottom: 8px; }
  .result-score { font-size: 15px; color: var(--muted); font-family: 'Noto Sans KR',sans-serif; margin-bottom: 20px; line-height: 1.7; }
  .result-score strong { color: var(--text); font-size: 20px; }
  .result-msg { background: var(--primary-light); border-radius: 14px; padding: 16px 20px; margin-bottom: 24px; font-size: 14px; font-family: 'Noto Sans KR',sans-serif; line-height: 1.75; color: var(--text); text-align: left; }
  .btn-group { display: flex; flex-direction: column; gap: 10px; }
  .btn-retry-wrong,.btn-retry-all { border: none; border-radius: 14px; padding: 16px; font-size: 15px; font-weight: 800; cursor: pointer; font-family: 'Nunito',sans-serif; transition: all .15s; }
  .btn-retry-wrong { background: linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%); color: #fff; box-shadow: 0 4px 12px rgba(124,92,191,.3); }
  .btn-retry-all   { background: var(--primary-light); color: var(--primary); border: 2px solid var(--border); }
  .btn-retry-wrong:hover,.btn-retry-all:hover { transform: translateY(-2px); }
  .btn-retry-wrong:disabled { background: #ccc; box-shadow: none; cursor: default; transform: none; }
</style>
</head>
<body>

<header>
  <div class="brand">GT-TEST1 · 시제편 실전 테스트 1 · 문법 함정 탈출</div>
  <h1>📝 시제편 실전 테스트 1</h1>
  <div class="subtitle">힌트 없이 스스로 풀어보세요!</div>
</header>

<div class="info-banner">
  ⚠️ <strong>실전 테스트 안내:</strong> 이 테스트는 힌트와 도움말 없이 진행돼요. 배운 내용을 떠올리며 스스로 풀어보세요!
</div>

<div class="progress-wrap">
  <div class="progress-info">
    <span id="progressLabel">0 / 15</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<main id="quizMain">
  <div class="card" id="quizCard"></div>
</main>

<div id="result-screen">
  <div class="result-card">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-stars" id="resultStars"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="btn-group">
      <button class="btn-retry-wrong" id="btnRetryWrong" onclick="retryWrong()">오답만 다시 풀기</button>
      <button class="btn-retry-all" onclick="retryAll()">전체 다시 풀기</button>
    </div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [
  // ── 이지선다 8문제 ──
  {
    type:"two", instruction:"이 문장의 시제를 고르세요.",
    sentence:"The astronaut <span class='highlight'>is floating</span> in space <span class='time-clue'>right now</span>.",
    choices:["현재진행형 🔄","현재시제 ✅"], answer:"현재진행형 🔄",
    correctFeedback:"⭕ 정답! is + floating + right now → 현재진행형이에요.",
    wrongFeedback:"❌ be동사(is) + floating + right now → 현재진행형이에요."
  },
  {
    type:"two", instruction:"이 문장의 시제를 고르세요.",
    sentence:"My grandpa <span class='highlight'>grows</span> tomatoes in his garden <span class='time-clue'>every summer</span>.",
    choices:["현재시제 ✅","현재진행형 🔄"], answer:"현재시제 ✅",
    correctFeedback:"⭕ 정답! every summer + be동사 없음 → 현재시제예요.",
    wrongFeedback:"❌ every summer는 반복 습관이에요. be동사 없음 → 현재시제예요."
  },
  {
    type:"two", instruction:"이 문장의 시제를 고르세요.",
    sentence:"The band <span class='highlight'>is performing</span> on stage <span class='time-clue'>at the moment</span>.",
    choices:["현재진행형 🔄","현재시제 ✅"], answer:"현재진행형 🔄",
    correctFeedback:"⭕ 정답! is + performing + at the moment → 현재진행형이에요.",
    wrongFeedback:"❌ be동사(is) + performing + at the moment → 현재진행형이에요."
  },
  {
    type:"two", instruction:"이 문장의 시제를 고르세요.",
    sentence:"My uncle <span class='highlight'>teaches</span> math at a middle school.",
    choices:["현재시제 ✅","현재진행형 🔄"], answer:"현재시제 ✅",
    correctFeedback:"⭕ 정답! be동사 없음, 일반적 사실 → 현재시제예요.",
    wrongFeedback:"❌ be동사가 없어요. teaches가 동사 → 현재시제예요."
  },
  {
    type:"two", instruction:"이 문장의 시제를 고르세요.",
    sentence:"The children <span class='highlight'>are decorating</span> the classroom <span class='time-clue'>right now</span>.",
    choices:["현재진행형 🔄","현재시제 ✅"], answer:"현재진행형 🔄",
    correctFeedback:"⭕ 정답! are + decorating + right now → 현재진행형이에요.",
    wrongFeedback:"❌ be동사(are) + decorating + right now → 현재진행형이에요."
  },
  {
    type:"two", instruction:"이 문장의 시제를 고르세요.",
    sentence:"A snake <span class='highlight'>sheds</span> its skin several times a year.",
    choices:["현재시제 ✅","현재진행형 🔄"], answer:"현재시제 ✅",
    correctFeedback:"⭕ 정답! 자연의 반복적 사실 + be동사 없음 → 현재시제예요.",
    wrongFeedback:"❌ 반복적 자연 사실은 현재시제예요. be동사 없음 → 현재시제예요."
  },
  {
    type:"two", instruction:"이 문장의 시제를 고르세요.",
    sentence:"Look! The fireworks <span class='highlight'>are going off</span> <span class='time-clue'>now</span>!",
    choices:["현재진행형 🔄","현재시제 ✅"], answer:"현재진행형 🔄",
    correctFeedback:"⭕ 정답! Look! + are + going + now → 현재진행형이에요.",
    wrongFeedback:"❌ Look! + be동사(are) + now → 현재진행형이에요."
  },
  {
    type:"two", instruction:"이 문장의 시제를 고르세요.",
    sentence:"She <span class='highlight'>practices</span> the violin for an hour <span class='time-clue'>every day</span>.",
    choices:["현재시제 ✅","현재진행형 🔄"], answer:"현재시제 ✅",
    correctFeedback:"⭕ 정답! every day + be동사 없음 → 현재시제예요.",
    wrongFeedback:"❌ every day는 반복 습관이에요. be동사 없음 → 현재시제예요."
  },
  // ── 사지선다 7문제 ──
  {
    type:"four", instruction:"빈칸에 알맞은 말을 고르세요.",
    sentence:"The puppy <span class='blank' id='blank'></span> its tail <span class='time-clue'>right now</span>.",
    choices:["is wagging","wags","wag","are wagging"], answer:"is wagging",
    correctFeedback:"⭕ 정답! right now → 현재진행형 → is wagging이에요.",
    wrongFeedback:"❌ right now(지금) → 현재진행형 → is wagging이에요."
  },
  {
    type:"four", instruction:"빈칸에 알맞은 말을 고르세요.",
    sentence:"Our school <span class='blank' id='blank'></span> at 8:30 AM <span class='time-clue'>every day</span>.",
    choices:["starts","is starting","start","are starting"], answer:"starts",
    correctFeedback:"⭕ 정답! every day → 반복 일과 → 현재시제 starts예요.",
    wrongFeedback:"❌ every day는 반복 일과예요. 현재시제 → starts예요."
  },
  {
    type:"four", instruction:"빈칸에 알맞은 말을 고르세요.",
    sentence:"Hurry up! The taxi <span class='blank' id='blank'></span> <span class='time-clue'>right now</span>.",
    choices:["is waiting","waits","wait","are waiting"], answer:"is waiting",
    correctFeedback:"⭕ 정답! Hurry up! + right now → 현재진행형 → is waiting이에요.",
    wrongFeedback:"❌ Hurry up! + right now → 현재진행형 → is waiting이에요."
  },
  {
    type:"four", instruction:"빈칸에 알맞은 말을 고르세요.",
    sentence:"The polar bear <span class='blank' id='blank'></span> in cold Arctic waters.",
    choices:["swims","is swimming","swim","are swimming"], answer:"swims",
    correctFeedback:"⭕ 정답! 일반적 사실 → 현재시제 swims예요.",
    wrongFeedback:"❌ 일반적 사실은 현재시제예요. swims가 맞아요."
  },
  {
    type:"four", instruction:"빈칸에 알맞은 말을 고르세요.",
    sentence:"The twins <span class='blank' id='blank'></span> their bikes in the park <span class='time-clue'>at the moment</span>.",
    choices:["are riding","ride","rides","is riding"], answer:"are riding",
    correctFeedback:"⭕ 정답! at the moment + 복수주어(twins) → are riding이에요.",
    wrongFeedback:"❌ at the moment + 주어 twins(복수) → are riding이에요."
  },
  {
    type:"four", instruction:"빈칸에 알맞은 말을 고르세요.",
    sentence:"My mom <span class='blank' id='blank'></span> <span class='time-clue'>always</span> the windows before sleeping.",
    choices:["closes","is closing","close","are closing"], answer:"closes",
    correctFeedback:"⭕ 정답! always → 반복 습관 → 현재시제 closes예요.",
    wrongFeedback:"❌ always는 반복 습관이에요. 현재시제 → closes예요."
  },
  {
    type:"four", instruction:"빈칸에 알맞은 말을 고르세요.",
    sentence:"Listen! Someone <span class='blank' id='blank'></span> at the door <span class='time-clue'>right now</span>.",
    choices:["is knocking","knocks","knock","are knocking"], answer:"is knocking",
    correctFeedback:"⭕ 정답! Listen! + right now → 현재진행형 → is knocking이에요.",
    wrongFeedback:"❌ Listen! + right now → 현재진행형 → is knocking이에요."
  }
];

let questions=[], current=0, wrongIndexes=[];

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function init(retryList=null) {
  questions=retryList?retryList:shuffle(ALL_QUESTIONS);
  current=0; wrongIndexes=[];
  document.getElementById('result-screen').style.display='none';
  document.getElementById('quizMain').style.display='block';
  renderQuestion();
}

function renderQuestion() {
  updateProgress();
  if(current>=questions.length){showResult();return;}
  const q=questions[current];
  const isTwo=q.type==='two';
  const choicesClass=isTwo?'choices-two':'choices-four';
  const displayChoices=isTwo?shuffle([...q.choices]):q.choices;
  const choicesHTML=displayChoices.map(c=>
    `<button class="choice-btn" onclick="selectAnswer(this,'${c.replace(/'/g,"\\'")}')"> ${c} </button>`
  ).join('');
  document.getElementById('quizCard').innerHTML=`
    <div class="q-number">Q${current+1} / ${questions.length}</div>
    <span class="q-type-badge ${isTwo?'two':'four'}">${isTwo?'이지선다':'사지선다'}</span>
    <div class="q-instruction">${q.instruction}</div>
    <div class="q-sentence">${q.sentence}</div>
    <div class="${choicesClass}">${choicesHTML}</div>
    <div class="feedback" id="feedback"></div>
    <button class="btn-next" id="btnNext" onclick="nextQuestion()">
      ${current+1<questions.length?'다음 문제 →':'결과 보기 🏁'}
    </button>`;
}

function selectAnswer(btn,chosen) {
  const q=questions[current];
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const feedback=document.getElementById('feedback');
  const btnNext=document.getElementById('btnNext');
  const blankEl=document.getElementById('blank');
  if(blankEl){
    blankEl.textContent=q.answer;
    blankEl.style.color='#1A7A6A';
    blankEl.style.borderBottomColor='#3DBFA8';
  }
  if(chosen===q.answer){
    btn.classList.add('selected-correct');
    feedback.className='feedback correct show';
    feedback.textContent=q.correctFeedback;
  } else {
    btn.classList.add('selected-wrong');
    document.querySelectorAll('.choice-btn').forEach(b=>{
      if(b.textContent.trim()===q.answer.trim())b.classList.add('show-answer');
    });
    feedback.className='feedback wrong show';
    feedback.textContent=q.wrongFeedback;
    wrongIndexes.push(current);
  }
  btnNext.classList.add('show');
}

function nextQuestion(){current++;renderQuestion();}

function updateProgress(){
  const total=questions.length;
  const pct=total>0?Math.round((current/total)*100):0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=`${current} / ${total}`;
  document.getElementById('progressPct').textContent=pct+'%';
}

function showResult(){
  document.getElementById('quizMain').style.display='none';
  document.getElementById('result-screen').style.display='block';
  const total=questions.length, correct=total-wrongIndexes.length;
  const pct=Math.round((correct/total)*100);
  let emoji,stars,title,msg;
  if(pct===100){
    emoji='🏆';stars='⭐⭐⭐';title='만점이에요!';
    msg='힌트 없이 15문제 전부 정답! 현재시제와 현재진행형을 완벽하게 이해했어요. 정말 대단해요! 🎉';
  } else if(pct>=80){
    emoji='😊';stars='⭐⭐⭐';title='훌륭해요!';
    msg='거의 완벽해요! 틀린 문제만 오답 복습으로 한 번 더 확인해 보세요.';
  } else if(pct>=60){
    emoji='🙂';stars='⭐⭐';title='잘 했어요!';
    msg='절반 이상 맞혔어요! 오답 복습으로 헷갈린 부분을 확인하고, 0034~0037 앱을 다시 연습해 보세요.';
  } else {
    emoji='💪';stars='⭐';title='다시 도전해봐요!';
    msg='0034~0037 앱으로 기초를 다시 다져봐요. 연습 후 다시 테스트에 도전하면 훨씬 잘 풀 수 있을 거예요!';
  }
  document.getElementById('resultEmoji').textContent=emoji;
  document.getElementById('resultStars').textContent=stars;
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultScore').innerHTML=`<strong>${correct} / ${total}</strong> 문제 정답<br>정답률 ${pct}%`;
  document.getElementById('resultMsg').textContent=msg;
  document.getElementById('progressFill').style.width='100%';
  document.getElementById('progressLabel').textContent=`${total} / ${total}`;
  document.getElementById('progressPct').textContent='100%';
  const retryBtn=document.getElementById('btnRetryWrong');
  retryBtn.disabled=wrongIndexes.length===0;
  retryBtn.textContent=wrongIndexes.length>0?`오답만 다시 풀기 (${wrongIndexes.length}문제)`:'오답 없음 🎉';
}

function retryWrong(){init(wrongIndexes.map(i=>questions[i]));}
function retryAll(){init();}

init();
</script>
</body>
</html>
