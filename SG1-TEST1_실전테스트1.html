<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SG1-TEST1 · 실전 테스트 1</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#FEF0E6;--card:#fff;--accent:#F5A623;--accent-dark:#D4891A;--correct:#4CAF93;--correct-bg:#E8F8F4;--wrong:#E8604C;--wrong-bg:#FDE8E5;--text:#2D2D2D;--text-sub:#6B6B6B;--border:#F0D5B8;--progress-bg:#F0D5B8;--btn:#FFF8F0;--btn-border:#F5C88A;--shadow:0 2px 12px rgba(245,166,35,0.15);--hl:#D4891A;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center}
  header{width:100%;background:#D4891A;padding:12px 20px 10px;display:flex;align-items:center;gap:10px}
  .badge{background:#fff;color:#D4891A;font-size:11px;font-weight:800;padding:3px 8px;border-radius:20px;white-space:nowrap}
  header h1{color:#fff;font-size:16px;font-weight:800}
  .test-info{width:100%;max-width:480px;margin:16px 20px 0;background:#fff3e0;border:1.5px solid var(--btn-border);border-radius:14px;padding:14px 16px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text-sub);line-height:1.6}
  .test-info strong{color:var(--accent-dark)}
  .progress-wrap{width:100%;max-width:480px;padding:14px 20px 0}
  .progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--text-sub);margin-bottom:6px;font-weight:600}
  .progress-bar{width:100%;height:8px;background:var(--progress-bg);border-radius:10px;overflow:hidden}
  .progress-fill{height:100%;background:#D4891A;border-radius:10px;transition:width 0.4s}
  .quiz-card{width:100%;max-width:480px;background:var(--card);border-radius:20px;margin:16px 20px;padding:24px 24px 20px;box-shadow:var(--shadow);border:1.5px solid var(--border)}
  .q-direction{font-size:13px;font-weight:700;color:var(--accent-dark);font-family:'Noto Sans KR',sans-serif;background:#FFF3E0;border-left:3px solid var(--accent-dark);padding:7px 12px;border-radius:0 8px 8px 0;margin-bottom:18px}
  .q-label{font-size:11px;font-weight:700;color:var(--text-sub);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
  .sentence-area{background:#FFF8F0;border:1.5px solid var(--border);border-radius:14px;padding:20px 16px;margin-bottom:20px;text-align:center}
  .q-sentence{font-size:21px;font-weight:700;color:var(--text);line-height:1.7}
  .q-sentence .blank{display:inline-block;min-width:72px;border-bottom:2.5px solid #D4891A;margin:0 3px;vertical-align:bottom}
  .q-sentence2{font-size:14px;font-weight:700;color:var(--accent-dark);margin-top:10px;display:none;font-family:'Noto Sans KR',sans-serif;}
  .choices-2{display:flex;gap:12px;justify-content:center;margin-bottom:14px}
  .choices-4{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .choice-btn{flex:1;padding:13px 10px;font-size:17px;font-weight:800;font-family:'Nunito',sans-serif;background:var(--btn);border:2px solid var(--btn-border);border-radius:14px;cursor:pointer;transition:all 0.15s;color:var(--text);text-align:center;max-width:170px}
  .choices-4 .choice-btn{font-size:15px;max-width:100%}
  .choice-btn:hover:not(:disabled){background:#FFF0D6;border-color:#D4891A;transform:translateY(-2px);box-shadow:0 4px 12px rgba(212,137,26,0.2)}
  .choice-btn.correct{background:var(--correct-bg);border-color:var(--correct);color:var(--correct)}
  .choice-btn.wrong{background:var(--wrong-bg);border-color:var(--wrong);color:var(--wrong)}
  .choice-btn:disabled{cursor:default;transform:none}
  .feedback{display:none;border-radius:12px;padding:12px 14px;margin-bottom:4px}
  .feedback.show{display:block}
  .feedback.correct{background:var(--correct-bg);border:1.5px solid var(--correct)}
  .feedback.wrong{background:var(--wrong-bg);border:1.5px solid var(--wrong)}
  .feedback-title{font-size:14px;font-weight:800;margin-bottom:5px;font-family:'Noto Sans KR',sans-serif}
  .feedback.correct .feedback-title{color:var(--correct)}
  .feedback.wrong .feedback-title{color:var(--wrong)}
  .feedback-reason{font-size:13px;color:var(--text);font-family:'Noto Sans KR',sans-serif;line-height:1.6}
  .feedback-reason strong{color:var(--accent-dark)}
  .next-btn{width:calc(100% - 40px);max-width:480px;padding:16px;font-size:16px;font-weight:800;font-family:'Nunito','Noto Sans KR',sans-serif;background:#D4891A;color:#fff;border:none;border-radius:14px;cursor:pointer;margin:0 20px 20px;display:none;transition:background 0.2s}
  .next-btn:hover{background:var(--accent)}
  .next-btn.show{display:block}
  #result-screen{display:none;width:100%;max-width:480px;padding:20px}
  .result-card{background:var(--card);border-radius:20px;padding:32px 24px;text-align:center;box-shadow:var(--shadow);border:1.5px solid var(--border);margin-bottom:16px}
  .star-display{font-size:40px;margin-bottom:12px;letter-spacing:4px}
  .score-text{font-size:14px;color:var(--text-sub);font-family:'Noto Sans KR',sans-serif;margin-bottom:4px}
  .score-num{font-size:52px;font-weight:900;color:#D4891A;line-height:1}
  .score-total{font-size:16px;color:var(--text-sub);margin-bottom:8px}
  .score-pct{font-size:22px;font-weight:900;color:var(--accent-dark);margin-bottom:16px}
  .comment{font-size:15px;font-weight:700;color:var(--text);font-family:'Noto Sans KR',sans-serif;background:var(--bg);border-radius:12px;padding:12px 16px;line-height:1.6}
  .result-btns{display:flex;flex-direction:column;gap:10px}
  .result-btn{padding:15px;font-size:15px;font-weight:800;font-family:'Nunito','Noto Sans KR',sans-serif;border-radius:14px;border:none;cursor:pointer;transition:all 0.2s}
  .btn-retry-wrong{background:var(--wrong-bg);color:var(--wrong);border:2px solid var(--wrong)}
  .btn-retry-all{background:var(--btn);color:var(--text);border:2px solid var(--btn-border)}
  .wrong-list{background:var(--card);border-radius:16px;padding:20px;box-shadow:var(--shadow);border:1.5px solid var(--border);margin-bottom:16px}
  .wrong-list h3{font-size:14px;font-weight:700;color:var(--wrong);margin-bottom:12px;font-family:'Noto Sans KR',sans-serif}
  .wrong-item{padding:10px 12px;background:var(--wrong-bg);border-radius:10px;margin-bottom:8px}
  .wrong-item .w-sentence{font-size:14px;font-weight:700;margin-bottom:3px}
  .wrong-item .w-reason{font-size:13px;color:var(--text-sub);font-family:'Noto Sans KR',sans-serif;line-height:1.5}
  .wrong-item .w-reason strong{color:var(--correct);font-weight:700}
</style>
</head>
<body>
<header>
  <span class="badge">스타트 영문법 1권 · TEST 1</span>
  <h1>실전 테스트 1 📝</h1>
</header>
<div class="test-info">
  <strong>범위:</strong> L1~L10 (Nouns · Pronouns · Be동사 · Demonstratives · 소유격 · 관사)<br>
  <strong>문제:</strong> 15문제 · 힌트 없음 · 선택지 랜덤 배열
</div>
<div class="progress-wrap">
  <div class="progress-info"><span id="q-counter">1 / 15</span><span id="score-counter">맞은 개수: 0</span></div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
</div>
<div class="quiz-card" id="quiz-area">
  <div class="q-direction" id="q-direction"></div>
  <div class="q-label">Question <span id="q-num">1</span></div>
  <div class="sentence-area">
    <div class="q-sentence" id="q-sentence"></div>
    <div class="q-sentence2" id="q-sentence2"></div>
  </div>
  <div id="choices"></div>
  <div class="feedback" id="feedback">
    <div class="feedback-title" id="fb-title"></div>
    <div class="feedback-reason" id="fb-reason"></div>
  </div>
</div>
<button class="next-btn" id="next-btn">다음 문제 →</button>
<div id="result-screen"></div>
<script>
const ALL_QUESTIONS = [
  // L1 Nouns - a/an
  { sentence:"It is <span class='blank'></span> elephant.", sentence2:"", answer:"an", choices:["a","an"], type:2, direction:"빈칸에 알맞은 말을 고르세요.", reason:"<strong>elephant</strong>은 모음 소리 [e]로 시작 → <strong>an</strong>" },
  // L1 Nouns - 복수
  { sentence:"one church → two <span class='blank'></span>", sentence2:"", answer:"churches", choices:["churchs","churches","churchies","churches"], type:4, direction:"빈칸에 알맞은 복수형을 고르세요.", reason:"<strong>-ch</strong>로 끝나는 명사 → <strong>-es</strong> 추가 → <strong>churches</strong>" },
  // L2 Pronouns
  { sentence:"He <span class='blank'></span> a student. She is a teacher.", sentence2:"", answer:"is", choices:["is","are","am"], type:4, direction:"빈칸에 알맞은 be동사를 고르세요.", reason:"<strong>He</strong>는 3인칭 단수 → <strong>is</strong>" },
  // L3 Be-verbs positive
  { sentence:"<span class='blank'></span> am not a teacher. I'm a student.", sentence2:"", answer:"I", choices:["I","He","She","We"], type:4, direction:"빈칸에 알맞은 말을 고르세요.", reason:"<strong>am</strong>은 오직 <strong>I</strong>에만 써요." },
  // L4 Be-verbs negative
  { sentence:"She <span class='blank'></span> a nurse. She's a doctor.", sentence2:"", answer:"isn't", choices:["aren't","isn't"], type:2, direction:"빈칸에 알맞은 말을 고르세요.", reason:"<strong>She</strong>는 단수 → 부정은 <strong>isn't</strong>" },
  // L5 Be-verbs question
  { sentence:"Is your dad a cook?", sentence2:"→ No, <span class='blank'></span>.", answer:"he isn't", choices:["he isn't","she isn't","it isn't","they aren't"], type:4, direction:"대화의 빈칸에 알맞은 답을 고르세요.", reason:"<strong>dad</strong>는 남자(he) 단수 → <strong>No, he isn't.</strong>" },
  // L6 What+Be
  { sentence:"What <span class='blank'></span> those?", sentence2:"→ They're kites.", answer:"are", choices:["is","are"], type:2, direction:"빈칸에 알맞은 be동사를 고르세요.", reason:"<strong>those</strong>는 복수 → <strong>What are those?</strong>" },
  // L7 This/That
  { sentence:"<span class='blank'></span> is a big tree. (멀리 있어요)", sentence2:"", answer:"That", choices:["This","That","These","Those"], type:4, direction:"빈칸에 알맞은 말을 고르세요.", reason:"멀리 있는 하나 → <strong>That</strong>" },
  // L8 These/Those
  { sentence:"<span class='blank'></span> aren't birds. They're kites. (가까이)", sentence2:"", answer:"These", choices:["This","That","These","Those"], type:4, direction:"빈칸에 알맞은 말을 고르세요.", reason:"가까이 있는 여러 개 부정 → <strong>These</strong> aren't" },
  // L9 Possessives
  { sentence:"Mary has a cat. <span class='blank'></span> cat is white.", sentence2:"", answer:"Her", choices:["His","Her","Its","Their"], type:4, direction:"빈칸에 알맞은 소유격을 고르세요.", reason:"Mary는 여자 → <strong>Her</strong>" },
  // L9 its vs it's
  { sentence:"The dog has a bone. <span class='blank'></span> bone is big.", sentence2:"", answer:"Its", choices:["It's","Its","Their","His"], type:4, direction:"빈칸에 알맞은 말을 고르세요.", reason:"사물·동물 단수의 소유격 → <strong>Its</strong> (It's = It is의 축약형!)" },
  // L10 a/an/the
  { sentence:"I see <span class='blank'></span> cat. The cat is orange.", sentence2:"", answer:"a", choices:["a","an","the"], type:4, direction:"빈칸에 알맞은 관사를 고르세요.", reason:"처음 언급 → <strong>a</strong> cat. 두 번째부터 the cat." },
  // L10 혼합
  { sentence:"Are <span class='blank'></span> your books? (가까이, 여러 개)", sentence2:"→ Yes, they are.", answer:"these", choices:["this","that","these","those"], type:4, direction:"빈칸에 알맞은 말을 고르세요.", reason:"가까이 있는 여러 개 의문문 → <strong>Are these</strong> your books?" },
  // 오류 찾기 유형
  { sentence:"We isn't students.", sentence2:"", answer:"isn't", choices:["We","isn't","students","are"], type:4, direction:"다음 문장에서 틀린 것을 고르세요.", reason:"<strong>We</strong>는 복수 → 부정은 <strong>aren't</strong>예요. isn't는 단수에만 써요." },
  // 혼합
  { sentence:"<span class='blank'></span> are Tom's dogs. They're cute.", sentence2:"📍 멀리, 여러 마리", answer:"Those", choices:["This","That","These","Those"], type:4, direction:"빈칸에 알맞은 말을 고르세요.", reason:"멀리 있는 여러 개 → <strong>Those</strong>" },
];

let questions=[],current=0,score=0,wrongList=[],answered=false;
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startQuiz(qs){questions=qs;current=0;score=0;wrongList=[];answered=false;document.getElementById('result-screen').style.display='none';document.getElementById('result-screen').innerHTML='';document.getElementById('quiz-area').style.display='block';document.querySelector('.progress-wrap').style.display='block';document.getElementById('next-btn').classList.remove('show');renderQuestion();}
function renderQuestion(){
  const q=questions[current];
  document.getElementById('q-num').textContent=current+1;
  document.getElementById('q-counter').textContent=`${current+1} / ${questions.length}`;
  document.getElementById('score-counter').textContent=`맞은 개수: ${score}`;
  document.getElementById('progress-fill').style.width=`${(current/questions.length)*100}%`;
  document.getElementById('q-direction').textContent=q.direction;
  document.getElementById('q-sentence').innerHTML=q.sentence;
  const s2=document.getElementById('q-sentence2');
  if(q.sentence2){s2.innerHTML=q.sentence2;s2.style.display='block';}else{s2.style.display='none';}
  document.getElementById('feedback').className='feedback';
  document.getElementById('fb-title').textContent='';
  document.getElementById('fb-reason').innerHTML='';
  document.getElementById('next-btn').classList.remove('show');
  answered=false;
  const shuffled=shuffle([...q.choices]);
  const el=document.getElementById('choices');el.innerHTML='';
  el.className=q.type===2?'choices-2':'choices-4';
  shuffled.forEach(c=>{const btn=document.createElement('button');btn.className='choice-btn';btn.textContent=c;btn.onclick=()=>selectAnswer(c,q,btn);el.appendChild(btn);});
}
function selectAnswer(selected,q,btn){
  if(answered)return;answered=true;
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const fb=document.getElementById('feedback');
  if(selected===q.answer){score++;btn.classList.add('correct');fb.className='feedback show correct';document.getElementById('fb-title').textContent='✅ 정답이에요!';document.getElementById('fb-reason').innerHTML=q.reason;}
  else{btn.classList.add('wrong');document.querySelectorAll('.choice-btn').forEach(b=>{if(b.textContent===q.answer)b.classList.add('correct');});fb.className='feedback show wrong';document.getElementById('fb-title').textContent=`❌ 오답이에요. 정답은 "${q.answer}"예요.`;document.getElementById('fb-reason').innerHTML=q.reason;wrongList.push(q);}
  document.getElementById('score-counter').textContent=`맞은 개수: ${score}`;
  const nb=document.getElementById('next-btn');nb.textContent=current===questions.length-1?'결과 보기 🏁':'다음 문제 →';nb.classList.add('show');
}
document.getElementById('next-btn').onclick=()=>{if(current===questions.length-1)showResult();else{current++;renderQuestion();}};
function showResult(){
  document.getElementById('quiz-area').style.display='none';document.querySelector('.progress-wrap').style.display='none';document.getElementById('next-btn').classList.remove('show');
  const total=questions.length,pct=Math.round((score/total)*100);
  let stars='⭐',comment='틀린 문제를 다시 풀어보며 개념을 다져봐요! 💪';
  if(pct>=90){stars='⭐⭐⭐';comment='실전 테스트 1 완벽 통과! 훌륭해요! 🎉';}
  else if(pct>=70){stars='⭐⭐';comment='잘 했어요! 오답을 다시 풀어서 완성해봐요. 😊';}
  let wHTML='';
  if(wrongList.length>0){wHTML=`<div class="wrong-list"><h3>❌ 틀린 문제 복습 (${wrongList.length}개)</h3>${wrongList.map(q=>`<div class="wrong-item"><div class="w-sentence">${q.sentence.replace(/<span class='blank'><\/span>/g,`<strong>${q.answer}</strong>`).replace(/<[^>]+>/g,'')} ${q.sentence2?q.sentence2.replace(/<[^>]+>/g,''):''}</div><div class="w-reason">${q.reason}</div></div>`).join('')}</div>`;}
  document.getElementById('result-screen').style.display='block';
  document.getElementById('result-screen').innerHTML=`<div class="result-card"><div class="star-display">${stars}</div><div class="score-text">내 점수</div><div class="score-num">${score}</div><div class="score-total">/ ${total} 문제</div><div class="score-pct">${pct}점</div><div class="comment">${comment}</div></div>${wHTML}<div class="result-btns">${wrongList.length>0?`<button class="result-btn btn-retry-wrong" id="btn-retry-wrong">❌ 오답만 다시 풀기 (${wrongList.length}문제)</button>`:''}<button class="result-btn btn-retry-all" id="btn-retry-all">🔄 전체 다시 풀기</button></div>`;
  if(wrongList.length>0){document.getElementById('btn-retry-wrong').onclick=()=>startQuiz(shuffle([...wrongList]));}
  document.getElementById('btn-retry-all').onclick=()=>startQuiz(shuffle([...ALL_QUESTIONS]));
}
startQuiz(shuffle([...ALL_QUESTIONS]));
</script>
</body>
</html>
