<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SG2-0026 | 전체 문장 점검</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FEF0E6;
    --accent: #F5A623;
    --accent-dark: #D4891A;
    --correct: #4CAF93;
    --wrong: #E8604C;
    --card: #ffffff;
    --text: #333333;
    --light-text: #777777;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }
  .header {
    background: var(--accent-dark);
    color: white;
    padding: 14px 20px 10px;
    text-align: center;
  }
  .header .series { font-size: 11px; opacity: 0.85; letter-spacing: 1px; margin-bottom: 2px; }
  .header h1 { font-size: 18px; font-weight: 900; }
  .header .sub { font-size: 12px; opacity: 0.85; margin-top: 2px; }
  .badge {
    display: inline-block;
    background: #9B6DD1;
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 20px;
    margin-top: 6px;
  }
  .progress-wrap { background: #f0d9c8; height: 8px; width: 100%; }
  .progress-bar { height: 8px; background: var(--accent); transition: width 0.4s ease; border-radius: 0 4px 4px 0; }
  .progress-info { text-align: center; font-size: 12px; color: var(--light-text); padding: 5px; }
  .quiz-wrap { max-width: 540px; margin: 0 auto; padding: 16px 16px 0; }
  .instruction {
    background: var(--accent);
    color: white;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 14px;
    text-align: center;
  }
  .question-card {
    background: var(--card);
    border-radius: 16px;
    padding: 20px 18px 16px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.09);
    margin-bottom: 14px;
  }
  .q-num { font-size: 11px; font-weight: 700; color: var(--accent-dark); margin-bottom: 8px; }
  .q-label { font-size: 12px; font-weight: 700; color: var(--wrong); margin-bottom: 6px; }
  .q-translation {
    font-size: 15px;
    color: var(--light-text);
    margin-bottom: 14px;
    line-height: 1.7;
  }
  .error-box {
    background: #fff3f0;
    border: 2px solid #E8604C;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
  }
  .error-sentence {
    font-size: 19px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.6;
  }
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 9px;
  }
  .opt-btn {
    border: 2.5px solid #e0cabb;
    background: #fff9f5;
    border-radius: 12px;
    padding: 11px 8px;
    font-size: 16px;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    color: var(--text);
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--accent); background: #fff0e0; transform: translateY(-1px); }
  .opt-btn.correct { background: #e8f8f3; border-color: var(--correct); color: var(--correct); }
  .opt-btn.wrong { background: #fdecea; border-color: var(--wrong); color: var(--wrong); }
  .opt-btn:disabled { cursor: default; }

  .feedback {
    margin-top: 12px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.6;
    display: none;
    overflow: hidden;
  }
  .feedback.show { display: block; }
  .fb-correct-header { background: var(--correct); color: white; padding: 8px 14px; font-weight: 800; }
  .fb-wrong-header { background: var(--wrong); color: white; padding: 8px 14px; font-weight: 800; }
  .fb-body {
    background: #f9f9f9;
    padding: 12px 14px;
    border: 1px solid #e8e8e8;
    border-top: none;
    border-radius: 0 0 10px 10px;
  }
  .fb-row { margin-bottom: 6px; font-size: 13px; line-height: 1.6; word-break: keep-all; }
  .fb-row:last-child { margin-bottom: 0; }
  .fb-wrong-sent { color: var(--wrong); font-weight: 700; }
  .fb-right-sent { color: var(--correct); font-weight: 700; }
  .fb-reason { color: #555; }

  .next-btn {
    display: none;
    width: 100%;
    margin-top: 14px;
    padding: 14px;
    background: var(--accent-dark);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
  }
  .next-btn:hover { background: #b87516; }

  .result-screen {
    max-width: 540px;
    margin: 20px auto;
    padding: 0 16px;
    display: none;
    text-align: center;
  }
  .result-card {
    background: white;
    border-radius: 20px;
    padding: 30px 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }
  .star-display { font-size: 40px; margin-bottom: 10px; }
  .result-score { font-size: 36px; font-weight: 900; color: var(--accent-dark); }
  .result-msg { font-size: 15px; color: var(--light-text); margin: 8px 0 20px; }
  .wrong-list {
    text-align: left;
    background: #fff9f5;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .wrong-list h3 { font-size: 13px; color: var(--wrong); margin-bottom: 10px; font-weight: 800; }
  .wrong-item { font-size: 13px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f0e0d0; }
  .wrong-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .wi-wrong { color: var(--wrong); font-weight: 700; margin-bottom: 2px; }
  .wi-right { color: var(--correct); font-weight: 700; margin-bottom: 2px; }
  .wi-reason { color: #666; font-size: 12px; word-break: keep-all; }

  .action-btns { display: flex; gap: 10px; }
  .retry-wrong-btn, .retry-all-btn {
    flex: 1; padding: 12px; border: none; border-radius: 12px;
    font-size: 14px; font-weight: 800; font-family: 'Nunito', sans-serif; cursor: pointer;
  }
  .retry-wrong-btn { background: var(--wrong); color: white; }
  .retry-all-btn { background: var(--accent-dark); color: white; }
  .retry-wrong-btn:hover { background: #c94030; }
  .retry-all-btn:hover { background: #b87516; }
</style>
</head>
<body>

<div class="header">
  <div class="series">🔍 영문법 탐정단 · 스타트 영문법 2권</div>
  <h1>전체 문장 점검</h1>
  <div class="sub">Lesson 1~20 — 틀린 단어를 찾아라!</div>
  <span class="badge">C형</span>
</div>
<div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
<div class="progress-info" id="progressInfo">1 / 20</div>

<div class="quiz-wrap" id="quizWrap">
  <div class="instruction" id="instruction">🔍 문장에서 틀린 단어를 골라요!</div>
  <div class="question-card" id="questionCard"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">다음 문제 →</button>
</div>

<div class="result-screen" id="resultScreen">
  <div class="result-card">
    <div class="star-display" id="starDisplay"></div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="wrong-list" id="wrongList" style="display:none">
      <h3>❌ 틀린 문제 복습</h3>
      <div id="wrongItems"></div>
    </div>
    <div class="action-btns">
      <button class="retry-wrong-btn" id="retryWrongBtn" onclick="retryWrong()" style="display:none">오답만 다시 풀기</button>
      <button class="retry-all-btn" onclick="retryAll()">전체 다시 풀기 🔄</button>
    </div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [

  // ── L1~L4: be동사 / 소유격 / 의문사 ──
  {
    error_sentence: "My grandpa are a firefighter.",
    translation: "우리 할아버지는 소방관이에요.",
    options: ["grandpa", "are", "firefighter"],
    answer: "are",
    wrong_sent: "My grandpa are a firefighter.",
    right_sent: "My grandpa is a firefighter.",
    reason: "My grandpa = He → is를 써요!"
  },
  {
    error_sentence: "Those is your umbrella.",
    translation: "저것은 당신의 우산이에요.",
    options: ["Those", "is", "umbrella"],
    answer: "Those",
    wrong_sent: "Those is your umbrella.",
    right_sent: "That is your umbrella.",
    reason: "단수 명사(umbrella) 앞엔 Those(복수)가 아니라 That을 써요!"
  },
  {
    error_sentence: "What is she? She is my cousin.",
    translation: "그녀는 누구인가요? 그녀는 내 사촌이에요.",
    options: ["What", "is", "cousin"],
    answer: "What",
    wrong_sent: "What is she? She is my cousin.",
    right_sent: "Who is she? She is my cousin.",
    reason: "사람을 물어볼 때는 What이 아니라 Who를 써요!"
  },

  // ── L5~L8: 명사 / 관사 / There is/are ──
  {
    error_sentence: "I see three childs.",
    translation: "나는 아이 세 명을 봐요.",
    options: ["three", "childs", "see"],
    answer: "childs",
    wrong_sent: "I see three childs.",
    right_sent: "I see three children.",
    reason: "child의 불규칙 복수형은 children이에요! childs(X)"
  },
  {
    error_sentence: "I see a egg on the table.",
    translation: "나는 식탁 위에 달걀 한 개를 봐요.",
    options: ["a", "egg", "table"],
    answer: "a",
    wrong_sent: "I see a egg on the table.",
    right_sent: "I see an egg on the table.",
    reason: "egg는 모음(e)으로 시작하니 a가 아니라 an을 써요!"
  },
  {
    error_sentence: "There are some honey in the jar.",
    translation: "병 안에 꿀이 있어요.",
    options: ["There", "are", "honey"],
    answer: "are",
    wrong_sent: "There are some honey in the jar.",
    right_sent: "There is some honey in the jar.",
    reason: "honey는 셀 수 없는 명사라 There are가 아니라 There is를 써요!"
  },

  // ── L9~L10: 형용사 / 비교급 ──
  {
    error_sentence: "This box is more heavier than that one.",
    translation: "이 상자는 저것보다 더 무거워요.",
    options: ["more", "heavier", "than"],
    answer: "more",
    wrong_sent: "This box is more heavier than that one.",
    right_sent: "This box is heavier than that one.",
    reason: "heavy → heavier처럼 -er이 붙는 형용사엔 more를 함께 쓰지 않아요!"
  },
  {
    error_sentence: "This movie is interestinger than that one.",
    translation: "이 영화는 저것보다 더 흥미로워요.",
    options: ["interestinger", "than", "movie"],
    answer: "interestinger",
    wrong_sent: "This movie is interestinger than that one.",
    right_sent: "This movie is more interesting than that one.",
    reason: "interesting처럼 긴 형용사는 -er을 붙이지 않고 앞에 more를 써요!"
  },

  // ── L11~L13: 일반동사 ──
  {
    error_sentence: "My aunt teachs English at school.",
    translation: "우리 이모는 학교에서 영어를 가르쳐요.",
    options: ["aunt", "teachs", "English"],
    answer: "teachs",
    wrong_sent: "My aunt teachs English at school.",
    right_sent: "My aunt teaches English at school.",
    reason: "teach는 -ch로 끝나니 -es를 붙여요! teaches(O) / teachs(X)"
  },
  {
    error_sentence: "He doesn't goes swimming.",
    translation: "그는 수영하러 가지 않아요.",
    options: ["doesn't", "goes", "swimming"],
    answer: "goes",
    wrong_sent: "He doesn't goes swimming.",
    right_sent: "He doesn't go swimming.",
    reason: "doesn't 뒤에는 항상 동사원형! goes(X) → go(O)"
  },
  {
    error_sentence: "Do your grandma live alone?",
    translation: "당신의 할머니는 혼자 사시나요?",
    options: ["Do", "grandma", "alone"],
    answer: "Do",
    wrong_sent: "Do your grandma live alone?",
    right_sent: "Does your grandma live alone?",
    reason: "your grandma = She → Does를 써요! Do(X) → Does(O)"
  },

  // ── L14~L17: 현재진행형 ──
  {
    error_sentence: "She is makeing a sandcastle.",
    translation: "그녀는 모래성을 만들고 있어요.",
    options: ["is", "makeing", "sandcastle"],
    answer: "makeing",
    wrong_sent: "She is makeing a sandcastle.",
    right_sent: "She is making a sandcastle.",
    reason: "make는 -e로 끝나니 e를 없애고 -ing! making(O) / makeing(X)"
  },
  {
    error_sentence: "The children isn't playing outside.",
    translation: "아이들은 밖에서 놀고 있지 않아요.",
    options: ["children", "isn't", "playing"],
    answer: "isn't",
    wrong_sent: "The children isn't playing outside.",
    right_sent: "The children aren't playing outside.",
    reason: "The children = They(복수) → isn't(X) → aren't(O)"
  },
  {
    error_sentence: "Who is doing the girls?",
    translation: "그 소녀들은 무엇을 하고 있나요?",
    options: ["Who", "is", "girls"],
    answer: "Who",
    wrong_sent: "Who is doing the girls?",
    right_sent: "What are the girls doing?",
    reason: "행동을 물어볼 때는 Who가 아니라 What을 써요!"
  },

  // ── L18: 장소 전치사 ──
  {
    error_sentence: "The dog is on the sofa.",
    translation: "강아지는 소파 아래에 있어요.",
    options: ["dog", "on", "sofa"],
    answer: "on",
    wrong_sent: "The dog is on the sofa.",
    right_sent: "The dog is under the sofa.",
    reason: "'소파 아래'는 under the sofa예요! on(X) → under(O)"
  },
  {
    error_sentence: "The park is next the library.",
    translation: "공원은 도서관 옆에 있어요.",
    options: ["park", "next", "library"],
    answer: "next",
    wrong_sent: "The park is next the library.",
    right_sent: "The park is next to the library.",
    reason: "next to = ~ 옆에! next만 쓰면 안 돼요. next to(O)"
  },

  // ── L19: 조동사 ──
  {
    error_sentence: "She cans speak French.",
    translation: "그녀는 프랑스어를 할 수 있어요.",
    options: ["She", "cans", "French"],
    answer: "cans",
    wrong_sent: "She cans speak French.",
    right_sent: "She can speak French.",
    reason: "조동사 can은 주어에 관계없이 형태가 변하지 않아요! cans(X) → can(O)"
  },
  {
    error_sentence: "May I borrow you pen?",
    translation: "당신의 펜을 빌려도 될까요?",
    options: ["May", "you", "borrow"],
    answer: "you",
    wrong_sent: "May I borrow you pen?",
    right_sent: "May I borrow your pen?",
    reason: "소유격 your(당신의)를 써야 해요! you(X) → your(O)"
  },

  // ── L20: 명령문 ──
  {
    error_sentence: "Opens the window. It's hot.",
    translation: "창문을 여세요. 더워요.",
    options: ["Opens", "window", "hot"],
    answer: "Opens",
    wrong_sent: "Opens the window. It's hot.",
    right_sent: "Open the window. It's hot.",
    reason: "명령문은 동사원형으로 시작해요! Opens(X) → Open(O)"
  },
  {
    error_sentence: "Not touch the stove. It's hot.",
    translation: "스토브를 만지지 마세요. 뜨거워요.",
    options: ["Not", "touch", "hot"],
    answer: "Not",
    wrong_sent: "Not touch the stove. It's hot.",
    right_sent: "Don't touch the stove. It's hot.",
    reason: "부정 명령문은 Don't + 동사원형이에요! Not touch(X) → Don't touch(O)"
  },
];

let questions = [];
let currentIndex = 0;
let score = 0;
let wrongQuestions = [];
let answered = false;

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function startQuiz(qList) {
  questions = shuffle(qList);
  currentIndex = 0;
  score = 0;
  wrongQuestions = [];
  answered = false;
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizWrap').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[currentIndex];
  const total = questions.length;
  const pct = (currentIndex / total) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressInfo').textContent = (currentIndex + 1) + ' / ' + total;

  const isLast = (currentIndex === total - 1);
  document.getElementById('nextBtn').textContent = isLast ? '결과 보기 🏁' : '다음 문제 →';
  document.getElementById('nextBtn').style.display = 'none';

  const shuffledOpts = shuffle(q.options);

  let html = `<div class="q-num">문제 ${currentIndex + 1} / ${total}</div>`;
  html += `<div class="q-label">❌ 다음 문장에서 틀린 단어는?</div>`;
  html += `<div class="error-box"><div class="error-sentence">${q.error_sentence}</div></div>`;
  html += `<div class="q-translation">${q.translation}</div>`;
  html += `<div class="options" id="optionsDiv">`;
  shuffledOpts.forEach(opt => {
    html += `<button class="opt-btn" onclick="selectAnswer(this, '${opt.replace(/'/g, "\\'")}')">${opt}</button>`;
  });
  html += `</div>`;
  html += `<div class="feedback" id="feedback"></div>`;

  document.getElementById('questionCard').innerHTML = html;
}

function selectAnswer(btn, selected) {
  if (answered) return;
  answered = true;

  const q = questions[currentIndex];
  const allBtns = document.querySelectorAll('.opt-btn');
  allBtns.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');
  fb.className = 'feedback show';

  if (selected === q.answer) {
    btn.classList.add('correct');
    score++;
    fb.innerHTML = `
      <div class="fb-correct-header">✅ 정답! 틀린 단어를 찾았어요!</div>
      <div class="fb-body">
        <div class="fb-row fb-wrong-sent">❌ ${q.wrong_sent}</div>
        <div class="fb-row fb-right-sent">✅ ${q.right_sent}</div>
        <div class="fb-row fb-reason">💡 ${q.reason}</div>
      </div>`;
  } else {
    btn.classList.add('wrong');
    allBtns.forEach(b => { if (b.textContent === q.answer) b.classList.add('correct'); });
    fb.innerHTML = `
      <div class="fb-wrong-header">❌ 틀린 단어는 <strong>${q.answer}</strong>예요!</div>
      <div class="fb-body">
        <div class="fb-row fb-wrong-sent">❌ ${q.wrong_sent}</div>
        <div class="fb-row fb-right-sent">✅ ${q.right_sent}</div>
        <div class="fb-row fb-reason">💡 ${q.reason}</div>
      </div>`;
    wrongQuestions.push(q);
  }
  document.getElementById('nextBtn').style.display = 'block';
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= questions.length) showResult();
  else renderQuestion();
}

function showResult() {
  document.getElementById('quizWrap').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';

  const total = questions.length;
  const pct = Math.round((score / total) * 100);

  let stars = '⭐';
  let msg = '조금 더 연습해 봐요! 💪';
  if (pct >= 90) { stars = '⭐⭐⭐'; msg = '완벽해요! 진짜 문장 탐정! 🎉'; }
  else if (pct >= 70) { stars = '⭐⭐'; msg = '잘했어요! 조금만 더 연습해요! 😊'; }

  document.getElementById('starDisplay').textContent = stars;
  document.getElementById('resultScore').textContent = score + ' / ' + total + ' (' + pct + '%)';
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('progressInfo').textContent = total + ' / ' + total;

  if (wrongQuestions.length > 0) {
    document.getElementById('wrongList').style.display = 'block';
    document.getElementById('retryWrongBtn').style.display = 'block';
    let wHtml = '';
    wrongQuestions.forEach(q => {
      wHtml += `<div class="wrong-item">
        <div class="wi-wrong">❌ ${q.wrong_sent}</div>
        <div class="wi-right">✅ ${q.right_sent}</div>
        <div class="wi-reason">💡 ${q.reason}</div>
      </div>`;
    });
    document.getElementById('wrongItems').innerHTML = wHtml;
  } else {
    document.getElementById('wrongList').style.display = 'none';
    document.getElementById('retryWrongBtn').style.display = 'none';
  }
}

function retryWrong() { startQuiz(wrongQuestions); }
function retryAll() { startQuiz(ALL_QUESTIONS); }

startQuiz(ALL_QUESTIONS);
</script>
</body>
</html>
