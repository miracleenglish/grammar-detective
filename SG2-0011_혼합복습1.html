<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SG2-0011 | 혼합 복습 ①</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FEF0E6;
    --accent: #F5A623;
    --accent-dark: #D4891A;
    --correct: #4CAF93;
    --wrong: #E8604C;
    --card: #ffffff;
    --text: #333333;
    --light-text: #777777;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }
  .header {
    background: var(--accent-dark);
    color: white;
    padding: 14px 20px 10px;
    text-align: center;
  }
  .header .series { font-size: 11px; opacity: 0.85; letter-spacing: 1px; margin-bottom: 2px; }
  .header h1 { font-size: 18px; font-weight: 900; }
  .header .sub { font-size: 12px; opacity: 0.85; margin-top: 2px; }
  .badge {
    display: inline-block;
    background: #9B6DD1;
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 20px;
    margin-top: 6px;
  }
  .progress-wrap { background: #f0d9c8; height: 8px; width: 100%; }
  .progress-bar { height: 8px; background: var(--accent); transition: width 0.4s ease; border-radius: 0 4px 4px 0; }
  .progress-info { text-align: center; font-size: 12px; color: var(--light-text); padding: 5px; }
  .quiz-wrap { max-width: 540px; margin: 0 auto; padding: 16px 16px 0; }
  .instruction {
    background: var(--accent);
    color: white;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 14px;
    text-align: center;
  }
  .question-card {
    background: var(--card);
    border-radius: 16px;
    padding: 20px 18px 16px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.09);
    margin-bottom: 14px;
  }
  .q-num { font-size: 11px; font-weight: 700; color: var(--accent-dark); margin-bottom: 8px; }
  .q-sentence {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.8;
    margin-bottom: 6px;
  }
  .q-sentence .arrow-line {
    display: block;
    color: var(--accent-dark);
    font-size: 18px;
    font-weight: 800;
  }
  .q-sentence .blank {
    display: inline-block;
    min-width: 60px;
    border-bottom: 2.5px solid #444;
    margin-bottom: -2px;
    text-align: center;
  }
  .q-sentence .arrow-line .blank {
    border-bottom: 2.5px solid var(--accent-dark);
  }
  .q-translation {
    font-size: 15px;
    color: var(--light-text);
    margin-bottom: 14px;
    line-height: 1.7;
  }
  .hl { color: var(--accent-dark); border-bottom: 2.5px solid var(--accent-dark); font-weight: 800; padding-bottom: 1px; }

  /* 오류 찾기용 빨간 박스 */
  .error-box {
    background: #fff3f0;
    border: 2px solid #E8604C;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
  }
  .error-sentence {
    font-size: 19px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.6;
  }
  .q-label { font-size: 12px; font-weight: 700; color: var(--wrong); margin-bottom: 6px; }

  .options {
    display: grid;
    gap: 9px;
  }
  .options.col2 { grid-template-columns: 1fr 1fr; }
  .options.col3 { grid-template-columns: 1fr 1fr 1fr; }
  .opt-btn {
    border: 2.5px solid #e0cabb;
    background: #fff9f5;
    border-radius: 12px;
    padding: 11px 8px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    color: var(--text);
    line-height: 1.4;
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--accent); background: #fff0e0; transform: translateY(-1px); }
  .opt-btn.correct { background: #e8f8f3; border-color: var(--correct); color: var(--correct); }
  .opt-btn.wrong { background: #fdecea; border-color: var(--wrong); color: var(--wrong); }
  .opt-btn:disabled { cursor: default; }

  /* 오류 찾기 피드백 */
  .feedback {
    margin-top: 12px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.6;
    display: none;
    overflow: hidden;
  }
  .feedback.show { display: block; }
  .fb-correct-header { background: var(--correct); color: white; padding: 8px 14px; font-weight: 800; }
  .fb-wrong-header { background: var(--wrong); color: white; padding: 8px 14px; font-weight: 800; }
  .fb-body {
    background: #f9f9f9;
    padding: 12px 14px;
    border: 1px solid #e8e8e8;
    border-top: none;
    border-radius: 0 0 10px 10px;
  }
  .fb-row { margin-bottom: 6px; font-size: 13px; line-height: 1.6; word-break: keep-all; }
  .fb-row:last-child { margin-bottom: 0; }
  .fb-wrong-sent { color: var(--wrong); font-weight: 700; }
  .fb-right-sent { color: var(--correct); font-weight: 700; }
  .fb-reason { color: #555; }

  /* 일반 피드백 */
  .feedback-simple {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.6;
    display: none;
  }
  .feedback-simple.correct { background: #e8f8f3; border-left: 4px solid var(--correct); display: block; }
  .feedback-simple.wrong { background: #fdecea; border-left: 4px solid var(--wrong); display: block; }
  .feedback-simple .fb-title { font-weight: 800; margin-bottom: 4px; word-break: keep-all; line-height: 1.5; }
  .feedback-simple .fb-reason { color: #555; margin-top: 4px; font-size: 12px; word-break: keep-all; }

  .next-btn {
    display: none;
    width: 100%;
    margin-top: 14px;
    padding: 14px;
    background: var(--accent-dark);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
  }
  .next-btn:hover { background: #b87516; }

  .result-screen {
    max-width: 540px;
    margin: 20px auto;
    padding: 0 16px;
    display: none;
    text-align: center;
  }
  .result-card {
    background: white;
    border-radius: 20px;
    padding: 30px 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }
  .star-display { font-size: 40px; margin-bottom: 10px; }
  .result-score { font-size: 36px; font-weight: 900; color: var(--accent-dark); }
  .result-msg { font-size: 15px; color: var(--light-text); margin: 8px 0 20px; }
  .wrong-list {
    text-align: left;
    background: #fff9f5;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .wrong-list h3 { font-size: 13px; color: var(--wrong); margin-bottom: 10px; font-weight: 800; }
  .wrong-item { font-size: 13px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f0e0d0; }
  .wrong-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .wi-wrong { color: var(--wrong); font-weight: 700; margin-bottom: 2px; }
  .wi-right { color: var(--correct); font-weight: 700; margin-bottom: 2px; }
  .wi-reason { color: #666; font-size: 12px; word-break: keep-all; }

  .action-btns { display: flex; gap: 10px; }
  .retry-wrong-btn, .retry-all-btn {
    flex: 1; padding: 12px; border: none; border-radius: 12px;
    font-size: 14px; font-weight: 800; font-family: 'Nunito', sans-serif; cursor: pointer;
  }
  .retry-wrong-btn { background: var(--wrong); color: white; }
  .retry-all-btn { background: var(--accent-dark); color: white; }
  .retry-wrong-btn:hover { background: #c94030; }
  .retry-all-btn:hover { background: #b87516; }
</style>
</head>
<body>

<div class="header">
  <div class="series">🔍 영문법 탐정단 · 스타트 영문법 2권</div>
  <h1>혼합 복습 ①</h1>
  <div class="sub">Lesson 1~8 — be동사 · 명사 · 관사 · There is/are</div>
  <span class="badge">C형</span>
</div>
<div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
<div class="progress-info" id="progressInfo">1 / 15</div>

<div class="quiz-wrap" id="quizWrap">
  <div class="instruction" id="instruction">📌 알맞은 말을 골라요!</div>
  <div class="question-card" id="questionCard"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">다음 문제 →</button>
</div>

<div class="result-screen" id="resultScreen">
  <div class="result-card">
    <div class="star-display" id="starDisplay"></div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="wrong-list" id="wrongList" style="display:none">
      <h3>❌ 틀린 문제 복습</h3>
      <div id="wrongItems"></div>
    </div>
    <div class="action-btns">
      <button class="retry-wrong-btn" id="retryWrongBtn" onclick="retryWrong()" style="display:none">오답만 다시 풀기</button>
      <button class="retry-all-btn" onclick="retryAll()">전체 다시 풀기 🔄</button>
    </div>
  </div>
</div>

<script>
// type: "choice" = 일반 선택 / "error" = 오류 찾기(삼지선다)
const ALL_QUESTIONS = [

  // ── L1~L2: be동사 긍정·부정·의문 ──
  {
    type: "choice",
    instruction: "📌 알맞은 be동사를 골라요!",
    display: 'Mr. Brown <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> a pilot.',
    translation: "Mr. Brown은 조종사예요.",
    options: ["am", "is", "are", "be"],
    answer: "is",
    feedback_correct: "✅ 정답! Mr. Brown(그) → is예요.",
    feedback_wrong: "❌ He/She/It → is를 써요!",
    reason: "She/He/It → is"
  },
  {
    type: "choice",
    instruction: "📌 알맞은 부정문을 골라요!",
    display: 'The penguins <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> birds.',
    translation: "펭귄들은 새가 아니에요.",
    options: ["isn't", "aren't", "am not", "don't"],
    answer: "aren't",
    feedback_correct: "✅ 정답! 복수(penguins) → aren't예요.",
    feedback_wrong: "❌ 복수 주어의 부정문은 aren't예요!",
    reason: "복수 → are not → aren't"
  },
  {
    type: "choice",
    instruction: "📌 의문문에 알맞은 답변을 골라요!",
    display: 'Is Ms. Kim a dentist?<br><span class="arrow-line">→ Yes, _____</span>',
    translation: "Ms. Kim은 치과의사인가요?<br>→ 네, _____",
    options: ["she is.", "he is.", "she are.", "it is."],
    answer: "she is.",
    feedback_correct: "✅ 정답! Is she ~? → Yes, she is.예요.",
    feedback_wrong: "❌ Is she ~?의 긍정 답변은 Yes, she is.예요!",
    reason: "Is she ~? → Yes, she is. / No, she isn't."
  },

  // ── L3: 소유격·This/That ──
  {
    type: "choice",
    instruction: "📌 알맞은 소유격을 골라요!",
    display: 'These are <span class="hl">Jake</span> and <span class="hl">Mia</span>\'s puppies.<br><span class="arrow-line">→ <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> puppies are very cute.</span>',
    translation: "이것들은 Jake와 Mia의 강아지들이에요.<br>→ <strong>그들의</strong> 강아지들은 매우 귀여워요.",
    options: ["Their", "His", "Her", "Its"],
    answer: "Their",
    sentence_start: true,
    feedback_correct: "✅ 정답! Jake and Mia → They → Their(그들의)예요.",
    feedback_wrong: "❌ 두 사람 이상이면 Their(그들의)를 써요!",
    reason: "Jake and Mia = They → Their(그들의)"
  },
  {
    type: "choice",
    instruction: "📌 알맞은 지시대명사를 골라요!",
    display: '<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> are our skates. (멀리 있는 스케이트 두 짝)',
    translation: "저것들은 우리의 스케이트예요.",
    options: ["This", "That", "These", "Those"],
    answer: "Those",
    sentence_start: true,
    feedback_correct: "✅ 정답! 멀리 있는 복수 → Those예요.",
    feedback_wrong: "❌ 멀리 있는 복수는 Those예요!",
    reason: "멀리+복수 → Those / 가까이+복수 → These"
  },

  // ── L4: What/Who/Whose ──
  {
    type: "choice",
    instruction: "📌 알맞은 의문사를 골라요!",
    display: '<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> guitar is this?<br><span class="arrow-line">→ It\'s Mr. Park\'s guitar.</span>',
    translation: "이것은 누구의 기타인가요?<br>→ 그것은 Mr. Park의 기타예요.",
    options: ["What", "Who", "Whose", "Where"],
    answer: "Whose",
    sentence_start: true,
    feedback_correct: "✅ 정답! 소유(누구의 것)를 물어볼 때는 Whose예요.",
    feedback_wrong: "❌ '누구의 ~'를 물어볼 때는 Whose를 써요!",
    reason: "Whose → 소유 / Who → 사람 / What → 사물"
  },

  // ── L5: 단복수 명사 ──
  {
    type: "choice",
    instruction: "📌 올바른 복수형을 골라요!",
    display: 'I see three <span class="hl">butterfly</span>.<br><span class="arrow-line">→ 올바른 복수형은?</span>',
    translation: "나는 나비 세 마리를 봐요.<br>→ butterfly의 올바른 복수형은?",
    options: ["butterflys", "butterflies", "butterfles", "butterflives"],
    answer: "butterflies",
    feedback_correct: "✅ 정답! butterfly → butterflies (-y → -ies)",
    feedback_wrong: "❌ 자음+y로 끝나는 명사는 -y를 -ies로 바꿔요!",
    reason: "자음+y → -ies (butterfly→butterflies, city→cities)"
  },
  {
    type: "choice",
    instruction: "📌 올바른 복수형을 골라요!",
    display: 'Two <span class="hl">man</span> are running.<br><span class="arrow-line">→ 올바른 복수형은?</span>',
    translation: "남자 두 명이 달리고 있어요.<br>→ man의 올바른 복수형은?",
    options: ["mans", "manes", "men", "mies"],
    answer: "men",
    feedback_correct: "✅ 정답! man → men (불규칙 복수형이에요!)",
    feedback_wrong: "❌ man의 복수형은 men이에요. 불규칙 복수라 외워야 해요!",
    reason: "불규칙 복수: man→men / foot→feet / child→children / mouse→mice"
  },

  // ── L6: Count/Noncount + some/any ──
  {
    type: "choice",
    instruction: "📌 알맞은 표현을 골라요!",
    display: 'I see <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> <span class="hl">cheese</span>.',
    translation: "나는 치즈를 봐요.",
    options: ["a", "an", "some", "two"],
    answer: "some",
    feedback_correct: "✅ 정답! cheese는 셀 수 없는 명사라 some을 써요.",
    feedback_wrong: "❌ cheese는 셀 수 없는 명사예요. some cheese!",
    reason: "셀 수 없는 명사 → some (some cheese, some milk, some bread)"
  },

  // ── L7: a/an/the ──
  {
    type: "choice",
    instruction: "📌 a / an / the 중 알맞은 것을 골라요!",
    display: 'I see <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> <span class="hl">igloo</span>.',
    translation: "나는 이글루 한 개를 봐요.",
    options: ["a", "an", "the", "some"],
    answer: "an",
    feedback_correct: "✅ 정답! igloo는 모음(i)으로 시작하니 an이에요.",
    feedback_wrong: "❌ 모음으로 시작하는 명사 앞엔 an을 써요!",
    reason: "모음(a/e/i/o/u)으로 시작 → an (an igloo, an owl)"
  },
  {
    type: "choice",
    instruction: "📌 a / an / the 중 알맞은 것을 골라요!",
    display: 'Look at <span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> <span class="hl">sky</span>!',
    translation: "하늘을 봐요!",
    options: ["a", "an", "the", "some"],
    answer: "the",
    feedback_correct: "✅ 정답! 하늘은 세상에 하나뿐이라 the sky예요.",
    feedback_wrong: "❌ 세상에 하나뿐인 것 앞엔 the를 써요!",
    reason: "세상에 하나뿐인 것 → the (the sun, the moon, the sky)"
  },

  // ── L8: There is/are ──
  {
    type: "choice",
    instruction: "📌 알맞은 말을 골라요!",
    display: '<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> some juice in the cup.',
    translation: "컵 안에 주스가 있어요.",
    options: ["There is", "There are", "There am", "There be"],
    answer: "There is",
    sentence_start: true,
    feedback_correct: "✅ 정답! juice는 셀 수 없는 명사 → There is.",
    feedback_wrong: "❌ 셀 수 없는 명사 앞엔 There is를 써요!",
    reason: "셀 수 없는 명사 → There is some ~ / 복수 → There are some ~"
  },

  // ── 오류 찾기 (혼합) ──
  {
    type: "error",
    instruction: "🔍 문장에서 틀린 단어를 골라요!",
    error_sentence: "Whose are they? They are lions.",
    translation: "그것들은 무엇인가요? 그것들은 사자예요.",
    options: ["Whose", "are", "lions"],
    answer: "Whose",
    wrong_sent: "Whose are they? They are lions.",
    right_sent: "What are they? They are lions.",
    reason: "사물(lions)을 물어볼 때는 Whose가 아니라 What을 써요!"
  },
  {
    type: "error",
    instruction: "🔍 문장에서 틀린 단어를 골라요!",
    error_sentence: "There are some honey.",
    translation: "꿀이 있어요.",
    options: ["There", "are", "honey"],
    answer: "are",
    wrong_sent: "There are some honey.",
    right_sent: "There is some honey.",
    reason: "honey는 셀 수 없는 명사라 There are가 아니라 There is를 써요!"
  },
  {
    type: "error",
    instruction: "🔍 문장에서 틀린 단어를 골라요!",
    error_sentence: "Those is her umbrella.",
    translation: "저것은 그녀의 우산이에요.",
    options: ["Those", "is", "umbrella"],
    answer: "Those",
    wrong_sent: "Those is her umbrella.",
    right_sent: "That is her umbrella.",
    reason: "단수 명사(umbrella) 앞엔 Those(복수)가 아니라 That을 써요!"
  },
  {
    type: "error",
    instruction: "🔍 문장에서 틀린 단어를 골라요!",
    error_sentence: "I see a egg.",
    translation: "나는 달걀 한 개를 봐요.",
    options: ["I", "a", "egg"],
    answer: "a",
    wrong_sent: "I see a egg.",
    right_sent: "I see an egg.",
    reason: "egg는 모음(e)으로 시작하니 a가 아니라 an을 써요!"
  },
];

let questions = [];
let currentIndex = 0;
let score = 0;
let wrongQuestions = [];
let answered = false;

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function startQuiz(qList) {
  questions = shuffle(qList);
  currentIndex = 0;
  score = 0;
  wrongQuestions = [];
  answered = false;
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizWrap').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[currentIndex];
  const total = questions.length;
  const pct = (currentIndex / total) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressInfo').textContent = (currentIndex + 1) + ' / ' + total;
  document.getElementById('instruction').innerHTML = q.instruction;

  const isLast = (currentIndex === total - 1);
  document.getElementById('nextBtn').textContent = isLast ? '결과 보기 🏁' : '다음 문제 →';
  document.getElementById('nextBtn').style.display = 'none';

  let html = `<div class="q-num">문제 ${currentIndex + 1} / ${total}</div>`;

  if (q.type === 'error') {
    // 오류 찾기 형식
    const shuffledOpts = shuffle(q.options);
    html += `<div class="q-label">❌ 다음 문장에서 틀린 단어는?</div>`;
    html += `<div class="error-box"><div class="error-sentence">${q.error_sentence}</div></div>`;
    html += `<div class="q-translation">${q.translation}</div>`;
    html += `<div class="options col3" id="optionsDiv">`;
    shuffledOpts.forEach(opt => {
      html += `<button class="opt-btn" onclick="selectAnswer(this, '${opt.replace(/'/g, "\\'")}')">${opt}</button>`;
    });
    html += `</div>`;
    html += `<div class="feedback" id="feedback"></div>`;
  } else {
    // 일반 선택 형식
    const shuffledOpts = shuffle(q.options);
    const displayOpts = (q.sentence_start)
      ? shuffledOpts.map(o => o.charAt(0).toUpperCase() + o.slice(1))
      : shuffledOpts;
    html += `<div class="q-sentence">${q.display}</div>`;
    html += `<div class="q-translation">${q.translation}</div>`;
    html += `<div class="options col2" id="optionsDiv">`;
    displayOpts.forEach(opt => {
      html += `<button class="opt-btn" onclick="selectAnswer(this, '${opt.replace(/'/g, "\\'")}')">${opt}</button>`;
    });
    html += `</div>`;
    html += `<div class="feedback-simple" id="feedback"></div>`;
  }

  document.getElementById('questionCard').innerHTML = html;
}

function selectAnswer(btn, selected) {
  if (answered) return;
  answered = true;

  const q = questions[currentIndex];
  const allBtns = document.querySelectorAll('.opt-btn');
  allBtns.forEach(b => b.disabled = true);

  const isCorrect = selected.toLowerCase() === q.answer.toLowerCase();
  const fb = document.getElementById('feedback');

  if (q.type === 'error') {
    fb.className = 'feedback show';
    if (isCorrect) {
      btn.classList.add('correct');
      score++;
      fb.innerHTML = `
        <div class="fb-correct-header">✅ 정답! 틀린 단어를 찾았어요!</div>
        <div class="fb-body">
          <div class="fb-row fb-wrong-sent">❌ ${q.wrong_sent}</div>
          <div class="fb-row fb-right-sent">✅ ${q.right_sent}</div>
          <div class="fb-row fb-reason">💡 ${q.reason}</div>
        </div>`;
    } else {
      btn.classList.add('wrong');
      allBtns.forEach(b => { if (b.textContent === q.answer) b.classList.add('correct'); });
      fb.innerHTML = `
        <div class="fb-wrong-header">❌ 틀린 단어는 <strong>${q.answer}</strong>예요!</div>
        <div class="fb-body">
          <div class="fb-row fb-wrong-sent">❌ ${q.wrong_sent}</div>
          <div class="fb-row fb-right-sent">✅ ${q.right_sent}</div>
          <div class="fb-row fb-reason">💡 ${q.reason}</div>
        </div>`;
      wrongQuestions.push(q);
    }
  } else {
    fb.className = isCorrect ? 'feedback-simple correct' : 'feedback-simple wrong';
    if (isCorrect) {
      btn.classList.add('correct');
      score++;
      fb.innerHTML = `<div class="fb-title">${q.feedback_correct}</div>
        <div class="fb-reason">💡 ${q.reason}</div>`;
    } else {
      btn.classList.add('wrong');
      allBtns.forEach(b => {
        if (b.textContent.toLowerCase() === q.answer.toLowerCase()) b.classList.add('correct');
      });
      fb.innerHTML = `<div class="fb-title">${q.feedback_wrong}</div>
        <div class="fb-reason">✅ 정답: <strong>${q.answer}</strong><br>💡 ${q.reason}</div>`;
      wrongQuestions.push(q);
    }
  }

  document.getElementById('nextBtn').style.display = 'block';
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= questions.length) showResult();
  else renderQuestion();
}

function showResult() {
  document.getElementById('quizWrap').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';

  const total = questions.length;
  const pct = Math.round((score / total) * 100);

  let stars = '⭐';
  let msg = '조금 더 연습해 봐요! 💪';
  if (pct >= 90) { stars = '⭐⭐⭐'; msg = '완벽해요! 진짜 탐정! 🎉'; }
  else if (pct >= 70) { stars = '⭐⭐'; msg = '잘했어요! 조금만 더 연습해요! 😊'; }

  document.getElementById('starDisplay').textContent = stars;
  document.getElementById('resultScore').textContent = score + ' / ' + total + ' (' + pct + '%)';
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('progressInfo').textContent = total + ' / ' + total;

  if (wrongQuestions.length > 0) {
    document.getElementById('wrongList').style.display = 'block';
    document.getElementById('retryWrongBtn').style.display = 'block';
    let wHtml = '';
    wrongQuestions.forEach(q => {
      const label = q.type === 'error' ? q.error_sentence : q.display.replace(/<[^>]+>/g, '');
      wHtml += `<div class="wrong-item">
        <div class="wi-wrong">❌ ${q.type === 'error' ? q.wrong_sent : label}</div>
        <div class="wi-right">✅ 정답: ${q.answer}</div>
        <div class="wi-reason">💡 ${q.reason}</div>
      </div>`;
    });
    document.getElementById('wrongItems').innerHTML = wHtml;
  } else {
    document.getElementById('wrongList').style.display = 'none';
    document.getElementById('retryWrongBtn').style.display = 'none';
  }
}

function retryWrong() { startQuiz(wrongQuestions); }
function retryAll() { startQuiz(ALL_QUESTIONS); }

startQuiz(ALL_QUESTIONS);
</script>
</body>
</html>
