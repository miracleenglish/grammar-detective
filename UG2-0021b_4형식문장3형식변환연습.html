<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>영문법 탐정단 - UG2-0021b 4형식문장 3형식 변환 연습</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#E8F5EC;--accent:#3A9D6E;--accent-dark:#2D7A57;
    --type-b:#5BAD6F;--correct:#4CAF93;--wrong:#E8604C;
    --card-bg:#FFFFFF;--text:#2A2A2A;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Noto Sans KR','Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;}
  .app{width:100%;max-width:480px;padding:16px;padding-bottom:40px;}
  header{text-align:center;margin-bottom:14px;}
  .badge{display:inline-block;background:var(--type-b);color:#fff;font-weight:800;font-size:13px;padding:4px 12px;border-radius:999px;margin-bottom:6px;letter-spacing:.5px;}
  h1{font-size:18px;font-weight:800;color:var(--accent-dark);margin:4px 0 0;line-height:1.4;}
  .progress-wrap{background:#fff;border-radius:999px;height:12px;overflow:hidden;margin:14px 0 18px;box-shadow:inset 0 0 0 2px #B8DEC8;}
  .progress-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent-dark));transition:width .3s ease;}
  .instruction-box{background:var(--type-b);color:#fff;font-weight:700;font-size:14px;padding:12px 14px;border-radius:14px;margin-bottom:14px;line-height:1.6;text-align:center;}
  .card{background:var(--card-bg);border-radius:20px;padding:22px 18px;box-shadow:0 4px 16px rgba(45,122,87,0.13);}
  .card-instruction{font-size:14px;color:var(--type-b);font-weight:800;text-align:center;margin-bottom:12px;background:#EDF7EF;border-radius:10px;padding:7px 10px;}
  .qnum{font-size:12.5px;color:#999;font-weight:700;margin-bottom:8px;text-align:center;}

  /* 원래 문장 표시 */
  .source-box{background:#F0FAF4;border:2px solid #B8DEC8;border-radius:12px;padding:10px 14px;margin-bottom:8px;text-align:center;}
  .source-label{font-size:11px;color:#888;font-weight:700;margin-bottom:4px;}
  .source-sent{font-size:16px;font-weight:700;color:#2A2A2A;line-height:1.5;}
  .arrow-row{text-align:center;font-size:20px;color:var(--type-b);margin:6px 0;font-weight:800;}

  .sentence{font-size:17px;font-weight:700;text-align:center;line-height:1.9;margin:6px 0;color:var(--text);}
  .blank{display:inline-block;min-width:100px;border-bottom:2.5px solid var(--accent-dark);margin:0 4px;vertical-align:bottom;height:1.3em;}
  .kr-hint{font-size:14px;font-weight:700;color:#2D6640;text-align:center;margin-bottom:16px;background:#EAF7F0;border-radius:8px;padding:7px 12px;display:block;}

  .options{display:flex;flex-direction:column;gap:10px;margin-bottom:8px;}
  .opt-btn{font-family:'Nunito','Noto Sans KR',sans-serif;font-size:17px;font-weight:700;padding:13px 10px;border:2.5px solid #B8DEC8;background:#F0FAF4;border-radius:14px;cursor:pointer;transition:.15s;color:var(--text);text-align:center;}
  .opt-btn:hover:not(:disabled){border-color:var(--type-b);background:#DFF5E8;}
  .opt-btn.correct{background:var(--correct);border-color:var(--correct);color:#fff;}
  .opt-btn.wrong{background:var(--wrong);border-color:var(--wrong);color:#fff;}
  .opt-btn:disabled{cursor:default;}
  .feedback{display:none;margin-top:12px;padding:12px;border-radius:14px;font-size:13.5px;line-height:1.65;font-weight:500;}
  .feedback.correct-fb{background:#E7F7F0;color:#2D7A57;border-left:4px solid var(--correct);}
  .feedback.wrong-fb{background:#FDEAE6;color:#B84534;border-left:4px solid var(--wrong);}
  .fb-title{font-size:15px;font-weight:800;margin-bottom:6px;display:block;}
  .fb-full{margin-top:8px;padding:8px 10px;background:#EDF7EF;border-radius:8px;font-weight:700;font-size:13px;color:#2D7A57;}
  .next-btn{display:none;width:100%;margin-top:12px;padding:14px;font-size:16px;font-weight:800;color:#fff;background:var(--accent-dark);border:none;border-radius:14px;cursor:pointer;font-family:inherit;}
  .next-btn:hover{background:#22604A;}
  .result-screen{display:none;text-align:center;}
  .result-screen .stars{font-size:44px;margin:18px 0 6px;}
  .result-screen .score{font-size:22px;font-weight:800;color:var(--accent-dark);margin-bottom:4px;}
  .result-screen .score-sub{font-size:14px;color:#888;margin-bottom:24px;}
  .result-btns{display:flex;flex-direction:column;gap:10px;}
  .result-btn{padding:14px;font-size:15.5px;font-weight:800;border-radius:14px;border:none;cursor:pointer;font-family:inherit;}
  .btn-retry-wrong{background:var(--wrong);color:#fff;}
  .btn-retry-all{background:var(--accent-dark);color:#fff;}
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="badge">B형</span>
    <h1>🔎 영문법 탐정단<br>4형식문장 3형식 변환 연습</h1>
  </header>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <div class="instruction-box">
    원래 문장을 보고 <strong>변환된 문장</strong>을 완성하세요!<br>
    📌 4형식→3형식: V + O + <strong>to/for</strong> + 사람<br>
    📌 3형식→4형식: V + 사람 + O (전치사 없음!)
  </div>
  <div id="quizScreen" class="card">
    <div class="card-instruction" id="directionLabel">4형식 → 3형식</div>
    <div class="qnum" id="qnum">문제 1 / 12</div>
    <div class="source-box">
      <div class="source-label">원래 문장</div>
      <div class="source-sent" id="sourceSent"></div>
    </div>
    <div class="arrow-row">↓ 변환하세요!</div>
    <div class="sentence" id="sentence"></div>
    <div class="kr-hint" id="krHint"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn">다음 문제 →</button>
  </div>
  <div id="resultScreen" class="card result-screen">
    <div class="stars" id="stars"></div>
    <div class="score" id="scoreText"></div>
    <div class="score-sub" id="scoreSub"></div>
    <div class="result-btns">
      <button class="result-btn btn-retry-wrong" id="retryWrongBtn">❌ 오답만 다시 풀기</button>
      <button class="result-btn btn-retry-all" id="retryAllBtn">🔄 전체 다시 풀기</button>
    </div>
  </div>
</div>
<script>
/*
  UG2-0021b  4형식문장 3형식 변환 연습  B형  L18
  4형식→3형식(6): V+IO+DO → V+DO+to/for+IO
  3형식→4형식(6): V+DO+to/for+IO → V+IO+DO
  12문제 / shuffleNoFirstAnswer() 적용
*/
const ALL_QUESTIONS = [
  // ── 4형식 → 3형식 ──
  {
    direction: '4형식 → 3형식',
    source: 'Grandma gave me a book.',
    sentence: 'Grandma gave a book <span class="blank"></span>.',
    krHint: '💬 할머니가 저에게 책을 주셨어요.',
    options: ['to me','for me','at me'],
    answer: 'to me',
    reason: 'give는 <strong>to</strong>를 써요. → gave a book <strong>to me</strong>',
    full: 'Grandma gave a book to me.'
  },
  {
    direction: '4형식 → 3형식',
    source: 'He bought her a cake.',
    sentence: 'He bought a cake <span class="blank"></span>.',
    krHint: '💬 그는 그녀에게 케이크를 사줬어요.',
    options: ['for her','to her','of her'],
    answer: 'for her',
    reason: 'buy는 <strong>for</strong>를 써요. → bought a cake <strong>for her</strong>',
    full: 'He bought a cake for her.'
  },
  {
    direction: '4형식 → 3형식',
    source: 'She told him a secret.',
    sentence: 'She told a secret <span class="blank"></span>.',
    krHint: '💬 그녀는 그에게 비밀을 말했어요.',
    options: ['to him','for him','at him'],
    answer: 'to him',
    reason: 'tell은 <strong>to</strong>를 써요. → told a secret <strong>to him</strong>',
    full: 'She told a secret to him.'
  },
  {
    direction: '4형식 → 3형식',
    source: 'Dad made us soup.',
    sentence: 'Dad made soup <span class="blank"></span>.',
    krHint: '💬 아빠가 우리를 위해 수프를 만들어주셨어요.',
    options: ['for us','to us','of us'],
    answer: 'for us',
    reason: 'make는 <strong>for</strong>를 써요. → made soup <strong>for us</strong>',
    full: 'Dad made soup for us.'
  },
  {
    direction: '4형식 → 3형식',
    source: 'She showed them the map.',
    sentence: 'She showed the map <span class="blank"></span>.',
    krHint: '💬 그녀는 그들에게 지도를 보여줬어요.',
    options: ['to them','for them','by them'],
    answer: 'to them',
    reason: 'show는 <strong>to</strong>를 써요. → showed the map <strong>to them</strong>',
    full: 'She showed the map to them.'
  },
  {
    direction: '4형식 → 3형식',
    source: 'He got me a gift.',
    sentence: 'He got a gift <span class="blank"></span>.',
    krHint: '💬 그는 저를 위해 선물을 사줬어요.',
    options: ['for me','to me','at me'],
    answer: 'for me',
    reason: 'get은 <strong>for</strong>를 써요. → got a gift <strong>for me</strong>',
    full: 'He got a gift for me.'
  },
  // ── 3형식 → 4형식 ──
  {
    direction: '3형식 → 4형식',
    source: 'She wrote a letter to him.',
    sentence: 'She wrote <span class="blank"></span> a letter.',
    krHint: '💬 그녀는 그에게 편지를 썼어요.',
    options: ['him','to him','for him'],
    answer: 'him',
    reason: '4형식: V + <strong>간접목적어</strong> + 직접목적어 → 전치사 없이! → wrote <strong>him</strong> a letter',
    full: 'She wrote him a letter.'
  },
  {
    direction: '3형식 → 4형식',
    source: 'He found a seat for her.',
    sentence: 'He found <span class="blank"></span> a seat.',
    krHint: '💬 그는 그녀를 위해 자리를 찾아줬어요.',
    options: ['her','to her','for her'],
    answer: 'her',
    reason: '4형식: V + <strong>간접목적어</strong> + 직접목적어 → 전치사 없이! → found <strong>her</strong> a seat',
    full: 'He found her a seat.'
  },
  {
    direction: '3형식 → 4형식',
    source: 'She sent flowers to us.',
    sentence: 'She sent <span class="blank"></span> flowers.',
    krHint: '💬 그녀는 우리에게 꽃을 보내줬어요.',
    options: ['us','to us','for us'],
    answer: 'us',
    reason: '4형식: V + <strong>간접목적어</strong> + 직접목적어 → 전치사 없이! → sent <strong>us</strong> flowers',
    full: 'She sent us flowers.'
  },
  {
    direction: '3형식 → 4형식',
    source: 'He made a card for me.',
    sentence: 'He made <span class="blank"></span> a card.',
    krHint: '💬 그는 저를 위해 카드를 만들어줬어요.',
    options: ['me','to me','for me'],
    answer: 'me',
    reason: '4형식: V + <strong>간접목적어</strong> + 직접목적어 → 전치사 없이! → made <strong>me</strong> a card',
    full: 'He made me a card.'
  },
  {
    direction: '3형식 → 4형식',
    source: 'Mom read a story to them.',
    sentence: 'Mom read <span class="blank"></span> a story.',
    krHint: '💬 엄마가 그들에게 이야기를 읽어주셨어요.',
    options: ['them','to them','for them'],
    answer: 'them',
    reason: '4형식: V + <strong>간접목적어</strong> + 직접목적어 → 전치사 없이! → read <strong>them</strong> a story',
    full: 'Mom read them a story.'
  },
  {
    direction: '3형식 → 4형식',
    source: 'She brought coffee for him.',
    sentence: 'She brought <span class="blank"></span> coffee.',
    krHint: '💬 그녀는 그에게 커피를 가져다줬어요.',
    options: ['him','to him','for him'],
    answer: 'him',
    reason: '4형식: V + <strong>간접목적어</strong> + 직접목적어 → 전치사 없이! → brought <strong>him</strong> coffee',
    full: 'She brought him coffee.'
  }
];

let queue=[], currentIndex=0, currentQ=null, wrongList=[], score=0, answered=false;

function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function shuffleNoFirstAnswer(arr,answer){
  let result,tries=0;
  do{result=shuffle(arr);tries++;}
  while(result[0].toLowerCase()===answer.toLowerCase()&&tries<20);
  return result;
}

function startQuiz(list){
  queue=list;currentIndex=0;score=0;wrongList=[];
  document.getElementById('quizScreen').style.display='block';
  document.getElementById('resultScreen').style.display='none';
  showQuestion();
}

function showQuestion(){
  answered=false;
  currentQ=queue[currentIndex];
  document.getElementById('qnum').textContent='문제 '+(currentIndex+1)+' / '+queue.length;
  document.getElementById('progressBar').style.width=Math.round((currentIndex/queue.length)*100)+'%';
  document.getElementById('directionLabel').textContent=currentQ.direction;
  document.getElementById('sourceSent').textContent=currentQ.source;
  document.getElementById('sentence').innerHTML=currentQ.sentence;
  document.getElementById('krHint').textContent=currentQ.krHint;
  const optWrap=document.getElementById('options');
  optWrap.innerHTML='';
  const shuffled=shuffleNoFirstAnswer(currentQ.options,currentQ.answer);
  shuffled.forEach(function(opt){
    const btn=document.createElement('button');
    btn.className='opt-btn';btn.textContent=opt;
    btn.onclick=function(){selectAnswer(opt,btn);};
    optWrap.appendChild(btn);
  });
  const fb=document.getElementById('feedback');
  fb.style.display='none';fb.innerHTML='';fb.className='feedback';
  document.getElementById('nextBtn').style.display='none';
}

function selectAnswer(selected,btnEl){
  if(answered)return;
  answered=true;
  const isCorrect=selected.toLowerCase()===currentQ.answer.toLowerCase();
  document.querySelectorAll('.opt-btn').forEach(function(b){
    b.disabled=true;
    if(b.textContent.toLowerCase()===currentQ.answer.toLowerCase()) b.classList.add('correct');
    else if(b===btnEl&&!isCorrect) b.classList.add('wrong');
  });
  if(isCorrect) score++;
  else wrongList.push(currentQ);
  const fb=document.getElementById('feedback');
  fb.style.display='block';
  fb.className=isCorrect?'feedback correct-fb':'feedback wrong-fb';
  fb.innerHTML=(isCorrect?'<span class="fb-title">🎉 정답이에요!</span>':'<span class="fb-title">❌ 틀렸어요!</span>')
    +currentQ.reason
    +'<div class="fb-full">✅ 완성 문장: '+currentQ.full+'</div>';
  const nb=document.getElementById('nextBtn');
  nb.style.display='block';
  nb.textContent=(currentIndex===queue.length-1)?'결과 보기 🏁':'다음 문제 →';
}

document.getElementById('nextBtn').addEventListener('click',function(){
  if(currentIndex<queue.length-1){currentIndex++;showQuestion();}
  else showResult();
});

function showResult(){
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('quizScreen').style.display='none';
  document.getElementById('resultScreen').style.display='block';
  const total=queue.length, pct=Math.round((score/total)*100);
  document.getElementById('stars').textContent=pct===100?'⭐⭐⭐':pct>=80?'⭐⭐':'⭐';
  document.getElementById('scoreText').textContent=score+' / '+total+'개 정답!';
  document.getElementById('scoreSub').textContent=pct+'점이에요.';
  document.getElementById('retryWrongBtn').style.display=wrongList.length>0?'block':'none';
}

document.getElementById('retryWrongBtn').addEventListener('click',function(){startQuiz(shuffle(wrongList));});
document.getElementById('retryAllBtn').addEventListener('click',function(){startQuiz(shuffle(ALL_QUESTIONS));});

startQuiz(shuffle(ALL_QUESTIONS));
</script>
</body>
</html>
