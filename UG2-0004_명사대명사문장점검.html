<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>영문법 탐정단 - UG2-0004 명사·대명사 문장 점검</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#E8F5EC;
    --accent:#3A9D6E;
    --accent-dark:#2D7A57;
    --type-c:#9B6DD1;
    --correct:#4CAF93;
    --wrong:#E8604C;
    --card-bg:#FFFFFF;
    --text:#2A2A2A;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Noto Sans KR','Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;}
  .app{width:100%;max-width:480px;padding:16px;padding-bottom:40px;}

  header{text-align:center;margin-bottom:14px;}
  .badge{display:inline-block;background:var(--type-c);color:#fff;font-weight:800;font-size:13px;padding:4px 12px;border-radius:999px;margin-bottom:6px;letter-spacing:.5px;}
  h1{font-size:18px;font-weight:800;color:var(--accent-dark);margin:4px 0 0;line-height:1.4;}

  .progress-wrap{background:#fff;border-radius:999px;height:12px;overflow:hidden;margin:14px 0 18px;box-shadow:inset 0 0 0 2px #B8DEC8;}
  .progress-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent-dark));transition:width .3s ease;}

  .instruction-box{background:var(--type-c);color:#fff;font-weight:700;font-size:14px;padding:12px 14px;border-radius:14px;margin-bottom:14px;line-height:1.6;text-align:center;}

  .card{background:var(--card-bg);border-radius:20px;padding:22px 18px;box-shadow:0 4px 16px rgba(45,122,87,0.13);}
  .card-instruction{font-size:15px;color:var(--type-c);font-weight:800;text-align:center;margin-bottom:14px;background:#F3EDFB;border-radius:10px;padding:8px 10px;}
  .qnum{font-size:12.5px;color:#999;font-weight:700;margin-bottom:6px;text-align:center;}

  .sentence{font-size:18px;font-weight:700;text-align:center;line-height:1.9;margin:10px 0 6px;color:var(--text);}

  .kr-hint{
    font-size:14px;font-weight:700;color:#2D6640;
    text-align:center;margin-bottom:18px;
    background:#EAF7F0;border-radius:8px;
    padding:7px 12px;display:block;
  }

  .options{display:flex;flex-direction:column;gap:10px;margin-bottom:8px;}
  .opt-btn{font-family:'Nunito','Noto Sans KR',sans-serif;font-size:18px;font-weight:700;padding:14px 10px;border:2.5px solid #D8C4F0;background:#F8F3FD;border-radius:14px;cursor:pointer;transition:.15s;color:var(--text);text-align:center;}
  .opt-btn:hover:not(:disabled){border-color:var(--type-c);background:#EFE6FA;}
  .opt-btn.correct{background:var(--wrong);border-color:var(--wrong);color:#fff;}
  .opt-btn.wrong{background:#B0B0B0;border-color:#B0B0B0;color:#fff;}
  .opt-btn:disabled{cursor:default;}

  .feedback{display:none;margin-top:14px;padding:14px;border-radius:14px;font-size:14px;line-height:1.75;font-weight:500;}
  .feedback.correct-fb{background:#FDEAE6;color:#B84534;border-left:4px solid var(--wrong);}
  .feedback.wrong-fb{background:#F3F3F3;color:#555;border-left:4px solid #B0B0B0;}
  .fb-title{font-size:15px;font-weight:800;margin-bottom:8px;display:block;}
  .fb-fix{margin-top:8px;padding:8px 10px;background:#E7F7F0;border-radius:8px;color:#2D7A57;font-weight:700;font-size:13.5px;}

  .next-btn{display:none;width:100%;margin-top:14px;padding:14px;font-size:16px;font-weight:800;color:#fff;background:var(--accent-dark);border:none;border-radius:14px;cursor:pointer;font-family:inherit;}
  .next-btn:hover{background:#22604A;}

  .result-screen{display:none;text-align:center;}
  .result-screen .stars{font-size:44px;margin:18px 0 6px;}
  .result-screen .score{font-size:22px;font-weight:800;color:var(--accent-dark);margin-bottom:4px;}
  .result-screen .score-sub{font-size:14px;color:#888;margin-bottom:24px;}
  .result-btns{display:flex;flex-direction:column;gap:10px;}
  .result-btn{padding:14px;font-size:15.5px;font-weight:800;border-radius:14px;border:none;cursor:pointer;font-family:inherit;}
  .btn-retry-wrong{background:var(--wrong);color:#fff;}
  .btn-retry-all{background:var(--accent-dark);color:#fff;}
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="badge">C형</span>
    <h1>🔎 영문법 탐정단<br>명사·대명사 문장 점검</h1>
  </header>

  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>

  <div class="instruction-box">
    문장에서 <strong>틀린 단어</strong>를 찾아 고르세요!<br>
    📌 관사 · 복수형 · 수량표현 · 대명사 · 소유격
  </div>

  <div id="quizScreen" class="card">
    <div class="card-instruction">오류가 있는 단어를 고르세요.</div>
    <div class="qnum" id="qnum">문제 1 / 12</div>
    <div class="sentence" id="sentence"></div>
    <div class="kr-hint" id="krHint"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn">다음 문제 →</button>
  </div>

  <div id="resultScreen" class="card result-screen">
    <div class="stars" id="stars"></div>
    <div class="score" id="scoreText"></div>
    <div class="score-sub" id="scoreSub"></div>
    <div class="result-btns">
      <button class="result-btn btn-retry-wrong" id="retryWrongBtn">❌ 오답만 다시 풀기</button>
      <button class="result-btn btn-retry-all" id="retryAllBtn">🔄 전체 다시 풀기</button>
    </div>
  </div>
</div>

<script>
/*
  UG2-0004  명사·대명사 문장 점검  C형  L1~3
  오류 있는 단어 삼지선다 / 선택지에 주어 금지 / 오류 1개
  12문제 / shuffleNoFirstAnswer() 적용
*/
const ALL_QUESTIONS = [
  // ── L1 관사 ──
  {
    sentence: 'She found an wallet on the street.',
    krHint: '💬 그녀는 길에서 지갑을 하나 발견했어요.',
    options: ['an','found','wallet'],
    answer: 'an',
    reason: '<del style="color:#E8604C">an</del> → <strong style="color:#2D7A57">a</strong> &nbsp; wallet은 자음(w-)으로 시작해요. 자음 앞에는 a를 써요.',
    fix: 'She found a wallet on the street.'
  },
  {
    sentence: 'I need a advice from you.',
    krHint: '💬 당신에게 조언이 좀 필요해요.',
    options: ['a','advice','from'],
    answer: 'a',
    reason: '<del style="color:#E8604C">a</del> → <strong style="color:#2D7A57">없음(∅)</strong> &nbsp; advice는 불가산명사예요. 불가산명사 앞에는 관사 a를 쓰지 않아요.',
    fix: 'I need advice from you.'
  },
  {
    sentence: 'We visited the France last summer.',
    krHint: '💬 우리는 지난여름에 프랑스를 방문했어요.',
    options: ['the','visited','last'],
    answer: 'the',
    reason: '<del style="color:#E8604C">the</del> → <strong style="color:#2D7A57">없음(∅)</strong> &nbsp; 나라 이름(France) 앞에는 관사 the를 쓰지 않아요.',
    fix: 'We visited France last summer.'
  },
  // ── L1 불규칙 복수형 ──
  {
    sentence: 'There are five mouses in the barn.',
    krHint: '💬 헛간에 쥐가 다섯 마리 있어요.',
    options: ['mouses','barn','five'],
    answer: 'mouses',
    reason: '<del style="color:#E8604C">mouses</del> → <strong style="color:#2D7A57">mice</strong> &nbsp; mouse의 불규칙 복수형은 mice예요.',
    fix: 'There are five mice in the barn.'
  },
  // ── L2 수량형용사 ──
  {
    sentence: 'There are much students in the library.',
    krHint: '💬 도서관에 학생들이 많이 있어요.',
    options: ['much','students','library'],
    answer: 'much',
    reason: '<del style="color:#E8604C">much</del> → <strong style="color:#2D7A57">many</strong> &nbsp; students는 셀 수 있는 명사예요. 셀 수 있는 명사에는 many를 써요.',
    fix: 'There are many students in the library.'
  },
  {
    sentence: 'She drinks many water every day.',
    krHint: '💬 그녀는 매일 물을 많이 마셔요.',
    options: ['many','drinks','every'],
    answer: 'many',
    reason: '<del style="color:#E8604C">many</del> → <strong style="color:#2D7A57">much / a lot of</strong> &nbsp; water는 셀 수 없는 명사예요. 셀 수 없는 명사에는 much나 a lot of를 써요.',
    fix: 'She drinks much water every day.'
  },
  {
    sentence: 'Add a few salt to the pasta.',
    krHint: '💬 파스타에 소금을 조금 넣어요.',
    options: ['a few','salt','pasta'],
    answer: 'a few',
    reason: '<del style="color:#E8604C">a few</del> → <strong style="color:#2D7A57">a little</strong> &nbsp; salt는 셀 수 없는 명사예요. 셀 수 없는 명사에는 a little을 써요.',
    fix: 'Add a little salt to the pasta.'
  },
  {
    sentence: 'He ate a glass of pizza for lunch.',
    krHint: '💬 그는 점심으로 피자 한 조각을 먹었어요.',
    options: ['glass','ate','pizza'],
    answer: 'glass',
    reason: '<del style="color:#E8604C">glass</del> → <strong style="color:#2D7A57">slice</strong> &nbsp; 피자 한 조각은 a slice of pizza라고 해요. a glass of는 음료에 써요.',
    fix: 'He ate a slice of pizza for lunch.'
  },
  // ── L3 대명사·소유격 ──
  {
    sentence: 'John called she on the phone.',
    krHint: '💬 존이 그녀에게 전화를 했어요.',
    options: ['called','she','phone'],
    answer: 'she',
    reason: '<del style="color:#E8604C">she</del> → <strong style="color:#2D7A57">her</strong> &nbsp; 동사 뒤 목적어 자리에는 목적격 대명사를 써요. she → her',
    fix: 'John called her on the phone.'
  },
  {
    sentence: 'This notebook is not yours. It belongs to I.',
    krHint: '💬 이 공책은 네 것이 아니에요. 그건 제 것이에요.',
    options: ['I','belongs','notebook'],
    answer: 'I',
    reason: '<del style="color:#E8604C">I</del> → <strong style="color:#2D7A57">me</strong> &nbsp; 전치사(to) 뒤에는 목적격 대명사를 써요. I → me',
    fix: 'This notebook is not yours. It belongs to me.'
  },
  {
    sentence: 'We love ours new neighborhood.',
    krHint: '💬 우리는 새 동네를 정말 좋아해요.',
    options: ['ours','love','neighborhood'],
    answer: 'ours',
    reason: '<del style="color:#E8604C">ours</del> → <strong style="color:#2D7A57">our</strong> &nbsp; 명사(neighborhood) 앞에서 소유를 나타낼 때는 소유격 형용사 our를 써요.',
    fix: 'We love our new neighborhood.'
  },
  {
    sentence: 'That is Saras bike. She got it for her birthday.',
    krHint: '💬 저게 사라의 자전거예요. 생일 선물로 받았어요.',
    options: ['Saras','bike','birthday'],
    answer: 'Saras',
    reason: '<del style="color:#E8604C">Saras</del> → <strong style="color:#2D7A57">Sara\'s</strong> &nbsp; 사람 이름에 \'s를 붙여야 소유를 나타낼 수 있어요.',
    fix: "That is Sara's bike. She got it for her birthday."
  }
];

let queue=[], currentIndex=0, currentQ=null, wrongList=[], score=0, answered=false;

function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function shuffleNoFirstAnswer(arr,answer){
  let result,tries=0;
  do{result=shuffle(arr);tries++;}
  while(result[0].toLowerCase()===answer.toLowerCase()&&tries<20);
  return result;
}

function startQuiz(list){
  queue=list;currentIndex=0;score=0;wrongList=[];
  document.getElementById('quizScreen').style.display='block';
  document.getElementById('resultScreen').style.display='none';
  showQuestion();
}

function showQuestion(){
  answered=false;
  currentQ=queue[currentIndex];
  document.getElementById('qnum').textContent='문제 '+(currentIndex+1)+' / '+queue.length;
  document.getElementById('progressBar').style.width=Math.round((currentIndex/queue.length)*100)+'%';
  document.getElementById('sentence').textContent=currentQ.sentence;
  document.getElementById('krHint').textContent=currentQ.krHint;

  const optWrap=document.getElementById('options');
  optWrap.innerHTML='';
  const shuffled=shuffleNoFirstAnswer(currentQ.options,currentQ.answer);
  shuffled.forEach(function(opt){
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.textContent=opt;
    btn.onclick=function(){selectAnswer(opt,btn);};
    optWrap.appendChild(btn);
  });

  const fb=document.getElementById('feedback');
  fb.style.display='none';
  fb.innerHTML='';
  fb.className='feedback';
  document.getElementById('nextBtn').style.display='none';
}

function selectAnswer(selected,btnEl){
  if(answered)return;
  answered=true;
  const isCorrect=selected.toLowerCase()===currentQ.answer.toLowerCase();

  document.querySelectorAll('.opt-btn').forEach(function(b){
    b.disabled=true;
    if(b.textContent.toLowerCase()===currentQ.answer.toLowerCase()) b.classList.add('correct');
    else if(b===btnEl&&!isCorrect) b.classList.add('wrong');
  });

  if(isCorrect) score++;
  else wrongList.push(currentQ);

  const fb=document.getElementById('feedback');
  fb.style.display='block';
  fb.className=isCorrect?'feedback correct-fb':'feedback wrong-fb';
  fb.innerHTML=(isCorrect?'<span class="fb-title">🎉 오류를 찾았어요!</span>':'<span class="fb-title">❌ 다시 확인해 봐요!</span>')
    +currentQ.reason
    +'<div class="fb-fix">✅ 올바른 문장: '+currentQ.fix+'</div>';

  const nb=document.getElementById('nextBtn');
  nb.style.display='block';
  nb.textContent=(currentIndex===queue.length-1)?'결과 보기 🏁':'다음 문제 →';
}

document.getElementById('nextBtn').addEventListener('click',function(){
  if(currentIndex<queue.length-1){currentIndex++;showQuestion();}
  else showResult();
});

function showResult(){
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('quizScreen').style.display='none';
  document.getElementById('resultScreen').style.display='block';
  const total=queue.length, pct=Math.round((score/total)*100);
  document.getElementById('stars').textContent=pct===100?'⭐⭐⭐':pct>=80?'⭐⭐':'⭐';
  document.getElementById('scoreText').textContent=score+' / '+total+'개 정답!';
  document.getElementById('scoreSub').textContent=pct+'점이에요.';
  document.getElementById('retryWrongBtn').style.display=wrongList.length>0?'block':'none';
}

document.getElementById('retryWrongBtn').addEventListener('click',function(){startQuiz(shuffle(wrongList));});
document.getElementById('retryAllBtn').addEventListener('click',function(){startQuiz(shuffle(ALL_QUESTIONS));});

startQuiz(shuffle(ALL_QUESTIONS));
</script>
</body>
</html>
