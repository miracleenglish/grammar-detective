<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SG2-0001 | be동사 긍정문·부정문</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FEF0E6;
    --accent: #F5A623;
    --accent-dark: #D4891A;
    --correct: #4CAF93;
    --wrong: #E8604C;
    --card: #ffffff;
    --text: #333333;
    --light-text: #777777;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* 헤더 */
  .header {
    background: var(--accent-dark);
    color: white;
    padding: 14px 20px 10px;
    text-align: center;
  }
  .header .series { font-size: 11px; opacity: 0.85; letter-spacing: 1px; margin-bottom: 2px; }
  .header h1 { font-size: 18px; font-weight: 900; }
  .header .sub { font-size: 12px; opacity: 0.85; margin-top: 2px; }
  .badge {
    display: inline-block;
    background: #4A90D9;
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 20px;
    margin-top: 6px;
  }

  /* 진행 바 */
  .progress-wrap {
    background: #f0d9c8;
    height: 8px;
    width: 100%;
  }
  .progress-bar {
    height: 8px;
    background: var(--accent);
    transition: width 0.4s ease;
    border-radius: 0 4px 4px 0;
  }
  .progress-info {
    text-align: center;
    font-size: 12px;
    color: var(--light-text);
    padding: 5px;
  }

  /* 퀴즈 영역 */
  .quiz-wrap {
    max-width: 540px;
    margin: 0 auto;
    padding: 16px 16px 0;
  }

  /* 지시문 박스 */
  .instruction {
    background: var(--accent);
    color: white;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 14px;
    text-align: center;
  }

  /* 문제 카드 */
  .question-card {
    background: var(--card);
    border-radius: 16px;
    padding: 20px 18px 16px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.09);
    margin-bottom: 14px;
  }
  .q-num {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent-dark);
    margin-bottom: 8px;
  }
  .q-sentence {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 6px;
  }
  .q-sentence .blank {
    display: inline-block;
    min-width: 60px;
    border-bottom: 2.5px solid var(--accent-dark);
    text-align: center;
    color: var(--accent-dark);
  }
  .q-translation {
    font-size: 12px;
    color: var(--light-text);
    margin-bottom: 14px;
  }
  .hl { color: var(--accent-dark); border-bottom: 2.5px solid var(--accent-dark); font-weight: 800; padding-bottom: 1px; }

  /* 선택지 */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 9px;
  }
  .opt-btn {
    border: 2.5px solid #e0cabb;
    background: #fff9f5;
    border-radius: 12px;
    padding: 11px 8px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    color: var(--text);
  }
  .opt-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: #fff0e0;
    transform: translateY(-1px);
  }
  .opt-btn.correct {
    background: #e8f8f3;
    border-color: var(--correct);
    color: var(--correct);
  }
  .opt-btn.wrong {
    background: #fdecea;
    border-color: var(--wrong);
    color: var(--wrong);
  }
  .opt-btn:disabled { cursor: default; }

  /* 피드백 */
  .feedback {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.6;
    display: none;
  }
  .feedback.correct {
    background: #e8f8f3;
    border-left: 4px solid var(--correct);
    display: block;
  }
  .feedback.wrong {
    background: #fdecea;
    border-left: 4px solid var(--wrong);
    display: block;
  }
  .feedback .fb-title { font-weight: 800; margin-bottom: 4px; word-break: keep-all; line-height: 1.5; }
  .feedback .fb-reason { color: #555; margin-top: 4px; font-size: 12px; }

  /* 다음 버튼 */
  .next-btn {
    display: block;
    width: 100%;
    margin-top: 14px;
    padding: 14px;
    background: var(--accent-dark);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    display: none;
  }
  .next-btn:hover { background: #b87516; }

  /* 결과 화면 */
  .result-screen {
    max-width: 540px;
    margin: 20px auto;
    padding: 0 16px;
    display: none;
    text-align: center;
  }
  .result-card {
    background: white;
    border-radius: 20px;
    padding: 30px 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }
  .star-display { font-size: 40px; margin-bottom: 10px; }
  .result-score { font-size: 36px; font-weight: 900; color: var(--accent-dark); }
  .result-msg { font-size: 15px; color: var(--light-text); margin: 8px 0 20px; }
  .wrong-list {
    text-align: left;
    background: #fff9f5;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .wrong-list h3 { font-size: 13px; color: var(--wrong); margin-bottom: 10px; font-weight: 800; }
  .wrong-item { font-size: 13px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #f0e0d0; }
  .wrong-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .wrong-item .wrong-sent { color: var(--wrong); font-weight: 700; }
  .wrong-item .right-sent { color: var(--correct); font-weight: 700; }
  .wrong-item .reason { color: #666; font-size: 12px; margin-top: 2px; }

  .action-btns { display: flex; gap: 10px; }
  .retry-wrong-btn, .retry-all-btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
  }
  .retry-wrong-btn { background: var(--wrong); color: white; }
  .retry-all-btn { background: var(--accent-dark); color: white; }
  .retry-wrong-btn:hover { background: #c94030; }
  .retry-all-btn:hover { background: #b87516; }
</style>
</head>
<body>

<div class="header">
  <div class="series">🔍 영문법 탐정단 · 스타트 영문법 2권</div>
  <h1>be동사 긍정문 · 부정문</h1>
  <div class="sub">Lesson 1 — Be-Verbs: Affirmatives and Negatives</div>
  <span class="badge">A형</span>
</div>
<div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
<div class="progress-info" id="progressInfo">0 / 12</div>

<!-- 퀴즈 영역 -->
<div class="quiz-wrap" id="quizWrap">
  <div class="instruction" id="instruction">📌 문장을 읽고, 알맞은 be동사를 골라요!</div>
  <div class="question-card" id="questionCard"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">다음 문제 →</button>
</div>

<!-- 결과 화면 -->
<div class="result-screen" id="resultScreen">
  <div class="result-card">
    <div class="star-display" id="starDisplay"></div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="wrong-list" id="wrongList" style="display:none">
      <h3>❌ 틀린 문제 복습</h3>
      <div id="wrongItems"></div>
    </div>
    <div class="action-btns">
      <button class="retry-wrong-btn" id="retryWrongBtn" onclick="retryWrong()" style="display:none">오답만 다시 풀기</button>
      <button class="retry-all-btn" onclick="retryAll()">전체 다시 풀기 🔄</button>
    </div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [
  // ── 긍정문: be동사 고르기 ──
  {
    type: "A",
    instruction: "📌 주어에 맞는 be동사를 골라요!",
    sentence: "_____ a student.",
    subject: "I",
    display: '<span class="hl">I</span> _____ a student.',
    translation: "나는 학생이에요.",
    options: ["am", "is", "are", "be"],
    answer: "am",
    feedback_correct: "✅ 정답! I → am 이에요.",
    feedback_wrong: "❌ I(나)는 am과 함께 써요!",
    reason: "I → am / You, We, They → are / She, He, It → is"
  },
  {
    type: "A",
    instruction: "📌 주어에 맞는 be동사를 골라요!",
    display: '<span class="hl">She</span> _____ a doctor.',
    translation: "그녀는 의사예요.",
    options: ["am", "is", "are", "be"],
    answer: "is",
    feedback_correct: "✅ 정답! She → is 예요.",
    feedback_wrong: "❌ She/He/It은 is와 함께 써요!",
    reason: "She, He, It → is"
  },
  {
    type: "A",
    instruction: "📌 주어에 맞는 be동사를 골라요!",
    display: '<span class="hl">They</span> _____ teachers.',
    translation: "그들은 선생님들이에요.",
    options: ["am", "is", "are", "be"],
    answer: "are",
    feedback_correct: "✅ 정답! They → are 예요.",
    feedback_wrong: "❌ They/We/You는 are와 함께 써요!",
    reason: "We, You, They → are"
  },
  {
    type: "A",
    instruction: "📌 주어에 맞는 be동사를 골라요!",
    display: '<span class="hl">It</span> _____ an umbrella.',
    translation: "그것은 우산이에요.",
    options: ["am", "is", "are", "be"],
    answer: "is",
    feedback_correct: "✅ 정답! It → is 예요.",
    feedback_wrong: "❌ It은 is와 함께 써요!",
    reason: "She, He, It → is"
  },
  {
    type: "A",
    instruction: "📌 주어에 맞는 be동사를 골라요!",
    display: '<span class="hl">We</span> _____ singers.',
    translation: "우리는 가수들이에요.",
    options: ["am", "is", "are", "be"],
    answer: "are",
    feedback_correct: "✅ 정답! We → are 예요.",
    feedback_wrong: "❌ We는 are와 함께 써요!",
    reason: "We, You, They → are"
  },
  {
    type: "A",
    instruction: "📌 주어에 맞는 be동사를 골라요!",
    display: '<span class="hl">He</span> _____ a baseball player.',
    translation: "그는 야구 선수예요.",
    options: ["am", "is", "are", "be"],
    answer: "is",
    feedback_correct: "✅ 정답! He → is 예요.",
    feedback_wrong: "❌ He는 is와 함께 써요!",
    reason: "She, He, It → is"
  },

  // ── 부정문: isn't / aren't / am not ──
  {
    type: "B",
    instruction: "📌 부정문으로 알맞은 것을 골라요!",
    display: '<span class="hl">She</span> _____ a nurse.<br><span style="font-size:14px;color:#999;font-weight:600">→ She is a doctor.</span>',
    translation: "그녀는 간호사가 아니에요. 그녀는 의사예요.",
    options: ["isn't", "aren't", "am not", "don't"],
    answer: "isn't",
    feedback_correct: "✅ 정답! She → isn't (= is not)예요.",
    feedback_wrong: "❌ She/He/It의 부정문은 isn't예요!",
    reason: "She/He/It is not → isn't"
  },
  {
    type: "B",
    instruction: "📌 부정문으로 알맞은 것을 골라요!",
    display: '<span class="hl">They</span> _____ dancers.<br><span style="font-size:14px;color:#999;font-weight:600">→ They are singers.</span>',
    translation: "그들은 댄서가 아니에요. 그들은 가수예요.",
    options: ["isn't", "aren't", "am not", "don't"],
    answer: "aren't",
    feedback_correct: "✅ 정답! They → aren't (= are not)예요.",
    feedback_wrong: "❌ We/You/They의 부정문은 aren't예요!",
    reason: "We/You/They are not → aren't"
  },
  {
    type: "B",
    instruction: "📌 부정문으로 알맞은 것을 골라요!",
    display: '<span class="hl">I</span> _____ a teacher.<br><span style="font-size:14px;color:#999;font-weight:600">→ I am a student.</span>',
    translation: "나는 선생님이 아니에요. 나는 학생이에요.",
    options: ["isn't", "aren't", "am not", "don't"],
    answer: "am not",
    feedback_correct: "✅ 정답! I → am not (= I'm not)이에요.",
    feedback_wrong: "❌ I는 am not을 써요! isn't·aren't는 I와 함께 못 써요.",
    reason: "I am not → am not (= I'm not) / isn't · aren't 아님!"
  },
  {
    type: "B",
    instruction: "📌 부정문으로 알맞은 것을 골라요!",
    display: '<span class="hl">It</span> _____ a book.<br><span style="font-size:14px;color:#999;font-weight:600">→ It is an album.</span>',
    translation: "그것은 책이 아니에요. 그것은 앨범이에요.",
    options: ["isn't", "aren't", "am not", "don't"],
    answer: "isn't",
    feedback_correct: "✅ 정답! It → isn't (= is not)예요.",
    feedback_wrong: "❌ It은 isn't (= is not)를 써요!",
    reason: "She/He/It is not → isn't"
  },

  // ── 올바른 문장 고르기 ──
  {
    type: "C",
    instruction: "📌 다음 중 올바른 문장을 골라요!",
    display: 'You _____ a soccer player.',
    translation: "너는 축구 선수야.",
    options: ["You am a soccer player.", "You is a soccer player.", "You are a soccer player.", "You be a soccer player."],
    answer: "You are a soccer player.",
    feedback_correct: "✅ 정답! You(너)와 함께 쓰는 be동사는 are예요.",
    feedback_wrong: "❌ You는 are와 함께 써요!",
    reason: "You → are"
  },
  {
    type: "C",
    instruction: "📌 다음 중 올바른 부정문을 골라요!",
    display: 'We are nurses. → 부정문으로 바꾸면?',
    translation: "우리는 간호사가 아니에요.",
    options: ["We isn't nurses.", "We aren't nurses.", "We am not nurses.", "We not are nurses."],
    answer: "We aren't nurses.",
    feedback_correct: "✅ 정답! We(우리)의 부정문은 We aren't예요.",
    feedback_wrong: "❌ We는 aren't(= are not)를 써요!",
    reason: "We are not → We aren't"
  },
];

let questions = [];
let currentIndex = 0;
let score = 0;
let wrongQuestions = [];
let isRetryMode = false;
let answered = false;

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function startQuiz(qList) {
  questions = shuffle(qList);
  currentIndex = 0;
  score = 0;
  wrongQuestions = [];
  answered = false;
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizWrap').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[currentIndex];
  const total = questions.length;
  const pct = (currentIndex / total) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressInfo').textContent = (currentIndex + 1) + ' / ' + total;
  document.getElementById('instruction').innerHTML = q.instruction;

  const isLast = (currentIndex === total - 1);
  document.getElementById('nextBtn').textContent = isLast ? '결과 보기 🏁' : '다음 문제 →';
  document.getElementById('nextBtn').style.display = 'none';

  const shuffledOpts = shuffle(q.options);

  let html = `<div class="q-num">문제 ${currentIndex + 1} / ${total}</div>`;
  html += `<div class="q-sentence">${q.display}</div>`;
  html += `<div class="q-translation">${q.translation}</div>`;
  html += `<div class="options" id="optionsDiv">`;
  shuffledOpts.forEach(opt => {
    html += `<button class="opt-btn" onclick="selectAnswer(this, '${opt.replace(/'/g, "\\'")}')">${opt}</button>`;
  });
  html += `</div>`;
  html += `<div class="feedback" id="feedback"></div>`;

  document.getElementById('questionCard').innerHTML = html;
}

function selectAnswer(btn, selected) {
  if (answered) return;
  answered = true;

  const q = questions[currentIndex];
  const allBtns = document.querySelectorAll('.opt-btn');
  allBtns.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');
  if (selected === q.answer) {
    btn.classList.add('correct');
    score++;
    fb.className = 'feedback correct';
    fb.innerHTML = `<div class="fb-title">${q.feedback_correct}</div>
      <div class="fb-reason">💡 ${q.reason}</div>`;
  } else {
    btn.classList.add('wrong');
    allBtns.forEach(b => { if (b.textContent === q.answer) b.classList.add('correct'); });
    fb.className = 'feedback wrong';
    fb.innerHTML = `<div class="fb-title">${q.feedback_wrong}</div>
      <div class="fb-reason">✅ 정답: <strong>${q.answer}</strong><br>💡 ${q.reason}</div>`;
    wrongQuestions.push(q);
  }

  document.getElementById('nextBtn').style.display = 'block';
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  document.getElementById('quizWrap').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';

  const total = questions.length;
  const pct = Math.round((score / total) * 100);

  let stars = '⭐';
  let msg = '조금 더 연습해 봐요! 💪';
  if (pct >= 90) { stars = '⭐⭐⭐'; msg = '완벽해요! be동사 마스터! 🎉'; }
  else if (pct >= 70) { stars = '⭐⭐'; msg = '잘했어요! 조금만 더 연습해요! 😊'; }

  document.getElementById('starDisplay').textContent = stars;
  document.getElementById('resultScore').textContent = score + ' / ' + total + ' (' + pct + '%)';
  document.getElementById('resultMsg').textContent = msg;

  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('progressInfo').textContent = total + ' / ' + total;

  if (wrongQuestions.length > 0) {
    document.getElementById('wrongList').style.display = 'block';
    document.getElementById('retryWrongBtn').style.display = 'block';
    let wHtml = '';
    wrongQuestions.forEach(q => {
      wHtml += `<div class="wrong-item">
        <div class="wrong-sent">❌ ${q.display.replace(/<[^>]+>/g, '')} → ${q.answer}</div>
        <div class="right-sent">✅ 정답: ${q.answer}</div>
        <div class="reason">💡 ${q.reason}</div>
      </div>`;
    });
    document.getElementById('wrongItems').innerHTML = wHtml;
  } else {
    document.getElementById('wrongList').style.display = 'none';
    document.getElementById('retryWrongBtn').style.display = 'none';
  }
}

function retryWrong() {
  isRetryMode = true;
  startQuiz(wrongQuestions);
}

function retryAll() {
  isRetryMode = false;
  startQuiz(ALL_QUESTIONS);
}

// 시작
startQuiz(ALL_QUESTIONS);
</script>
</body>
</html>
