<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>영문법 탐정단 - UG1-0025 의문사 의문문</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#E8F5EC;
    --accent:#3A9D6E;
    --accent-dark:#2D7A57;
    --type-b:#5BAD6F;
    --correct:#4CAF93;
    --wrong:#E8604C;
    --card-bg:#FFFFFF;
    --text:#2A2A2A;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Noto Sans KR','Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;}
  .app{width:100%;max-width:480px;padding:16px;padding-bottom:40px;}

  header{text-align:center;margin-bottom:14px;}
  .badge{display:inline-block;background:var(--type-b);color:#fff;font-weight:800;font-size:13px;padding:4px 12px;border-radius:999px;margin-bottom:6px;letter-spacing:.5px;}
  h1{font-size:18px;font-weight:800;color:var(--accent-dark);margin:4px 0 0;line-height:1.4;}

  .progress-wrap{background:#fff;border-radius:999px;height:12px;overflow:hidden;margin:14px 0 18px;box-shadow:inset 0 0 0 2px #B8DEC8;}
  .progress-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--type-b),var(--accent-dark));transition:width .3s ease;}

  .instruction-box{background:var(--type-b);color:#fff;font-weight:700;font-size:14px;padding:12px 14px;border-radius:14px;margin-bottom:14px;line-height:1.6;text-align:center;}

  .card{background:var(--card-bg);border-radius:20px;padding:22px 18px;box-shadow:0 4px 16px rgba(45,122,87,0.13);}
  .card-instruction{font-size:15px;color:var(--type-b);font-weight:800;text-align:center;margin-bottom:14px;background:#EBF7EE;border-radius:10px;padding:8px 10px;}
  .qnum{font-size:12.5px;color:#999;font-weight:700;margin-bottom:6px;text-align:center;}

  /* Q&A 박스 */
  .qa-box{background:#F5FBF7;border-radius:12px;padding:14px 16px;margin:10px 0 20px;border-left:4px solid var(--type-b);}
  .qa-q{font-size:19px;font-weight:700;line-height:1.75;color:var(--text);margin-bottom:8px;}
  .qa-a{font-size:15px;color:#3A9D6E;font-weight:700;}
  .blank{display:inline-block;min-width:90px;border-bottom:2.5px solid var(--accent-dark);margin:0 3px;vertical-align:bottom;height:1.3em;}

  .options{display:flex;flex-direction:column;gap:10px;margin-bottom:8px;}
  .opt-btn{font-family:'Nunito','Noto Sans KR',sans-serif;font-size:18px;font-weight:700;padding:14px 10px;border:2.5px solid #B8DEC8;background:#F0FAF4;border-radius:14px;cursor:pointer;transition:.15s;color:var(--text);text-align:center;}
  .opt-btn:hover:not(:disabled){border-color:var(--type-b);background:#DFF5E8;}
  .opt-btn.correct{background:var(--correct);border-color:var(--correct);color:#fff;}
  .opt-btn.wrong{background:var(--wrong);border-color:var(--wrong);color:#fff;}
  .opt-btn:disabled{cursor:default;}

  .feedback{display:none;margin-top:14px;padding:14px;border-radius:14px;font-size:14px;line-height:1.65;font-weight:500;}
  .feedback.correct-fb{background:#E7F7F0;color:#2D7A57;border-left:4px solid var(--correct);}
  .feedback.wrong-fb{background:#FDEAE6;color:#B84534;border-left:4px solid var(--wrong);}
  .fb-title{font-size:15px;font-weight:800;margin-bottom:6px;display:block;}
  .fb-hint{font-size:13px;color:#555;margin-top:7px;padding-top:7px;border-top:1px solid rgba(0,0,0,.08);font-style:italic;}

  .next-btn{display:none;width:100%;margin-top:14px;padding:14px;font-size:16px;font-weight:800;color:#fff;background:var(--accent-dark);border:none;border-radius:14px;cursor:pointer;font-family:inherit;}
  .next-btn:hover{background:#22604A;}

  .result-screen{display:none;text-align:center;}
  .result-screen .stars{font-size:44px;margin:18px 0 6px;}
  .result-screen .score{font-size:22px;font-weight:800;color:var(--accent-dark);margin-bottom:4px;}
  .result-screen .score-sub{font-size:14px;color:#888;margin-bottom:24px;}
  .result-btns{display:flex;flex-direction:column;gap:10px;}
  .result-btn{padding:14px;font-size:15.5px;font-weight:800;border-radius:14px;border:none;cursor:pointer;font-family:inherit;}
  .btn-retry-wrong{background:var(--wrong);color:#fff;}
  .btn-retry-all{background:var(--accent-dark);color:#fff;}
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="badge">B형</span>
    <h1>🔎 영문법 탐정단<br>의문사 의문문</h1>
  </header>

  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>

  <div class="instruction-box">
    답변을 보고 알맞은 <strong>의문사</strong>를 고르세요!<br>
    What / Who / Where / When / How / Whose<br>
    How many / How much
  </div>

  <div id="quizScreen" class="card">
    <div class="card-instruction">어떤 의문사가 알맞을까요?</div>
    <div class="qnum" id="qnum">문제 1 / 12</div>

    <div class="qa-box">
      <div class="qa-q" id="qQuestion"></div>
      <div class="qa-a" id="qAnswer"></div>
    </div>

    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn">다음 문제 →</button>
  </div>

  <div id="resultScreen" class="card result-screen">
    <div class="stars" id="stars"></div>
    <div class="score" id="scoreText"></div>
    <div class="score-sub" id="scoreSub"></div>
    <div class="result-btns">
      <button class="result-btn btn-retry-wrong" id="retryWrongBtn">❌ 오답만 다시 풀기</button>
      <button class="result-btn btn-retry-all" id="retryAllBtn">🔄 전체 다시 풀기</button>
    </div>
  </div>
</div>

<script>
/*
  UG1-0025  의문사 의문문  B형  L22
  Q&A 형식: 답변을 보고 의문사 선택
  What/Who/Where/When/How/Whose/How many/How much
  12문제 / shuffleNoFirstAnswer() 적용
*/
const ALL_QUESTIONS = [
  {
    question:'<span class="blank"></span> do you live?',
    answer:'A: I live in Seoul.',
    hint:'나는 서울에 살아요.',
    options:['Where','When','How'],
    answer_word:'Where',
    reason:'장소(Seoul)를 묻는 의문사는 <strong>Where</strong>예요. → <strong>Where</strong> do you live?'
  },
  {
    question:'<span class="blank"></span> does she usually go to bed?',
    answer:'A: She goes to bed at 10 PM.',
    hint:'그녀는 보통 밤 10시에 자요.',
    options:['When','Where','How'],
    answer_word:'When',
    reason:'시간(10 PM)을 묻는 의문사는 <strong>When</strong>이에요. → <strong>When</strong> does she go to bed?'
  },
  {
    question:'<span class="blank"></span> is that tall boy?',
    answer:'A: He is my cousin.',
    hint:'그는 내 사촌이에요.',
    options:['Who','What','Whose'],
    answer_word:'Who',
    reason:'사람(my cousin)을 묻는 의문사는 <strong>Who</strong>예요. → <strong>Who</strong> is that boy?'
  },
  {
    question:'<span class="blank"></span> do you come to school?',
    answer:'A: I come by bus.',
    hint:'나는 버스로 학교에 와요.',
    options:['How','Where','When'],
    answer_word:'How',
    reason:'방법·수단(by bus)을 묻는 의문사는 <strong>How</strong>예요. → <strong>How</strong> do you come to school?'
  },
  {
    question:'<span class="blank"></span> is your favorite food?',
    answer:'A: My favorite food is pizza.',
    hint:'내가 가장 좋아하는 음식은 피자예요.',
    options:['What','Who','How'],
    answer_word:'What',
    reason:'사물·것(pizza)을 묻는 의문사는 <strong>What</strong>이에요. → <strong>What</strong> is your favorite food?'
  },
  {
    question:'<span class="blank"></span> pencil case is this?',
    answer:"A: It's Amy's pencil case.",
    hint:"그것은 Amy의 필통이에요.",
    options:['Whose','What','How'],
    answer_word:'Whose',
    reason:"소유(Amy's)를 묻는 의문사는 <strong>Whose</strong>예요. → <strong>Whose</strong> pencil case is this?"
  },
  {
    question:'<span class="blank"></span> books do you read a month?',
    answer:'A: I read about three books.',
    hint:'나는 한 달에 책을 세 권 정도 읽어요.',
    options:['How many','How much','How'],
    answer_word:'How many',
    reason:'셀 수 있는 명사(books)의 수량을 묻는 의문사는 <strong>How many</strong>예요.'
  },
  {
    question:'<span class="blank"></span> water do you drink a day?',
    answer:'A: I drink about two liters.',
    hint:'나는 하루에 물을 약 2리터 마셔요.',
    options:['How much','How many','How'],
    answer_word:'How much',
    reason:'셀 수 없는 명사(water)의 양을 묻는 의문사는 <strong>How much</strong>예요.'
  },
  {
    question:'<span class="blank"></span> does your dad work?',
    answer:'A: He works at a hospital.',
    hint:'아빠는 병원에서 일해요.',
    options:['Where','When','Who'],
    answer_word:'Where',
    reason:'장소(a hospital)를 묻는 의문사는 <strong>Where</strong>예요. → <strong>Where</strong> does your dad work?'
  },
  {
    question:'<span class="blank"></span> did you feel after the test?',
    answer:'A: I felt very relieved.',
    hint:'나는 시험 후에 매우 홀가분했어요.',
    options:['How','When','Where'],
    answer_word:'How',
    reason:'상태·느낌(relieved)을 묻는 의문사는 <strong>How</strong>예요. → <strong>How</strong> did you feel?'
  },
  {
    question:'<span class="blank"></span> does your school start?',
    answer:'A: It starts at 8:30 AM.',
    hint:'학교는 오전 8시 30분에 시작해요.',
    options:['When','Where','Who'],
    answer_word:'When',
    reason:'시간(8:30 AM)을 묻는 의문사는 <strong>When</strong>이에요. → <strong>When</strong> does school start?'
  },
  {
    question:'<span class="blank"></span> sport do you play after school?',
    answer:'A: I play basketball.',
    hint:'나는 농구를 해요.',
    options:['What','Who','Whose'],
    answer_word:'What',
    reason:'사물·것(basketball)을 묻는 의문사는 <strong>What</strong>이에요. → <strong>What</strong> sport do you play?'
  }
];

let queue=[], currentIndex=0, currentQ=null, wrongList=[], score=0, answered=false;

function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function shuffleNoFirstAnswer(arr,answer){
  let result,tries=0;
  do{result=shuffle(arr);tries++;}
  while(result[0].toLowerCase()===answer.toLowerCase()&&tries<20);
  return result;
}

function startQuiz(list){
  queue=list;currentIndex=0;score=0;wrongList=[];
  document.getElementById('quizScreen').style.display='block';
  document.getElementById('resultScreen').style.display='none';
  showQuestion();
}

function showQuestion(){
  answered=false;
  currentQ=queue[currentIndex];
  document.getElementById('qnum').textContent='문제 '+(currentIndex+1)+' / '+queue.length;
  document.getElementById('progressBar').style.width=Math.round((currentIndex/queue.length)*100)+'%';
  document.getElementById('qQuestion').innerHTML='Q: '+currentQ.question;
  document.getElementById('qAnswer').textContent=currentQ.answer;

  const optWrap=document.getElementById('options');
  optWrap.innerHTML='';
  const shuffled=shuffleNoFirstAnswer(currentQ.options,currentQ.answer_word);
  shuffled.forEach(function(opt){
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.textContent=opt;
    btn.onclick=function(){selectAnswer(opt,btn);};
    optWrap.appendChild(btn);
  });

  const fb=document.getElementById('feedback');
  fb.style.display='none';
  fb.innerHTML='';
  fb.className='feedback';
  document.getElementById('nextBtn').style.display='none';
}

function selectAnswer(selected,btnEl){
  if(answered)return;
  answered=true;
  const isCorrect=selected.toLowerCase()===currentQ.answer_word.toLowerCase();

  document.querySelectorAll('.opt-btn').forEach(function(b){
    b.disabled=true;
    if(b.textContent.toLowerCase()===currentQ.answer_word.toLowerCase()) b.classList.add('correct');
    else if(b===btnEl&&!isCorrect) b.classList.add('wrong');
  });

  if(isCorrect) score++;
  else wrongList.push(currentQ);

  const fb=document.getElementById('feedback');
  fb.style.display='block';
  if(isCorrect){
    fb.className='feedback correct-fb';
    fb.innerHTML='<span class="fb-title">🎉 정답이에요!</span>'+currentQ.reason+'<div class="fb-hint">💡 '+currentQ.hint+'</div>';
  } else {
    fb.className='feedback wrong-fb';
    fb.innerHTML='<span class="fb-title">❌ 틀렸어요!</span>'+currentQ.reason+'<div class="fb-hint">💡 '+currentQ.hint+'</div>';
  }

  const nb=document.getElementById('nextBtn');
  nb.style.display='block';
  nb.textContent=(currentIndex===queue.length-1)?'결과 보기 🏁':'다음 문제 →';
}

document.getElementById('nextBtn').addEventListener('click',function(){
  if(currentIndex<queue.length-1){currentIndex++;showQuestion();}
  else showResult();
});

function showResult(){
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('quizScreen').style.display='none';
  document.getElementById('resultScreen').style.display='block';
  const total=queue.length, pct=Math.round((score/total)*100);
  document.getElementById('stars').textContent=pct===100?'⭐⭐⭐':pct>=80?'⭐⭐':'⭐';
  document.getElementById('scoreText').textContent=score+' / '+total+'개 정답!';
  document.getElementById('scoreSub').textContent=pct+'점이에요.';
  document.getElementById('retryWrongBtn').style.display=wrongList.length>0?'block':'none';
}

document.getElementById('retryWrongBtn').addEventListener('click',function(){startQuiz(shuffle(wrongList));});
document.getElementById('retryAllBtn').addEventListener('click',function(){startQuiz(shuffle(ALL_QUESTIONS));});

startQuiz(shuffle(ALL_QUESTIONS));
</script>
</body>
</html>
